function cleanUndefined(obj){
  if (Array.isArray(obj)) return obj.map(cleanUndefined);
  if (obj && typeof obj === 'object'){
    const o = {};
    Object.keys(obj).forEach(k => { if (obj[k] !== undefined) o[k] = cleanUndefined(obj[k]); });
    return o;
  }
  return obj;
}
function todayKey(){
  const x = new Date();
  return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
}
async function nextOrderNo(){
  const ref = db.collection('settings').doc('owlOrderCounter');
  const day = todayKey();
  const n = await db.runTransaction(async tx => {
    const snap = await tx.get(ref);
    const d = snap.exists ? snap.data() : {};
    const next = (d.day === day ? (d.seq || 0) : 0) + 1;
    tx.set(ref, { day, seq: next });
    return next;
  });
  return 'PE' + String(n).padStart(3, '0');
}
function crc16(s){
  let crc = 0xFFFF;
  for (let i = 0; i < s.length; i++){
    crc ^= s.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4, '0');
}
function tlv(id, v){ return id + String(v.length).padStart(2, '0') + v; }
function shopPayload(amount){
  let p = tlv('00','01') + tlv('01','12') +
          tlv('29', tlv('00','A000000677010111') + tlv('03', SHOP_PP_ID)) +
          tlv('53','764') + tlv('54', amount.toFixed(2)) + tlv('58','TH');
  p += '6304';
  return p + crc16(p);
}
function slotList(){
  const now = new Date();
  const first = new Date(now.getTime() + (TEST_MODE ? 5 : 20)*60000);
  first.setMinutes(Math.ceil(first.getMinutes()/15)*15, 0, 0);
  const [oh, om] = SHOP_OPEN.split(':').map(Number);
  const open = new Date(); open.setHours(oh, om, 0, 0);
  if (!TEST_MODE && first < open) first.setTime(open.getTime());
  const [ch, cm] = SHOP_CLOSE.split(':').map(Number);
  const close = TEST_MODE ? new Date(now.getTime() + 3*3600000) : new Date();
  if (!TEST_MODE) close.setHours(ch, cm, 0, 0);
  const out = [];
  for (let t = new Date(first); t <= close; t = new Date(t.getTime() + 15*60000)){
    out.push(String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0'));
  }
  return out;
}

/* ====== LIFF ====== */
function useLiff(){
  const [profile, setProfile] = useState(null);
  const [inLine, setInLine] = useState(false);
  useEffect(() => {
    if (!window.liff || LIFF_ID.indexOf('PASTE') === 0) return;
    liff.init({ liffId: LIFF_ID }).then(async () => {
      setInLine(liff.isInClient());
      if (liff.isLoggedIn()){
        try{ setProfile(await liff.getProfile()); }catch(e){}
      } else if (liff.isInClient()){
        liff.login();
      }
    }).catch(e => console.warn('liff', e));
  }, []);
  return { profile, inLine };
}

      const start = new Date(pickup.getTime() - minPrep * 60000);
      const items = cart.map(c => ({
        menuId: c.m.id, name: c.m.name, nameTh: c.m.nameTh || '',
        sweetness: c.sweet, ice: (c.ice !== undefined ? c.ice : 'normal'), toppings: c.tops.map(t => ({ name: t.nameTh || t.name, price: t.price, n: t.n })),
        qty: c.qty, price: c.m.price, unit: c.unit, prepMin: c.m.prepMin || 10
      }));
      const orderNo = await nextOrderNo();
      const doc = cleanUndefined({
        orderNo,
        status: 'new', paid: false, dateKey: todayKey(),
        ...(TEST_MODE ? { test: true } : {}),
        createdAt: new Date().toISOString(),
        pickupAt: pickup.toISOString(), startAt: start.toISOString(),
        total,
        customer: { name: name.trim(), phone: ph,
                    lineUserId: profile ? profile.userId : '', lineName: profile ? profile.displayName : '' },
        items
      });
      const ref = await db.collection('owlOrders').add(doc);

      // ส่งสรุปเข้าแชทร้าน (ในนามลูกค้า) — ลูกค้าเก็บไว้โชว์หน้าร้าน + แอดมินเห็นทันที
      const sw = { none:'ไม่หวาน', less:'หวานน้อย', normal:'หวานปกติ', extra:'หวานมาก' };
      const ic = { less:'น้ำแข็งน้อย', no:'ไม่ใส่น้ำแข็ง', sep:'แยกน้ำแข็ง' };
      const lines = items.map(it => {
        const parts = [sw[it.sweetness], ic[it.ice]].filter(Boolean).join('/');
        const tp = it.toppings.length ? ' +' + it.toppings.map(t => t.name + (t.n > 1 ? 'x' + t.n : '')).join('/') : '';
        const opt = (parts || tp) ? ' (' + parts + tp + ')' : '';
        return '• ' + (it.nameTh || it.name) + opt + ' ×' + it.qty;
      }).join('\n');
      const summaryText = '🦉 สั่งล่วงหน้า Owl Cha\n\n' + lines +
        '\nรวม ' + total + ' บาท\n\n' +
        '----------------------------\n' +
        '👤 ' + name.trim() + '\n' +
        '📞 ' + ph + '\n' +
        '🕐 มารับ ' + slot + ' น.\n' +
        '📌 หมายเลขออเดอร์ ' + orderNo;
      let sendStatus = 'notline';
      if (inLine && window.liff && liff.isInClient()){
        try{
          await liff.sendMessages([{ type:'text', text: summaryText }]);
          sendStatus = 'ok';
        }catch(e){
          sendStatus = (e && (e.message || e.code)) || 'unknown';
          console.warn('sendMessages', e);
        }
      }
      // OA ตอบกลับน้องฮูกขอสลิปทุกออเดอร์ (+ สำรองส่งสรุปถ้าข้อความลูกค้าไม่ออก)
      if (NOTIFY_URL.indexOf('PASTE') !== 0 && profile && profile.userId){
        const texts = sendStatus === 'ok' ? [OWL_REPLY] : [summaryText, OWL_REPLY];
        try{
          fetch(NOTIFY_URL, { method:'POST', headers:{ 'Content-Type':'text/plain' },
            body: JSON.stringify({ userId: profile.userId, texts }) }).catch(() => {});
          if (sendStatus !== 'ok') sendStatus = 'push';
        }catch(e){}
      }
            const doneInfo = { id: ref.id, orderNo, slot, total, name: name.trim(), sendStatus, items };
      try{ localStorage.setItem('owlLastOrder', JSON.stringify({ ...doneInfo, dateKey: todayKey() })); }catch(e){}
      onDone(doneInfo);
    }catch(e){ alert('สั่งไม่สำเร็จ: ' + e.message); }
    setBusy(false);
  };

  return (

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div style={{fontWeight:700, fontSize:19}}>ตะกร้า ({cart.reduce((s,c)=>s+c.qty,0)} แก้ว)</div>

                </div>

              <div onClick={() => rm(i)} style={{fontSize:13, color:'var(--muted)', cursor:'pointer'}}>ลบ</div>
            </div>
          </div>
        ))}
        {cart.length === 0 && <div style={{textAlign:'center', color:'var(--muted)', padding:'20px 0'}}>ตะกร้าว่าง</div>}

        {cart.length > 0 && <>

/* ====== แกลเลอรีโปสเตอร์ ====== */
function PosterViewer({ start, onClose, onPick }){
  const ref = useRef(null);
  const [at, setAt] = useState(start);
  useEffect(() => {
    if (ref.current) ref.current.scrollLeft = start * ref.current.clientWidth;
  }, []);
  const onScroll = () => {
    if (ref.current) setAt(Math.round(ref.current.scrollLeft / ref.current.clientWidth));
  };
  return (
    <div style={{position:'fixed', inset:0, background:'rgba(20,18,14,.96)', zIndex:80,
                 display:'flex', flexDirection:'column'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 16px'}}>
        <div style={{color:'#fff', fontSize:14.5}}>📖 {POSTERS[at] ? POSTERS[at].t : ''} <span style={{opacity:.55}}>· {at+1}/{POSTERS.length}</span></div>
        <div onClick={onClose} style={{color:'#fff', fontSize:24, padding:'0 6px', cursor:'pointer'}}>✕</div>
      </div>
      <div ref={ref} onScroll={onScroll}
        style={{flex:1, display:'flex', overflowX:'auto', scrollSnapType:'x mandatory', WebkitOverflowScrolling:'touch'}}>
        {POSTERS.map((p, i) => (
          <div key={i} style={{width:'100vw', flexShrink:0, scrollSnapAlign:'center',
                               display:'flex', alignItems:'center', justifyContent:'center', padding:'0 8px 20px'}}>
            <img src={p.f} loading="lazy" className="press"
              onClick={() => onPick && onPick(p)}
              style={{maxWidth:'100%', maxHeight:'100%', objectFit:'contain', borderRadius:12, cursor:'pointer'}} />
          </div>
        ))}
      </div>
      <div style={{color:'rgba(255,255,255,.5)', fontSize:12.5, textAlign:'center', padding:'0 0 16px'}}>ปัดซ้าย-ขวาดูใบถัดไป · 👆 แตะรูปเพื่อไปสั่งเมนูนั้นเลย</div>
    </div>
  );
}

  const [showCart, setShowCart] = useState(false);
  const [done, setDone] = useState(null);
  const [posterAt, setPosterAt] = useState(-1);   // index ใน POSTERS (-1 = ปิด)
  const [editIdx, setEditIdx] = useState(-1);     // index ในตะกร้าที่กำลังแก้
  const keyRef = useRef(0);

  useEffect(() => {
    db.collection('owlMenu').get().then(snap => {
      setMenus(snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.active !== false));
    }).catch(e => { console.error(e); setMenus([]); });
  }, []);

  if (done) return <Done info={done} />;

  const drinks = (menus || []).filter(m => m.category !== 'ท็อปปิ้ง');
  const toppings = (menus || []).filter(m => m.category === 'ท็อปปิ้ง')
                                .sort((a, b) => ((a.sortOrder != null ? a.sortOrder : 1e9) - (b.sortOrder != null ? b.sortOrder : 1e9)) || (a.price - b.price));
  const cats = CATEGORIES.filter(c => (menus || []).some(m => m.category === c));
  const shown = (menus || []).filter(m => m.category === cat)
                      .sort((a, b) => ((a.sortOrder != null ? a.sortOrder : 1e9) - (b.sortOrder != null ? b.sortOrder : 1e9)) || (a.price - b.price) || a.name.localeCompare(b.name));
  const cupCount = cart.reduce((s, c) => s + c.qty, 0);
  const total = cart.reduce((s, c) => s + c.unit * c.qty, 0);

  return (
    <div style={{maxWidth:560, margin:'0 auto', padding:'0 14px 110px'}}>
      <div style={{padding:'20px 2px 6px'}}>
        <div style={{display:'flex', alignItems:'baseline', gap:8}}>
          <div style={{fontWeight:700, fontSize:30, letterSpacing:1}}>OWL{TEST_MODE && <span style={{fontSize:13, background:'#FBE3B9', borderRadius:8, padding:'2px 8px', marginLeft:8, verticalAlign:'middle'}}>🧪 โหมดทดสอบ</span>}</div>
          <div style={{fontSize:13, color:'var(--muted)'}}>フクロウ · อาวน์ชา</div>
        </div>
        <div style={{fontSize:13.5, color:'var(--muted)', marginTop:2, display:'flex', alignItems:'center', gap:10}}>
          <span>สั่งล่วงหน้า รับหน้าร้าน · ไม่ต้องรอคิว 🧋</span>
          <span className="pill press" onClick={() => setPosterAt(0)}
            style={{fontSize:12.5, padding:'4px 11px'}}>📖 โปสเตอร์เมนู</span>
        </div>
      </div>

      <div style={{display:'flex', gap:10, overflowX:'auto', margin:'6px -14px 4px', padding:'0 14px',
                   scrollSnapType:'x mandatory', WebkitOverflowScrolling:'touch'}}>
        {BANNERS.map((b, i) => (
          <img key={i} src={b.img} loading="lazy" className="press" alt=""
            onClick={() => {
              const m = b.menu && drinks.find(x => x.name === b.menu && x.active !== false);
              if (m) setSel(m);
              else if (b.cat && cats.includes(b.cat)) setCat(b.cat);
            }}
            onError={e => { e.target.style.display = 'none'; }}
            style={{width:'84%', maxWidth:430, flexShrink:0, borderRadius:16, scrollSnapAlign:'center',
                    border:'1px solid var(--line)', cursor:'pointer', aspectRatio:'16/9', objectFit:'cover'}} />
        ))}
      </div>
      {lastOrder &&
        <div className="press" onClick={() => setDone(lastOrder)}
          style={{background:'#fff', border:'1.5px solid var(--line)', borderRadius:14,
                  padding:'10px 14px', margin:'4px 0 2px', display:'flex', justifyContent:'space-between',
                  alignItems:'center', cursor:'pointer', fontSize:14}}>
          <span>🧾 เปิดบิลล่าสุด <b>{lastOrder.orderNo}</b> · มารับ {lastOrder.slot} น.</span>
          <span style={{color:'var(--muted)'}}>ดู QR ›</span>
        </div>}
      <div style={{display:'flex', gap:8, overflowX:'auto', padding:'10px 2px', position:'sticky', top:0,
                   background:'var(--bg)', zIndex:10}}>
        {cats.map(c => (
          <div key={c} className={'pill press' + (cat === c ? ' on' : '')} onClick={() => setCat(c)}>{c}</div>
        ))}
      </div>

      {menus === null &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'50px 0'}}>กำลังโหลดเมนู…</div>}
      {menus !== null && shown.length === 0 &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'50px 0'}}>ยังไม่มีเมนูในหมวดนี้</div>}

      {CAT_POSTER[cat] &&
        <div className="press" onClick={() => {
            const i = POSTERS.findIndex(p => p.f === CAT_POSTER[cat]);
            setPosterAt(i >= 0 ? i : 0);
          }}
          style={{display:'flex', alignItems:'center', gap:12, background:'#fff',
                  border:'1px solid var(--line)', borderRadius:16, padding:'8px 12px',
                  marginTop:6, cursor:'pointer'}}>
          <img src={CAT_POSTER[cat]} loading="lazy"
            style={{width:52, height:72, objectFit:'cover', objectPosition:'top',
                    borderRadius:8, background:'var(--soft)', flexShrink:0}}
            onError={e => { e.target.parentNode.style.display = 'none'; }} />
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontWeight:600, fontSize:14.5}}>📖 โปสเตอร์หมวด{cat}</div>
            <div style={{fontSize:12, color:'var(--muted)'}}>แตะดูรูปใหญ่ · เจอแก้วน่ากินกดสั่งได้เลย</div>
          </div>
          <div style={{color:'var(--muted)', fontSize:18}}>›</div>
        </div>}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:10}}>
        {shown.map(m => <MenuCard key={m.id} m={m} onTap={setSel} />)}
      </div>

      {cupCount > 0 && !showCart &&
        <div style={{position:'fixed', left:0, right:0, bottom:0, padding:'12px 14px 20px', zIndex:30,
                     maxWidth:560, margin:'0 auto'}}>
          <button className="btn press" onClick={() => setShowCart(true)}
            style={{width:'100%', background:'var(--ink)', color:'#fff', fontSize:17,
                    display:'flex', justifyContent:'space-between', padding:'14px 18px',
                    boxShadow:'0 8px 24px rgba(29,27,22,.25)'}}>
            <span>🧺 ตะกร้า · {cupCount} แก้ว</span><span>{total} ฿ →</span>
          </button>
        </div>}

      {posterAt >= 0 && <PosterViewer start={posterAt} onClose={() => setPosterAt(-1)}
        onPick={p => {
          if (p.menu){
            const m = drinks.find(x => x.name === p.menu && x.active !== false);
            if (m){ setPosterAt(-1); if (cats.includes(m.category)) setCat(m.category); setSel(m); return; }
          }
          if (p.cat && cats.includes(p.cat)){
            setPosterAt(-1); setCat(p.cat); window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        }} />}
      {sel && <ItemSheet m={sel} toppings={toppings} onClose={() => setSel(null)}
        onAdd={it => setCart(p => [...p, { ...it, key: ++keyRef.current }])} />}
      {showCart && <CartSheet cart={cart} setCart={setCart} profile={profile} inLine={inLine}
        onClose={() => setShowCart(false)} onDone={setDone} onEdit={i => setEditIdx(i)} />}
      {editIdx >= 0 && cart[editIdx] &&
        <ItemSheet m={cart[editIdx].m} init={cart[editIdx]} toppings={toppings}
          onClose={() => setEditIdx(-1)}
          onAdd={it => setCart(p => p.map((c, i) => i === editIdx ? { ...it, key: c.key } : c))} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
