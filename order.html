<html lang="th">
<head>

<style>
  :root{
    --bg:#F7F4ED; --card:#FFFFFF; --ink:#1D1B16; --muted:#8F887B;
    --line:#E7E1D3; --accent:#6E9A55; --accent2:#F2A65A; --soft:#EFEAE0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--ink); font-family:'Kanit',sans-serif}
  .press:active{transform:scale(.97); transition:transform .05s}
  input,select,button{font-family:'Kanit',sans-serif; font-size:16px}
  input,select{width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:12px; background:#fff; color:var(--ink)}
  input:focus,select:focus{outline:none; border-color:var(--ink)}
  .btn{border:none; border-radius:14px; padding:13px 16px; font-weight:600; cursor:pointer}
  .pill{border:1.5px solid var(--line); background:#fff; border-radius:999px; padding:8px 14px; font-size:14px; cursor:pointer; white-space:nowrap}
  .pill.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .sheet-bg{position:fixed; inset:0; background:rgba(29,27,22,.45); z-index:40}
  .sheet{position:fixed; left:0; right:0; bottom:0; background:var(--bg); z-index:50;
         border-radius:22px 22px 0 0; max-height:88vh; overflow-y:auto; padding:18px 16px 26px;
         max-width:560px; margin:0 auto}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ====== ตั้งค่า ====== */
const LIFF_ID = '2010531664-XhbuTZLn';   // ← LIFF "Owl Order" (Owl Cha Login channel)
const NOTIFY_URL = 'PASTE_NOTIFY_URL';    // ← Apps Script "Owl Notify" (แผนสำรองส่งสรุป)
const SHOP_PP_ID = '004999245446611';     // PromptPay ID ร้าน (K+ รับได้ทุกธนาคาร)
const SHOP_PP_NAME = 'น.ส. ณัฐฏฒฑากรณ์ ส. (K+)';
const SHOP_QR_IMG = 'https://phoneyjung.github.io/plp-finance/owl-img/qr-shop.jpg';
const TEST_MODE = /test=1/.test(decodeURIComponent(window.location.search + window.location.hash));
const SHOP_OPEN = '07:00';
const SHOP_CLOSE = '21:00';
const ICES = [
  { k:'normal', t:'ปกติ' },
  { k:'less',   t:'น้ำแข็งน้อย' },
  { k:'no',     t:'ไม่ใส่น้ำแข็ง' },
  { k:'sep',    t:'แยกน้ำแข็ง' },
];
const SWEETS = [
  { k:'none',   t:'ไม่หวาน' },
  { k:'less',   t:'หวานน้อย' },
  { k:'normal', t:'หวานปกติ' },
  { k:'extra',  t:'หวานมาก' },
];
const CATEGORIES = ['ขายดี','คลาสสิค','เฟเวอริต','นมสด','ช็อคโกอาวล์','โซดา','พรีเมียมฟรุต'];

const firebaseConfig = {
  apiKey: "AIzaSyAVaizHIgRcgrufwwI1ohbOinOy0DtTiM0",
  authDomain: "plp-finance.firebaseapp.com",
  projectId: "plp-finance",
  storageBucket: "plp-finance.firebasestorage.app",
  messagingSenderId: "772651276984",
  appId: "1:772651276984:web:46a5953931ba72c146724d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously().catch(e => console.error('auth', e));

function cleanUndefined(obj){
  if (Array.isArray(obj)) return obj.map(cleanUndefined);
  if (obj && typeof obj === 'object'){
    const o = {};
    Object.keys(obj).forEach(k => { if (obj[k] !== undefined) o[k] = cleanUndefined(obj[k]); });
    return o;
  }
  return obj;
}
function todayKey(){
  const x = new Date();
  return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
}
async function nextOrderNo(){
  const ref = db.collection('settings').doc('owlOrderCounter');
  const day = todayKey();
  const n = await db.runTransaction(async tx => {
    const snap = await tx.get(ref);
    const d = snap.exists ? snap.data() : {};
    const next = (d.day === day ? (d.seq || 0) : 0) + 1;
    tx.set(ref, { day, seq: next });
    return next;
  });
  return 'PE' + String(n).padStart(3, '0');
}
function crc16(s){
  let crc = 0xFFFF;
  for (let i = 0; i < s.length; i++){
    crc ^= s.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++){
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4, '0');
}
function tlv(id, v){ return id + String(v.length).padStart(2, '0') + v; }
function shopPayload(amount){
  let p = tlv('00','01') + tlv('01','12') +
          tlv('29', tlv('00','A000000677010111') + tlv('03', SHOP_PP_ID)) +
          tlv('53','764') + tlv('54', amount.toFixed(2)) + tlv('58','TH');
  p += '6304';
  return p + crc16(p);
}
function slotList(){
  const now = new Date();
  const first = new Date(now.getTime() + (TEST_MODE ? 5 : 20)*60000);
  first.setMinutes(Math.ceil(first.getMinutes()/15)*15, 0, 0);
  const [oh, om] = SHOP_OPEN.split(':').map(Number);
  const open = new Date(); open.setHours(oh, om, 0, 0);
  if (!TEST_MODE && first < open) first.setTime(open.getTime());
  const [ch, cm] = SHOP_CLOSE.split(':').map(Number);
  const close = TEST_MODE ? new Date(now.getTime() + 3*3600000) : new Date();
  if (!TEST_MODE) close.setHours(ch, cm, 0, 0);
  const out = [];
  for (let t = new Date(first); t <= close; t = new Date(t.getTime() + 15*60000)){
    out.push(String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0'));
  }
  return out;
}

/* ====== LIFF ====== */
function useLiff(){
  const [profile, setProfile] = useState(null);
  const [inLine, setInLine] = useState(false);
  useEffect(() => {
    if (!window.liff || LIFF_ID.indexOf('PASTE') === 0) return;
    liff.init({ liffId: LIFF_ID }).then(async () => {
      setInLine(liff.isInClient());
      if (liff.isLoggedIn()){
        try{ setProfile(await liff.getProfile()); }catch(e){}
      } else if (liff.isInClient()){
        liff.login();
      }
    }).catch(e => console.warn('liff', e));
  }, []);
  return { profile, inLine };
}

/* ====== การ์ดเมนู ====== */
function MenuCard({ m, onTap }){
  return (
    <div className="press" onClick={() => onTap(m)}
      style={{background:'var(--card)', borderRadius:16, overflow:'hidden',
              border:'1px solid var(--line)', cursor:'pointer'}}>
      <div style={{aspectRatio:'1/1', background:'var(--soft)'}}>
        {m.photo
          ? <img src={m.photo} loading="lazy" style={{width:'100%', height:'100%', objectFit:'cover'}} />
          : <div style={{width:'100%', height:'100%', display:'flex', alignItems:'center',
                         justifyContent:'center', fontSize:34}}>🧋</div>}
      </div>
      <div style={{padding:'8px 10px 10px'}}>
        <div style={{fontWeight:600, fontSize:14, lineHeight:1.25}}>{m.name}</div>
        <div style={{fontSize:12, color:'var(--muted)', lineHeight:1.3}}>{m.nameTh || m.desc || ''}</div>
        <div style={{fontWeight:700, marginTop:4}}>{m.price}<span style={{fontSize:12, fontWeight:500}}> ฿</span></div>
      </div>
    </div>
  );
}

/* ====== ชีทเลือกตัวเลือกแก้ว ====== */
function ItemSheet({ m, toppings, onAdd, onClose }){
  const [sweet, setSweet] = useState('normal');
  const [ice, setIce] = useState('normal');
  const [tops, setTops] = useState([]);   // [{...topping, n:จำนวนช้อน}]
  const MAX1 = t => /cheese/i.test(t.name || '') || /ชีส/.test(t.nameTh || '');
  const [qty, setQty] = useState(1);
  const unit = m.price + tops.reduce((s, t) => s + t.price * t.n, 0);
  const chTop = (t, d) => setTops(p => {
    const cur = p.find(x => x.id === t.id);
    const max = MAX1(t) ? 1 : 5;
    const n = Math.max(0, Math.min(max, (cur ? cur.n : 0) + d));
    if (n === 0) return p.filter(x => x.id !== t.id);
    if (cur) return p.map(x => x.id === t.id ? { ...x, n } : x);
    return [...p, { ...t, n }];
  });
  return (
    <>
      <div className="sheet-bg" onClick={onClose} />
      <div className="sheet">
        <div style={{display:'flex', gap:14}}>
          <div style={{width:92, height:92, borderRadius:14, overflow:'hidden', background:'var(--soft)', flexShrink:0}}>
            {m.photo ? <img src={m.photo} style={{width:'100%', height:'100%', objectFit:'cover'}} /> :
              <div style={{lineHeight:'92px', textAlign:'center', fontSize:32}}>🧋</div>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700, fontSize:18, lineHeight:1.2}}>{m.name}</div>
            <div style={{fontSize:13, color:'var(--muted)'}}>{m.nameTh || m.desc || ''}</div>
            <div style={{fontWeight:700, marginTop:4, fontSize:17}}>{m.price} ฿</div>
          </div>
          <div onClick={onClose} style={{fontSize:22, color:'var(--muted)', cursor:'pointer'}}>✕</div>
        </div>

        {toppings.length > 0 && <>
          <div style={{margin:'16px 0 8px', fontWeight:600, fontSize:15}}>ท็อปปิ้ง <span style={{color:'var(--muted)', fontWeight:400, fontSize:13}}>(เลือกได้หลายอย่าง)</span></div>
          {toppings.map(t => {
            const cur = tops.find(x => x.id === t.id);
            const n = cur ? cur.n : 0;
            const max1 = MAX1(t);
            return (
              <div key={t.id}
                style={{display:'flex', alignItems:'center', gap:10, padding:'7px 10px', marginBottom:6,
                        background:'#fff', borderRadius:12,
                        border:'1.5px solid ' + (n > 0 ? 'var(--ink)' : 'var(--line)')}}>
                <div style={{width:38, height:38, borderRadius:9, overflow:'hidden', background:'var(--soft)', flexShrink:0}}>
                  {t.photo ? <img src={t.photo} loading="lazy" style={{width:'100%', height:'100%', objectFit:'cover'}} /> :
                    <div style={{lineHeight:'38px', textAlign:'center', fontSize:17}}>🥄</div>}
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:14, lineHeight:1.2}}>{t.nameTh || t.name}</div>
                  <div style={{fontSize:12, color:'var(--muted)'}}>+{t.price} ฿{max1 ? '' : ' /ช้อน'}</div>
                </div>
                {n === 0
                  ? <button className="btn press" onClick={() => chTop(t, 1)}
                      style={{background:'var(--soft)', color:'var(--ink)', padding:'6px 16px', fontSize:14}}>เพิ่ม</button>
                  : <div style={{display:'flex', alignItems:'center', gap:0, border:'1.5px solid var(--ink)',
                                 borderRadius:999, overflow:'hidden', background:'#fff'}}>
                      <button className="press" onClick={() => chTop(t, -1)}
                        style={{border:'none', background:'none', width:34, height:32, fontSize:17}}>−</button>
                      <div style={{width:26, textAlign:'center', fontWeight:700, fontSize:15}}>{n}</div>
                      <button className="press" onClick={() => chTop(t, 1)} disabled={max1 && n >= 1}
                        style={{border:'none', background:'none', width:34, height:32, fontSize:17,
                                opacity:(max1 && n >= 1) ? .25 : 1}}>+</button>
                    </div>}
              </div>
            );
          })}
        </>}

        <div style={{margin:'16px 0 8px', fontWeight:600, fontSize:15}}>น้ำแข็ง</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {ICES.map(s => (
            <div key={s.k} className={'pill press' + (ice === s.k ? ' on' : '')}
              onClick={() => setIce(s.k)}>{s.t}</div>
          ))}
        </div>

        <div style={{margin:'16px 0 8px', fontWeight:600, fontSize:15}}>ระดับความหวาน</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {SWEETS.map(s => (
            <div key={s.k} className={'pill press' + (sweet === s.k ? ' on' : '')}
              onClick={() => setSweet(s.k)}>{s.t}</div>
          ))}
        </div>

        <div style={{display:'flex', alignItems:'center', gap:14, margin:'16px 0'}}>
          <div style={{fontWeight:600, fontSize:15}}>จำนวน</div>
          <div style={{display:'flex', alignItems:'center', gap:0, border:'1.5px solid var(--line)',
                       borderRadius:999, overflow:'hidden', background:'#fff'}}>
            <button className="press" onClick={() => setQty(q => Math.max(1, q-1))}
              style={{border:'none', background:'none', width:42, height:38, fontSize:20}}>−</button>
            <div style={{width:36, textAlign:'center', fontWeight:700}}>{qty}</div>
            <button className="press" onClick={() => setQty(q => Math.min(20, q+1))}
              style={{border:'none', background:'none', width:42, height:38, fontSize:20}}>+</button>
          </div>
        </div>

        <button className="btn press" style={{width:'100%', background:'var(--accent)', color:'#fff', fontSize:17}}
          onClick={() => { onAdd({ m, sweet, ice, tops, qty, unit }); onClose(); }}>
          ใส่ตะกร้า · {unit * qty} ฿
        </button>
      </div>
    </>
  );
}

/* ====== ตะกร้า + ยืนยัน ====== */
function CartSheet({ cart, setCart, profile, inLine, onDone, onClose }){
  const [name, setName] = useState(profile ? profile.displayName : '');
  const [phone, setPhone] = useState('');
  const [slot, setSlot] = useState('');
  const [busy, setBusy] = useState(false);
  const slots = useMemo(slotList, []);
  const total = cart.reduce((s, c) => s + c.unit * c.qty, 0);

  const chQty = (i, d) => setCart(p => p.map((c, x) => x === i ? { ...c, qty: Math.max(1, c.qty + d) } : c));
  const rm = i => setCart(p => p.filter((_, x) => x !== i));

  const confirm = async () => {
    if (!cart.length) return;
    if (!name.trim()) return alert('กรุณาใส่ชื่อ');
    const ph = phone.replace(/[^0-9]/g, '');
    if (ph.length < 9 || ph.length > 10) return alert('กรุณาใส่เบอร์โทร 9-10 หลัก');
    if (!slot && TEST_MODE) return alert('เลือกเวลาก่อนครับ');
    if (!slot) return alert('วันนี้ปิดรับออเดอร์แล้วครับ 🙏 ร้านเปิดรับอีกครั้งพรุ่งนี้ ' + SHOP_OPEN + ' น.');
    { const [hh, mm] = slot.split(':').map(Number);
      const t = new Date(); t.setHours(hh, mm, 0, 0);
      if (t < new Date()) return alert('เวลาที่เลือกผ่านไปแล้ว กรุณาเลือกเวลาใหม่ครับ'); }
    setBusy(true);
    try{
      const [h, mn] = slot.split(':').map(Number);
      const pickup = new Date(); pickup.setHours(h, mn, 0, 0);
      const prepList = cart.map(c => c.m.prepMin || 10).filter(x => x > 0);
      const minPrep = prepList.length ? Math.min(...prepList) : 10;
      const start = new Date(pickup.getTime() - minPrep * 60000);
      const items = cart.map(c => ({
        menuId: c.m.id, name: c.m.name, nameTh: c.m.nameTh || '',
        sweetness: c.sweet, ice: c.ice || 'normal', toppings: c.tops.map(t => ({ name: t.nameTh || t.name, price: t.price, n: t.n })),
        qty: c.qty, price: c.m.price, unit: c.unit, prepMin: c.m.prepMin || 10
      }));
      const orderNo = await nextOrderNo();
      const doc = cleanUndefined({
        orderNo,
        status: 'new', paid: false, dateKey: todayKey(),
        ...(TEST_MODE ? { test: true } : {}),
        createdAt: new Date().toISOString(),
        pickupAt: pickup.toISOString(), startAt: start.toISOString(),
        total,
        customer: { name: name.trim(), phone: ph,
                    lineUserId: profile ? profile.userId : '', lineName: profile ? profile.displayName : '' },
        items
      });
      const ref = await db.collection('owlOrders').add(doc);

      // ส่งสรุปเข้าแชทร้าน (ในนามลูกค้า) — ลูกค้าเก็บไว้โชว์หน้าร้าน + แอดมินเห็นทันที
      const sw = { none:'ไม่หวาน', less:'หวานน้อย', normal:'หวานปกติ', extra:'หวานมาก' };
      const ic = { less:'น้ำแข็งน้อย', no:'ไม่ใส่น้ำแข็ง', sep:'แยกน้ำแข็ง' };
      const lines = items.map(it =>
        '• ' + (it.nameTh || it.name) + ' (' + (sw[it.sweetness] || '') + (ic[it.ice] ? '/' + ic[it.ice] : '') +
        (it.toppings.length ? ' +' + it.toppings.map(t => t.name + (t.n > 1 ? 'x' + t.n : '')).join('/') : '') + ') ×' + it.qty
      ).join('\n');
      const summaryText = '🦉 สั่งล่วงหน้า Owl Cha\n' + lines +
        '\nรวม ' + total + ' บาท\n👤 ' + name.trim() + ' 📞 ' + ph +
        '\n🕐 มารับ ' + slot + ' น.\n📌 หมายเลขออเดอร์ ' + orderNo +
        '\n\n💸 กรุณาโอน ' + total + ' บาท ตาม QR ที่ส่งให้ (บัญชี ' + SHOP_PP_NAME + ')' +
        '\nแล้วส่งสลิปในแชทนี้ ร้านจะเริ่มทำหลังยืนยันยอดครับ';
      let sendStatus = 'notline';
      if (inLine && window.liff && liff.isInClient()){
        try{
          await liff.sendMessages([
            { type:'text', text: summaryText },
            { type:'image', originalContentUrl: SHOP_QR_IMG, previewImageUrl: SHOP_QR_IMG }
          ]);
          sendStatus = 'ok';
        }catch(e){
          sendStatus = (e && (e.message || e.code)) || 'unknown';
          console.warn('sendMessages', e);
        }
      }
      if (sendStatus !== 'ok' && NOTIFY_URL.indexOf('PASTE') !== 0 && profile && profile.userId){
        try{
          fetch(NOTIFY_URL, { method:'POST', headers:{ 'Content-Type':'text/plain' },
            body: JSON.stringify({ userId: profile.userId, text: summaryText }) }).catch(() => {});
          sendStatus = 'push';
        }catch(e){}
      }
            onDone({ id: ref.id, orderNo, slot, total, name: name.trim(), sendStatus });
    }catch(e){ alert('สั่งไม่สำเร็จ: ' + e.message); }
    setBusy(false);
  };

  return (
    <>
      <div className="sheet-bg" onClick={onClose} />
      <div className="sheet">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div style={{fontWeight:700, fontSize:19}}>ตะกร้า ({cart.reduce((s,c)=>s+c.qty,0)} แก้ว)</div>
          <div onClick={onClose} style={{fontSize:22, color:'var(--muted)', cursor:'pointer'}}>✕</div>
        </div>
        {cart.map((c, i) => (
          <div key={c.key} style={{background:'#fff', borderRadius:14, padding:'10px 12px', marginBottom:8,
                                   border:'1px solid var(--line)'}}>
            <div style={{display:'flex', justifyContent:'space-between', gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600, fontSize:15}}>{c.m.nameTh || c.m.name}</div>
                <div style={{fontSize:12.5, color:'var(--muted)'}}>
                  {SWEETS.find(s => s.k === c.sweet).t}{c.ice && c.ice !== 'normal' ? ' · ' + ICES.find(s => s.k === c.ice).t : ''}
                  {c.tops.length > 0 && ' · ' + c.tops.map(t => (t.nameTh || t.name) + (t.n > 1 ? '×' + t.n : '')).join(', ')}
                </div>
              </div>
              <div style={{fontWeight:700}}>{c.unit * c.qty} ฿</div>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10, marginTop:6}}>
              <button className="press" onClick={() => chQty(i, -1)}
                style={{width:30, height:30, borderRadius:8, border:'1.5px solid var(--line)', background:'#fff'}}>−</button>
              <div style={{fontWeight:600}}>{c.qty}</div>
              <button className="press" onClick={() => chQty(i, 1)}
                style={{width:30, height:30, borderRadius:8, border:'1.5px solid var(--line)', background:'#fff'}}>+</button>
              <div style={{flex:1}} />
              <div onClick={() => rm(i)} style={{fontSize:13, color:'var(--muted)', cursor:'pointer'}}>ลบ</div>
            </div>
          </div>
        ))}
        {cart.length === 0 && <div style={{textAlign:'center', color:'var(--muted)', padding:'20px 0'}}>ตะกร้าว่าง</div>}

        {cart.length > 0 && <>
          <div style={{borderTop:'1.5px dashed var(--line)', margin:'12px 0', paddingTop:12,
                       display:'flex', justifyContent:'space-between', fontWeight:700, fontSize:17}}>
            <div>รวมทั้งหมด</div><div>{total} ฿</div>
          </div>
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:4}}>ชื่อผู้สั่ง</div>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="ชื่อเล่นก็ได้" style={{marginBottom:10}} />
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:4}}>เบอร์โทรกลับ</div>
          <input value={phone} onChange={e => setPhone(e.target.value)} inputMode="tel" placeholder="08xxxxxxxx" style={{marginBottom:10}} />
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:4}}>เวลามารับ (วันนี้)</div>
          {slots.length
            ? <select value={slot} onChange={e => setSlot(e.target.value)} style={{marginBottom:14}}>
                <option value="">— เลือกเวลา —</option>
                {slots.map(s => <option key={s} value={s}>{s} น.</option>)}
              </select>
            : <div style={{color:'var(--muted)', marginBottom:14}}>วันนี้ปิดรับออเดอร์แล้ว (รับออเดอร์ {SHOP_OPEN}–{SHOP_CLOSE} น.) แวะมาใหม่พรุ่งนี้นะครับ 🦉</div>}
          <button className="btn press" disabled={busy || !slots.length} onClick={confirm}
            style={{width:'100%', background:slots.length ? 'var(--ink)' : 'var(--line)',
                    color:slots.length ? '#fff' : 'var(--muted)', fontSize:17,
                    cursor:slots.length ? 'pointer' : 'not-allowed'}}>
            {!slots.length ? '🌙 ปิดรับออเดอร์วันนี้ · เปิดพรุ่งนี้ ' + SHOP_OPEN + ' น.'
              : busy ? 'กำลังส่งออเดอร์…' : 'ยืนยันสั่ง · ' + total + ' ฿'}
          </button>
          <div style={{fontSize:12.5, color:'var(--muted)', marginTop:10, lineHeight:1.5}}>
            ยืนยันแล้วจะได้ QR โอนชำระก่อน ร้านเริ่มทำหลังได้รับยอด · 📍 หน้าหอเพชรรัตน์ 4 ตรงข้ามโรงอาหารเพชรรัตน์
          </div>
        </>}
      </div>
    </>
  );
}

/* ====== หน้าสำเร็จ ====== */
function Done({ info }){
  const qrRef = useRef(null);
  const saveQr = async () => {
    try{
      const canvas = qrRef.current && qrRef.current.querySelector('canvas');
      const img = qrRef.current && qrRef.current.querySelector('img');
      const dataUrl = canvas ? canvas.toDataURL('image/png') : (img && img.src);
      if (!dataUrl) throw 0;
      if (navigator.canShare && window.File){
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], 'owl-qr-' + info.orderNo + '.png', { type:'image/png' });
        if (navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file] });
          return;
        }
      }
      const a = document.createElement('a');
      a.href = dataUrl; a.download = 'owl-qr-' + info.orderNo + '.png';
      document.body.appendChild(a); a.click(); a.remove();
    }catch(e){
      alert('กดค้างที่รูป QR แล้วเลือก "บันทึกรูปภาพ" ได้เลยครับ');
    }
  };
  useEffect(() => {
    if (qrRef.current && window.QRCode){
      qrRef.current.innerHTML = '';
      new QRCode(qrRef.current, { text: shopPayload(info.total),
                                  width: 190, height: 190, correctLevel: QRCode.CorrectLevel.M });
    }
  }, []);
  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div style={{background:'#fff', borderRadius:22, padding:'28px 22px', maxWidth:400, width:'100%',
                   textAlign:'center', border:'1px solid var(--line)'}}>
        <div style={{fontSize:52}}>🦉</div>
        <div style={{fontWeight:700, fontSize:21, margin:'6px 0 2px'}}>รับออเดอร์แล้ว!</div>
        <div style={{fontWeight:700, fontSize:26, color:'var(--accent)', margin:'2px 0'}}>{info.orderNo}</div>
        <div style={{color:'var(--muted)', fontSize:14}}>คุณ{info.name}</div>
        <div style={{background:'var(--soft)', borderRadius:14, padding:14, margin:'14px 0 10px', fontSize:15, lineHeight:1.8, textAlign:'left'}}>
          🕐 มารับเวลา <b>{info.slot} น.</b> · ยอดชำระ <b>{info.total} ฿</b><br/>
          1️⃣ สแกน QR โอน <b>{info.total} บาท</b><br/>
          2️⃣ ส่งสลิปในแชท Owl Cha 📎<br/>
          3️⃣ ถึงเวลารับ ไปที่ร้าน แจ้งชื่อได้เลย 🧋
        </div>
        <div style={{background:'#fff', border:'1.5px solid var(--line)', borderRadius:14, padding:'14px 10px 8px', marginBottom:12}}>
          <div ref={qrRef} style={{display:'flex', justifyContent:'center'}} />
          <div style={{fontSize:13, color:'var(--muted)', marginTop:8, lineHeight:1.5}}>
            ยอด {info.total}.00 บาท · ชื่อบัญชี <b style={{color:'var(--ink)'}}>{SHOP_PP_NAME}</b><br/>
            เช็คชื่อบัญชีก่อนกดโอนทุกครั้ง
          </div>
          <button className="btn press" onClick={saveQr}
            style={{marginTop:10, background:'var(--ink)', color:'#fff', fontSize:14.5, width:'100%'}}>
            💾 เซฟรูป QR ไปสแกนในแอปธนาคาร
          </button>
          <div style={{fontSize:12, color:'var(--muted)', marginTop:8, lineHeight:1.6, textAlign:'left'}}>
            💡 โอนจากมือถือเครื่องนี้: แคปหน้าจอนี้ → เปิดแอปธนาคาร → สแกน → เลือกรูปจากคลังภาพ หรือใช้รูป QR ที่ส่งเข้าแชท Owl Cha แล้วใส่ยอดเอง
          </div>
        </div>
        <div style={{fontSize:13, color:'var(--muted)'}}>📍 หน้าหอเพชรรัตน์ 4 ตรงข้ามโรงอาหารเพชรรัตน์</div>
        {(info.sendStatus === 'ok' || info.sendStatus === 'push')
          ? <div style={{marginTop:10, fontSize:13, color:'var(--accent)', fontWeight:600}}>✅ ส่งสรุปออเดอร์เข้าแชทแล้ว</div>
          : <div style={{marginTop:10, fontSize:12.5, color:'#B4552D', lineHeight:1.5}}>
              ⚠️ ยังไม่ได้ส่งสรุปเข้าแชท ({info.sendStatus === 'notline' ? 'ไม่ได้เปิดผ่าน LINE' : String(info.sendStatus).slice(0, 120)})
              <br/>ใช้หน้านี้โชว์พนักงานแทนได้เลย
            </div>}
      </div>
    </div>
  );
}

/* ====== App ====== */
function App(){
  const { profile, inLine } = useLiff();
  const [menus, setMenus] = useState(null);
  const [cat, setCat] = useState('ขายดี');
  const [sel, setSel] = useState(null);
  const [cart, setCart] = useState([]);
  const [showCart, setShowCart] = useState(false);
  const [done, setDone] = useState(null);
  const keyRef = useRef(0);

  useEffect(() => {
    db.collection('owlMenu').get().then(snap => {
      setMenus(snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.active !== false));
    }).catch(e => { console.error(e); setMenus([]); });
  }, []);

  if (done) return <Done info={done} />;

  const drinks = (menus || []).filter(m => m.category !== 'ท็อปปิ้ง');
  const toppings = (menus || []).filter(m => m.category === 'ท็อปปิ้ง')
                                .sort((a, b) => ((a.sortOrder != null ? a.sortOrder : 1e9) - (b.sortOrder != null ? b.sortOrder : 1e9)) || (a.price - b.price));
  const cats = CATEGORIES.filter(c => drinks.some(m => m.category === c));
  const shown = drinks.filter(m => m.category === cat)
                      .sort((a, b) => ((a.sortOrder != null ? a.sortOrder : 1e9) - (b.sortOrder != null ? b.sortOrder : 1e9)) || (a.price - b.price) || a.name.localeCompare(b.name));
  const cupCount = cart.reduce((s, c) => s + c.qty, 0);
  const total = cart.reduce((s, c) => s + c.unit * c.qty, 0);

  return (
    <div style={{maxWidth:560, margin:'0 auto', padding:'0 14px 110px'}}>
      <div style={{padding:'20px 2px 6px'}}>
        <div style={{display:'flex', alignItems:'baseline', gap:8}}>
          <div style={{fontWeight:700, fontSize:30, letterSpacing:1}}>OWL{TEST_MODE && <span style={{fontSize:13, background:'#FBE3B9', borderRadius:8, padding:'2px 8px', marginLeft:8, verticalAlign:'middle'}}>🧪 โหมดทดสอบ</span>}</div>
          <div style={{fontSize:13, color:'var(--muted)'}}>フクロウ · อาวน์ชา</div>
        </div>
        <div style={{fontSize:13.5, color:'var(--muted)', marginTop:2}}>
          สั่งล่วงหน้า รับหน้าร้าน · ไม่ต้องรอคิว 🧋
        </div>
      </div>

      <div style={{display:'flex', gap:8, overflowX:'auto', padding:'10px 2px', position:'sticky', top:0,
                   background:'var(--bg)', zIndex:10}}>
        {cats.map(c => (
          <div key={c} className={'pill press' + (cat === c ? ' on' : '')} onClick={() => setCat(c)}>{c}</div>
        ))}
      </div>

      {menus === null &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'50px 0'}}>กำลังโหลดเมนู…</div>}
      {menus !== null && shown.length === 0 &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'50px 0'}}>ยังไม่มีเมนูในหมวดนี้</div>}

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:6}}>
        {shown.map(m => <MenuCard key={m.id} m={m} onTap={setSel} />)}
      </div>

      {cupCount > 0 && !showCart &&
        <div style={{position:'fixed', left:0, right:0, bottom:0, padding:'12px 14px 20px', zIndex:30,
                     maxWidth:560, margin:'0 auto'}}>
          <button className="btn press" onClick={() => setShowCart(true)}
            style={{width:'100%', background:'var(--ink)', color:'#fff', fontSize:17,
                    display:'flex', justifyContent:'space-between', padding:'14px 18px',
                    boxShadow:'0 8px 24px rgba(29,27,22,.25)'}}>
            <span>🧺 ตะกร้า · {cupCount} แก้ว</span><span>{total} ฿ →</span>
          </button>
        </div>}

      {sel && <ItemSheet m={sel} toppings={toppings} onClose={() => setSel(null)}
        onAdd={it => setCart(p => [...p, { ...it, key: ++keyRef.current }])} />}
      {showCart && <CartSheet cart={cart} setCart={setCart} profile={profile} inLine={inLine}
        onClose={() => setShowCart(false)} onDone={setDone} />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
