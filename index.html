function DividendSheet({shop,user,holders,onClose,onSaved,toast}){
  const [pool,setPool]=useState(''); const [busy,setBusy]=useState(false);
  const inpN={width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:20,fontWeight:600,marginBottom:14};
  const pos=holders.filter(h=>h.net>0); const totalPos=pos.reduce((s,h)=>s+h.net,0);
  const p=Number(pool)||0;
  const split=pos.map(h=>({name:h.name,pct: totalPos>0?(h.net/totalPos)*100:0, share: totalPos>0?Math.round(p*(h.net/totalPos)):0}));
  const save=async()=>{
    if(p<=0){ toast('กรอกยอดปันผลรวม','err'); return; }
    setBusy(true);
    try{ for(const s of split){ if(s.share>0) await addCapital({shopId:shop.id,shareholder:s.name,type:'dividend',amount:s.share,note:'ปันผลรวม '+p.toLocaleString('en-US'),by:user.name,actor:{id:user.id,name:user.name}}); }
      toast('บันทึกปันผลแล้ว'); onSaved();
    }catch(e){ toast('บันทึกไม่สำเร็จ','err'); setBusy(false); }
  };
  return (
    <Sheet title="จ่ายปันผล" onClose={onClose} z={60}>
      <div style={{fontSize:12.5,color:'var(--muted)',marginBottom:14}}>กรอกยอดปันผลรวม ระบบจะแบ่งตามสัดส่วนหุ้นให้อัตโนมัติ</div>
      <label style={lbl}>ยอดปันผลรวม (บาท)</label>
      <input value={pool} onChange={e=>setPool(e.target.value.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="0" className="num" style={inpN}/>
      {p>0 && (
        <div style={{background:'var(--tint)',border:'1px solid var(--line)',borderRadius:14,padding:14,marginBottom:14}}>
          <div className="kanit" style={{fontWeight:600,fontSize:14,marginBottom:8}}>แบ่งให้แต่ละคน</div>
          {split.map(s=>(
            <div key={s.name} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13.5}}>
              <span>{s.name} <span style={{color:'var(--muted)',fontSize:12}}>· {s.pct.toFixed(1)}%</span></span>
              <span className="num" style={{fontWeight:700}}>{baht(s.share)}</span>
            </div>
          ))}
        </div>
      )}
      <button onClick={save} disabled={busy||p<=0} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:(busy||p<=0)?.5:1}}>{busy?'กำลังบันทึก...':'บันทึกปันผล'}</button>
    </Sheet>
  );
}

/* ---------- PHASE 2 · ออกรายงาน (Excel / PDF) ---------- */
function Report({shop,ym,onClose,toast}){
  const TM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [load,setLoad]=useState(true);
  const [txns,setTxns]=useState([]);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ (async()=>{ setLoad(true); try{ setTxns(await monthTxns(shop.id,ym)); }catch(e){ console.error(e); } setLoad(false); })(); },[shop.id,ym]);

  const list=[...txns].sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:((a.ts?.seconds||0)-(b.ts?.seconds||0)));
  const income=sumBy(txns,x=>x.kind==='income'), expense=sumBy(txns,x=>x.kind==='expense'), profit=income-expense;
  const [yy,mm]=ym.split('-').map(Number);
  const monthLabel=`${TM[mm-1]} ${yy+543}`; const gen=today();
  const aggCat=(k)=>{ const m={}; txns.filter(t=>t.kind===k).forEach(t=>{ const c=t.category||'อื่นๆ'; m[c]=(m[c]||0)+(Number(t.amount)||0); }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const expCat=aggCat('expense'), incCat=aggCat('income');

  const excel=async()=>{ setBusy(true);
    try{ const XLSX=await loadXLSX();
      const rows=[['รายงานการเงิน',shop.name],['เดือน',monthLabel],['ออกรายงาน',gen],[],['วันที่','ประเภท','หมวด','ช่องทาง','จำนวนเงิน','หมายเหตุ']];
      list.forEach(t=>rows.push([t.date,t.kind==='income'?'รายรับ':'รายจ่าย',t.category,t.method==='cash'?'เงินสด':'โอน',Number(t.amount)||0,t.note||'']));
      rows.push([],['','','','','รวมรายรับ',income],['','','','','รวมรายจ่าย',expense],['','','','','กำไรสุทธิ',profit]);
      const ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=[{wch:12},{wch:9},{wch:22},{wch:9},{wch:12},{wch:26}];
      const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'รายงาน');
      XLSX.writeFile(wb,`รายงาน_${shop.name}_${ym}.xlsx`);
    }catch(e){ console.error(e); toast('ส่งออก Excel ไม่สำเร็จ','err'); }
    setBusy(false);
  };
  const pdf=()=>{
    const esc=(s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const rowsH=list.map(t=>'<tr><td>'+esc(t.date)+'</td><td>'+(t.kind==='income'?'รายรับ':'รายจ่าย')+'</td><td>'+esc(t.category)+'</td><td>'+(t.method==='cash'?'เงินสด':'โอน')+'</td><td class="r '+(t.kind==='income'?'g':'rd')+'">'+(Number(t.amount)||0).toLocaleString('en-US')+'</td><td>'+esc(t.note)+'</td></tr>').join('');
    const html='<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>รายงาน '+esc(shop.name)+' '+monthLabel+'</title><style>*{font-family:Sarabun,"Noto Sans Thai",Tahoma,sans-serif}body{padding:22px;color:#1a1a1a;font-size:13px}h1{font-size:18px;margin:0 0 2px}.sub{color:#666;font-size:12px;margin-bottom:14px}.sum{display:flex;gap:10px;margin:14px 0}.box{flex:1;border:1px solid #e3e3e3;border-radius:8px;padding:10px 12px}.box .l{font-size:11px;color:#777}.box .v{font-size:16px;font-weight:700;margin-top:3px}table{border-collapse:collapse;width:100%;font-size:12px;margin-top:6px}th,td{border:1px solid #e3e3e3;padding:6px 8px;text-align:left}th{background:#f5f5f5;font-size:11px}td.r{text-align:right}.g{color:#16A34A}.rd{color:#DC2626}.ft{margin-top:18px;font-size:11px;color:#999;text-align:center}@media print{body{padding:6px}}</style></head><body><h1>รายงานการเงิน · '+esc(shop.name)+'</h1><div class="sub">ประจำเดือน '+monthLabel+' · ออกรายงาน '+gen+'</div><div class="sum"><div class="box"><div class="l">รายรับรวม</div><div class="v g">'+income.toLocaleString('en-US')+' ฿</div></div><div class="box"><div class="l">รายจ่ายรวม</div><div class="v rd">'+expense.toLocaleString('en-US')+' ฿</div></div><div class="box"><div class="l">กำไรสุทธิ</div><div class="v">'+profit.toLocaleString('en-US')+' ฿</div></div></div><table><thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวด</th><th>ช่องทาง</th><th>จำนวนเงิน</th><th>หมายเหตุ</th></tr></thead><tbody>'+(rowsH||'<tr><td colspan="6" style="text-align:center;color:#999">ไม่มีรายการ</td></tr>')+'</tbody></table><div class="ft">PLP Finance · สร้างอัตโนมัติ</div><scr'+'ipt>window.onload=function(){setTimeout(function(){window.print()},350)}<\/scr'+'ipt></body></html>';
    const w=window.open('','_blank');
    if(!w){ toast('เปิดหน้าต่างไม่ได้ — โปรดอนุญาต popup แล้วลองใหม่','err'); return; }
    w.document.open(); w.document.write(html); w.document.close();
  };

  return (
    <Sheet title="ออกรายงาน" onClose={onClose} z={70}>
      <div style={{fontSize:13,color:'var(--muted)'}}>{shop.name} · เดือน {monthLabel}</div>
      {load? <div style={{padding:'30px 0'}}><Loading/></div> : (<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,margin:'12px 0 16px'}}>
          {[['รายรับ',income,'var(--pos)'],['รายจ่าย',expense,'var(--neg)'],['กำไร',profit,profit>=0?'var(--primary)':'var(--neg)']].map(([l,v,c])=>(
            <div key={l} style={{border:'1px solid var(--line)',borderRadius:12,padding:'10px 6px',textAlign:'center'}}>
              <div style={{fontSize:11,color:'var(--muted)'}}>{l}</div>
              <div className="num" style={{fontWeight:700,fontSize:13,color:c,marginTop:3}}>{baht(v)}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <button onClick={excel} disabled={busy} className="press kanit" style={{flex:1,padding:'13px',border:'none',borderRadius:13,background:'#1D6F42',color:'#fff',fontWeight:600,fontSize:14.5,opacity:busy?.6:1,display:'flex',justifyContent:'center',alignItems:'center',gap:7}}><I.table/> {busy?'กำลังสร้าง...':'Excel'}</button>
          <button onClick={pdf} className="press kanit" style={{flex:1,padding:'13px',border:'none',borderRadius:13,background:'#C0392B',color:'#fff',fontWeight:600,fontSize:14.5,display:'flex',justifyContent:'center',alignItems:'center',gap:7}}><I.receipt/> PDF</button>
        </div>
        <div style={{fontSize:11.5,color:'var(--muted)',marginBottom:18,textAlign:'center',lineHeight:1.5}}>{list.length} รายการในเดือนนี้ · PDF จะเปิดหน้าใหม่ให้กด “บันทึกเป็น PDF”</div>

        {expCat.length>0 && (<div style={{marginBottom:14}}>
          <div className="kanit" style={{fontWeight:600,fontSize:14,marginBottom:6}}>รายจ่ายแยกหมวด</div>
          {expCat.map(([c,v])=><div key={c} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13,borderBottom:'1px solid var(--line)'}}><span>{c}</span><span className="num" style={{fontWeight:600,color:'var(--neg)'}}>{baht(v)}</span></div>)}
        </div>)}
        {incCat.length>0 && (<div style={{marginBottom:6}}>
          <div className="kanit" style={{fontWeight:600,fontSize:14,marginBottom:6}}>รายรับแยกหมวด</div>
          {incCat.map(([c,v])=><div key={c} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13,borderBottom:'1px solid var(--line)'}}><span>{c}</span><span className="num" style={{fontWeight:600,color:'var(--pos)'}}>{baht(v)}</span></div>)}
        </div>)}
      </>)}
    </Sheet>
  );
}

/* ---------- PHASE 2 · วิเคราะห์ยอดขาย ---------- */
function MiniBars({data,color}){
  const max=Math.max(1,...data.map(d=>d.value));
  const kS=(n)=> n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':String(Math.round(n));
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:5,height:120,marginTop:6}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',gap:5,height:'100%'}}>
          <div className="num" style={{fontSize:9,color:'var(--muted)',fontWeight:700,height:12}}>{d.value>0?kS(d.value):''}</div>
          <div style={{width:'100%',maxWidth:28,height:`${(d.value/max)*86}%`,minHeight:d.value>0?4:1,background:d.value>0?color:'var(--line)',borderRadius:'5px 5px 0 0'}}/>
          <div style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}
function CatBars({list,color}){
  const max=Math.max(1,...list.map(x=>x[1]));
  return (
    <div style={{marginTop:8}}>
      {list.map(([cat,val])=>(
        <div key={cat} style={{marginBottom:11}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}>
            <span style={{color:'var(--ink)'}}>{cat}</span>
            <span className="num" style={{fontWeight:600}}>{baht(val)}</span>
          </div>
          <div style={{height:8,background:'var(--soft)',borderRadius:6,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(val/max)*100}%`,background:color,borderRadius:6}}/>
          </div>
        </div>
      ))}
    </div>
  );
}
function Analyze({shop,user,toast}){
  const TM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const curYm=ymOf(today());
  const [ym,setYm]=useState(curYm);
  const [load,setLoad]=useState(true);
  const [txns,setTxns]=useState([]);
  const [showReport,setShowReport]=useState(false);
  useEffect(()=>{ (async()=>{ setLoad(true); try{ setTxns(await monthTxns(shop.id,ym)); }catch(e){ console.error(e); } setLoad(false); })(); },[shop.id,ym]);

  const shift=(d)=>{ const [y,m]=ym.split('-').map(Number); const dt=new Date(y,m-1+d,1); setYm(`${dt.getFullYear()}-${pad(dt.getMonth()+1)}`); };
  const [yy,mm]=ym.split('-').map(Number);
  const monthLabel=`${TM[mm-1]} ${yy+543}`;

  const inc=txns.filter(t=>t.kind==='income'), exp=txns.filter(t=>t.kind==='expense');
  const income=sumBy(txns,x=>x.kind==='income'), expense=sumBy(txns,x=>x.kind==='expense'), profit=income-expense;

  const dowSum=[0,0,0,0,0,0,0];
  inc.forEach(t=>{ const d=new Date(t.date+'T00:00:00'); if(!isNaN(d.getTime())) dowSum[d.getDay()]+=Number(t.amount)||0; });
  const dowOrder=[1,2,3,4,5,6,0], dowLab=['จ','อ','พ','พฤ','ศ','ส','อา'], dowFull=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสฯ','ศุกร์','เสาร์'];
  const dowData=dowOrder.map((idx,i)=>({label:dowLab[i],value:dowSum[idx]}));

  const blocks=[{l:'00–06',a:0,b:6},{l:'06–09',a:6,b:9},{l:'09–12',a:9,b:12},{l:'12–15',a:12,b:15},{l:'15–18',a:15,b:18},{l:'18–21',a:18,b:21},{l:'21–24',a:21,b:24}];
  const timeSum=blocks.map(()=>0);
  inc.forEach(t=>{ const dt=t.ts&&t.ts.toDate?t.ts.toDate():(t.ts&&t.ts.seconds?new Date(t.ts.seconds*1000):null); if(dt){ const h=dt.getHours(); const bi=blocks.findIndex(b=>h>=b.a&&h<b.b); if(bi>=0) timeSum[bi]+=Number(t.amount)||0; } });
  const timeData=blocks.map((b,i)=>({label:b.l.slice(0,2),value:timeSum[i]}));

  const agg=(arr)=>{ const m={}; arr.forEach(t=>{ const k=t.category||'อื่นๆ'; m[k]=(m[k]||0)+(Number(t.amount)||0); }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const incCats=agg(inc), expCats=agg(exp);

  const peakDowIdx=dowSum.reduce((bi,v,i,a)=>v>a[bi]?i:bi,0);
  const peakTimeIdx=timeSum.reduce((bi,v,i,a)=>v>a[bi]?i:bi,0);
  const hasTime=timeSum.some(v=>v>0);

  const card={background:'#fff',border:'1px solid var(--line)',borderRadius:16,padding:16,marginBottom:14};
  const ttl={fontWeight:600,fontSize:15};
  const sub={fontSize:11.5,color:'var(--muted)',marginTop:2};

  return (
    <div style={{padding:'14px 16px 8px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={()=>shift(-1)} className="press" style={{border:'1px solid var(--line)',background:'#fff',borderRadius:10,width:38,height:38,display:'grid',placeItems:'center',color:'var(--ink)'}}><span style={{display:'flex',transform:'rotate(180deg)'}}><I.chevron/></span></button>
        <div className="kanit" style={{fontWeight:700,fontSize:16}}>{monthLabel}</div>
        <button onClick={()=>shift(1)} disabled={ym>=curYm} className="press" style={{border:'1px solid var(--line)',background:'#fff',borderRadius:10,width:38,height:38,display:'grid',placeItems:'center',color:ym>=curYm?'#CBD0D6':'var(--ink)'}}><I.chevron/></button>
      </div>

      <button onClick={()=>setShowReport(true)} className="press kanit" style={{width:'100%',padding:'12px',marginBottom:14,border:'1.5px solid var(--line)',borderRadius:13,background:'#fff',color:'var(--primary)',fontWeight:600,fontSize:14,display:'flex',justifyContent:'center',alignItems:'center',gap:8}}><I.table/> ออกรายงานเดือนนี้ (PDF / Excel)</button>
      {showReport && <Report shop={shop} ym={ym} onClose={()=>setShowReport(false)} toast={toast}/>}

      {load? <Loading/> : txns.length===0 ? (
        <div style={{textAlign:'center',padding:'52px 20px',color:'var(--muted)'}}>
          <div style={{fontSize:40,marginBottom:10}}>📊</div>
          <div className="kanit" style={{fontWeight:600,fontSize:16,color:'var(--ink)'}}>ยังไม่มีข้อมูลเดือนนี้</div>
          <div style={{fontSize:13.5,marginTop:4}}>เริ่มบันทึกรายรับ-รายจ่ายในแท็บ “บันทึก”</div>
        </div>
      ) : (<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
          {[['รายรับ',income,'var(--pos)'],['รายจ่าย',expense,'var(--neg)'],['กำไรสุทธิ',profit,profit>=0?'var(--primary)':'var(--neg)']].map(([l,v,c])=>(
            <div key={l} style={{background:'#fff',border:'1px solid var(--line)',borderRadius:14,padding:'12px 8px',textAlign:'center'}}>
              <div style={{fontSize:11.5,color:'var(--muted)',marginBottom:4}}>{l}</div>
              <div className="num" style={{fontWeight:700,fontSize:14.5,color:c}}>{baht(v)}</div>
            </div>
          ))}
        </div>

        <div style={card}>
          <div className="kanit" style={ttl}>รายรับตามวันในสัปดาห์</div>
          <div style={sub}>วันไหนคนเยอะ — ไว้วางแผนจัดกะพนักงาน</div>
          <MiniBars data={dowData} color="var(--primary)"/>
        </div>

        <div style={card}>
          <div className="kanit" style={ttl}>รายรับตามช่วงเวลา</div>
          <div style={sub}>ตามเวลาที่บันทึก (น.) — ช่วงคึกไว้เน้นคน/เตรียมของ</div>
          {hasTime? <MiniBars data={timeData} color="var(--accent)"/>
            : <div style={{fontSize:12.5,color:'var(--muted)',padding:'18px 0',textAlign:'center'}}>ยังไม่มีข้อมูลเวลา (บันทึกออเดอร์ตามเวลาจริงเพื่อดูช่วงคึก)</div>}
        </div>

        {income>0 && (
          <div style={{background:'var(--tint)',border:'1px solid var(--line)',borderRadius:14,padding:'13px 15px',marginBottom:14,display:'flex',gap:11}}>
            <span style={{color:'var(--accent)',flexShrink:0,marginTop:1}}><I.spark/></span>
            <div style={{fontSize:13,lineHeight:1.55}}>
              วันยอดสูงสุด <b>{dowFull[peakDowIdx]}</b>{hasTime && <> · ช่วงคึกสุด <b>{blocks[peakTimeIdx].l} น.</b></>}
              <div style={{color:'var(--muted)',marginTop:2}}>แนะนำเน้นจัดคนและเตรียมวัตถุดิบ/น้ำยาช่วงนี้</div>
            </div>
          </div>
        )}

        {expCats.length>0 && (
          <div style={card}>
            <div className="kanit" style={ttl}>รายจ่ายแยกหมวด</div>
            <CatBars list={expCats} color="var(--neg)"/>
          </div>
        )}
        {incCats.length>0 && (
          <div style={card}>
            <div className="kanit" style={ttl}>รายรับแยกหมวด</div>
            <CatBars list={incCats} color="var(--pos)"/>
          </div>
        )}
      </>)}
    </div>
  );
}

/* ---------- PHASE 2 placeholder ---------- */
function Phase2({title,icon:Ic,items}){
  return (
    <div style={{padding:'40px 24px'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:18,background:'var(--soft)',color:'var(--primary)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Ic/></div>
        <div className="kanit" style={{fontWeight:700,fontSize:20}}>{title}</div>
        <div style={{color:'var(--muted)',fontSize:13.5,marginTop:4}}>กำลังพัฒนา · Phase ถัดไป</div>
      </div>
      <div className="card" style={{padding:'8px 0',marginTop:20}}>
        {items.map((it,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'12px 16px',borderTop:i?'1px solid var(--line)':'none',fontSize:14}}>
            <span style={{color:'var(--accent)'}}><I.spark/></span>{it}</div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Boot: เชื่อมต่อ + เข้าระบบนิรนามก่อนเข้าแอป (เพื่อให้ผ่าน Security Rules) ---------- */
function Boot(){
  const [phase,setPhase]=useState('init'); // init | ready | autherr
  const [msg,setMsg]=useState('');
  useEffect(()=>{
    if(!FB_OK){ setPhase('ready'); return; }
    let done=false;
    const unsub=firebase.auth().onAuthStateChanged(u=>{ if(u && !done){ done=true; setPhase('ready'); } });
    firebase.auth().signInAnonymously().catch(e=>{
      if(done) return; done=true;
      setMsg(e.code==='auth/operation-not-allowed'
        ? 'ยังไม่ได้เปิด Anonymous — ไปที่ Firebase Console → Authentication → Sign-in method → เปิด “Anonymous” แล้วลองใหม่'
        : ('เชื่อมต่อ Firebase ไม่สำเร็จ: '+(e.message||e.code)));
      setPhase('autherr');
    });
    return ()=>unsub();
  },[]);
  if(phase==='init') return <div className="shell" style={{display:'grid',placeItems:'center'}}><Loading label="กำลังเชื่อมต่ออย่างปลอดภัย..."/></div>;
  if(phase==='autherr') return (
    <div className="shell" style={{display:'grid',placeItems:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:330}}>
        <div style={{fontSize:42,marginBottom:12}}>🔐</div>
        <div className="kanit" style={{fontWeight:700,fontSize:18,marginBottom:8}}>เชื่อมต่อไม่สำเร็จ</div>
        <div style={{fontSize:13.5,color:'var(--muted)',lineHeight:1.6}}>{msg}</div>
      </div>
    </div>
  );
  return <App/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Boot/>);
</script>
