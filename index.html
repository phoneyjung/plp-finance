<style>
  :root{
    --primary:#13294B; --accent:#FF7A1A; --tint:#FFF1E6; --soft:#EAF0F8;
    --bg:#F4F6F8; --card:#FFFFFF; --ink:#171A1F; --muted:#6B7280; --line:#E6E8EC;
    --pos:#16A34A; --neg:#DC2626;
  }
  *{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
  body{ margin:0; background:var(--bg); font-family:'Noto Sans Thai',sans-serif; color:var(--ink); }
  .kanit{ font-family:'Kanit',sans-serif; }
  .num{ font-family:'Kanit',sans-serif; font-variant-numeric:tabular-nums; }
  .shell{ max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; box-shadow:0 0 40px rgba(0,0,0,.06); }
  .scrim{ background:
    radial-gradient(135% 115% at 86% -12%, color-mix(in srgb, var(--primary) 68%, #fff) 0%, transparent 46%),
    linear-gradient(180deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 84%, #000) 100%); }
  .card{ background:var(--card); border-radius:18px; box-shadow:0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04); }
  .press:active{ transform:scale(.97); transition:transform .08s; }
  .pill{ background:var(--soft); color:var(--primary); }
  .hide-scroll::-webkit-scrollbar{ display:none; }
  .hide-scroll{ -ms-overflow-style:none; scrollbar-width:none; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .fade{ animation:fade .2s ease both; }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  .spin{ animation:spin .8s linear infinite; }
  input,select,button,textarea{ font-family:inherit; }

/* ---------- helpers ---------- */
const pad=(n)=>String(n).padStart(2,'0');
const today=()=>{ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const ymOf=(ds)=>ds.slice(0,7);
const baht=(n)=> (n<0?'-':'')+'฿'+Math.abs(Math.round(n||0)).toLocaleString('en-US');
const hhmm=(ts)=>{ try{ const d=ts.toDate(); return pad(d.getHours())+':'+pad(d.getMinutes()); }catch(e){ return '—'; } };
const sumBy=(arr,fn)=>arr.reduce((s,x)=>s+(fn(x)?Number(x.amount)||0:0),0);
function evalExpr(s){
  if(!s) return 0;
  const toks=[]; let num='';
  for(const ch of s){ if((ch>='0'&&ch<='9')||ch==='.') num+=ch; else if('+-*/'.includes(ch)){ if(num!==''){toks.push(parseFloat(num));num='';} toks.push(ch); } }
  if(num!=='') toks.push(parseFloat(num));
  if(typeof toks[toks.length-1]==='string') toks.pop();
  if(!toks.length) return 0;
  const p=[toks[0]];
  for(let i=1;i<toks.length;i+=2){ const op=toks[i], n=toks[i+1]; if(n===undefined) break;
    if(op==='*') p[p.length-1]=p[p.length-1]*n; else if(op==='/') p[p.length-1]= (n===0?0:p[p.length-1]/n); else p.push(op,n); }
  let r=p[0]||0; for(let i=1;i<p.length;i+=2){ if(p[i]==='+') r+=p[i+1]; else if(p[i]==='-') r-=p[i+1]; }
  return r;
}

/* ---------- firestore ops ---------- */
async function findUserByPin(pin){
  const s=await db.collection('users').where('pin','==',pin).limit(1).get();
  if(s.empty) return null; const d=s.docs[0]; return {id:d.id, ...d.data()};
}
async function usersEmpty(){ const s=await db.collection('users').limit(1).get(); return s.empty; }
async function createAdmin(pin){
  const data={name:'แอดมิน', role:'admin', pin, shopIds:'all', active:true, createdAt:FieldValue.serverTimestamp()};
  const ref=await db.collection('users').add(data); return {id:ref.id, ...data};
}
async function allUsers(){ const s=await db.collection('users').get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function addUser({name,role,pin,shopIds},actor){
  if(await findUserByPin(pin)) throw new Error('PIN นี้ถูกใช้แล้ว เลือกเลขอื่น');
  await db.collection('users').add({name,role,pin,shopIds,active:true,createdAt:FieldValue.serverTimestamp()});
  await writeLog('all', actor, 'user.add', `เพิ่มผู้ใช้ ${name} (${(ROLES[role]&&ROLES[role].label)||role})`, []);

  });

async function delTxn(id, actor){
  let before=null;
  try{ const d=await db.collection('transactions').doc(id).get(); if(d.exists) before={...d.data()}; }catch(e){}
  await db.collection('transactions').doc(id).delete();
  try{ await db.collection('transactions').doc('rcpt_'+id).delete(); }catch(e){}
  if(before){
    const cap=before.source==='capital';
    const lbl=cap ? `ลบ${before.kind==='withdraw'?'ถอนทุน':before.kind==='dividend'?'ปันผล':'เพิ่มทุน'} ${before.category||''} ${baht(before.amount||0)}`
                  : `ลบ${before.kind==='income'?'รายรับ':'รายจ่าย'} ${before.category||''} ${baht(before.amount||0)}`;
    await writeLog(before.shopId||'', actor, cap?'capital.delete':'txn.delete', lbl, [{id, before, after:null}]);
  }
}
function resizePhoto(file, maxW=600, q=0.6, mime='image/jpeg'){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{ const scale=Math.min(1,maxW/img.width); const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      try{ res(c.toDataURL(mime,q)); }catch(e){ rej(e); } };
    img.onerror=()=>rej(new Error('โหลดรูปไม่สำเร็จ')); img.src=URL.createObjectURL(file);
  });
}

/* ---------- AUDIT LOG ---------- */
async function writeLog(shopId, actor, type, label, ops){
  try{
    await db.collection('transactions').add({
      _log:true, skey:`${shopId}_LOG`, shopId,
      type, label:label||'',
      actor: actor? {id:(actor.id||''), name:(actor.name||'')} : null,
      ops:(ops||[]).map(o=>({id:o.id, before:(o.before==null?null:o.before), after:(o.after==null?null:o.after)})),
      reverted:false, ts:FieldValue.serverTimestamp()
    });
  }catch(e){ console.error('writeLog',e); }
}
async function logsForShop(shopId){
  const [a,b]=await Promise.all([
    db.collection('transactions').where('skey','==',`${shopId}_LOG`).get(),
    db.collection('transactions').where('skey','==','all_LOG').get()
  ]);
  const arr=[...a.docs,...b.docs].map(d=>({id:d.id,...d.data()}));
  return arr.sort((x,y)=>(((y.ts&&y.ts.seconds)||0)-((x.ts&&x.ts.seconds)||0)));
}
async function revertLog(log, actor){
  const ops=log.ops||[];
  for(let i=ops.length-1;i>=0;i--){
    const op=ops[i]; if(!op||!op.id) continue;
    if(op.before==null){
      await db.collection('transactions').doc(op.id).delete();
      try{ await db.collection('transactions').doc('rcpt_'+op.id).delete(); }catch(e){}
    } else {
      await db.collection('transactions').doc(op.id).set(op.before);
    }
  }
  await db.collection('transactions').doc(log.id).update({ reverted:true, revertedAt:FieldValue.serverTimestamp(), revertedBy: actor?{id:(actor.id||''),name:(actor.name||'')}:null });
}
function fmtLogTime(ts){ if(!ts||!ts.seconds) return '—'; const d=new Date(ts.seconds*1000); const p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`; }

};
const CATMETA={};
function catMetaOf(shopId,name){ const c=CATMETA[shopId+'|'+name]; if(c) return c; const d=DEFAULT_CAT_META[name]; if(d) return d; return {color:catColor(name), icon:null}; }
async function loadCatMeta(shopId){
  try{
    const arrs=await Promise.all(['income','expense'].map(k=>db.collection('customCategories').where('ckey','==',`${shopId}_${k}`).get()));
    arrs.forEach(s=>s.docs.forEach(d=>{ const x=d.data(); CATMETA[shopId+'|'+x.name]={color:x.color||catColor(x.name), icon:x.icon||null}; }));
  }catch(e){ console.error('loadCatMeta',e); }
}
function CatBadge({shopId,name,size}){ size=size||42; const m=catMetaOf(shopId,name); const Ic=m.icon&&CAT_ICONS[m.icon]; const isz=Math.round(size*0.52);
  return <span style={{width:size,height:size,borderRadius:99,flexShrink:0,background:m.color||catColor(name),color:'#fff',display:'grid',placeItems:'center'}}>{Ic? <Ic width={isz} height={isz}/> : <span style={{fontWeight:700,fontSize:Math.round(size*0.4)}}>{(name||'?').trim()[0]}</span>}</span>;
}

function Portal({children}){ return ReactDOM.createPortal(children, document.body); }
function Spinner({c='var(--primary)'}){

function useToast(){
  const [msg,setMsg]=useState(null);
  const show=(m,type='ok')=>{ setMsg({m,type}); setTimeout(()=>setMsg(null),2400); };
  const node = msg && (
    <div className="fade" style={{position:'fixed',bottom:96,left:'50%',transform:'translateX(-50%)',zIndex:99,
      background: msg.type==='err'?'#B42318':'#171A1F', color:'#fff', padding:'11px 18px', borderRadius:13,
      fontSize:14, maxWidth:'88%', textAlign:'center', boxShadow:'0 6px 20px rgba(0,0,0,.25)'}}>{msg.m}</div>
  );
  return [show,node];
}

/* ============================================================ APP */
function App(){
  const [user,setUser]=useState(null);
  const [shopId,setShopId]=useState(null);

  const myShops = useMemo(()=>{
    if(!user) return [];
    return user.shopIds==='all' ? SHOPS : SHOPS.filter(s=>(user.shopIds||[]).includes(s.id));
  },[user]);

  const shop = SHOPS.find(s=>s.id===shopId);
  useEffect(()=>{
    if(shop){ const r=document.documentElement.style; const t=shop.theme;
      r.setProperty('--primary',t.primary); r.setProperty('--accent',t.accent);
      r.setProperty('--tint',t.tint); r.setProperty('--soft',t.soft);
      document.querySelector('meta[name=theme-color]').setAttribute('content',t.primary);
    }
  },[shopId]);

  const onLogin=async(pin, expectId)=>{
    let u=await findUserByPin(pin);
    if(!u){ if((await usersEmpty()) && pin===SETUP_ADMIN_PIN) u=await createAdmin(pin); }
    if(!u || u.active===false) return false;
    if(expectId && u.id!==expectId) return false;
    setUser(u);
    const ms = u.shopIds==='all' ? SHOPS : SHOPS.filter(s=>(u.shopIds||[]).includes(s.id));
    if(ms.length===1) setShopId(ms[0].id);
    return true;
  };
  const logout=()=>{ setUser(null); setShopId(null); };

  if(!FB_OK) return <div className="shell"><ConfigError/></div>;
  if(!user) return <div className="shell"><Login onLogin={onLogin}/></div>;
  if(!shopId) return <div className="shell"><Picker shops={myShops} onPick={setShopId} user={user} logout={logout}/></div>;
  return <div className="shell"><Main shop={shop} user={user} canSwitch={myShops.length>1}
    onSwitch={()=>setShopId(null)} logout={logout}/></div>;
}

function ConfigError(){
  return <div style={{padding:'80px 28px'}}>

    <div style={{color:'var(--muted)',fontSize:14,lineHeight:1.7}}>
      เปิดไฟล์ <b>index.html</b> แล้ววาง <b>firebaseConfig</b> ของโปรเจกต์ในส่วน CONFIG ด้านบนสุดของไฟล์ก่อนครับ
      <div style={{marginTop:8,padding:'10px 12px',background:'#FEF3F2',color:'#B42318',borderRadius:10,fontSize:12.5}}>

    </div>
  </div>;
}

  const shiftDay=(n)=>{ const d=new Date(selDate+'T00:00:00'); d.setDate(d.getDate()+n); const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; if(ds<=today()) setSelDate(ds); };

        </button>
        <div className="kanit" style={{fontWeight:600,fontSize:16}}>{dLabel}</div>
        <label className="press" style={{position:'relative',border:'1px solid var(--line)',background:'#fff',borderRadius:12,width:44,height:44,display:'grid',placeItems:'center',color:'var(--primary)'}}>
          <I.calendar/>
          <input type="date" value={selDate} max={today()} onChange={e=>setSelDate(e.target.value||today())} style={{position:'absolute',inset:0,opacity:0,width:'100%',height:'100%'}}/>
        </label>
      </div>

      <div className="card" style={{padding:'14px 16px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}><span style={{color:'var(--muted)',fontSize:13.5}}>รายรับ</span><span className="num" style={{color:'#16A34A',fontWeight:600,fontSize:15}}>{baht(inc)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}><span style={{color:'var(--muted)',fontSize:13.5}}>รายจ่าย</span><span className="num" style={{color:'#DC2626',fontWeight:600,fontSize:15}}>{baht(exp)}</span></div>
        <div style={{height:1,background:'var(--line)',margin:'9px 0'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span className="kanit" style={{fontWeight:600,fontSize:14.5}}>คงเหลือ</span><span className="num" style={{fontWeight:700,fontSize:19,color:net>=0?'#16A34A':'#DC2626'}}>{net>=0?'+':''}{baht(net)}</span></div>
      </div>

      {shop.type==='laundry' && !readOnly && (

      {!readOnly && (

          <I.plus/> เพิ่มรายการ</button>

      {showEntry && <EntrySheet shop={shop} user={user} initMode={entryMode} initDate={selDate} onClose={()=>setShowEntry(false)} onSaved={()=>{ setShowEntry(false); loadList(); }} toast={toast}/>}
      {showImport && <Import shop={shop} user={user} toast={toast} onClose={()=>setShowImport(false)} onDone={()=>{ setShowImport(false); loadList(); }}/>}
      {viewRcpt && <ReceiptViewer txn={viewRcpt} onClose={()=>setViewRcpt(null)}/>}

  );

function EntrySheet({shop,user,initMode,initDate,onClose,onSaved,toast}){
  const [mode,setMode]=useState(initMode||'exp');
  const kind=mode==='inc'?'income':'expense';
  const [expr,setExpr]=useState('');
  const [cats,setCats]=useState([]);
  const [cat,setCat]=useState('');
  const [pay,setPay]=useState('cash');
  const [date,setDate]=useState(initDate||today());
  const [note,setNote]=useState('');
  const [showNote,setShowNote]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [photoBusy,setPhotoBusy]=useState(false);
  const [saving,setSaving]=useState(false);
  const [showCat,setShowCat]=useState(false);
  const photoRef=useRef();

  const loadCats=async()=>{ const custom=await customCats(shop.id,kind); const base=DEFAULT_CATS[shop.type][kind]; custom.forEach(c=>{ CATMETA[shop.id+'|'+c.name]={color:c.color||catColor(c.name), icon:c.icon||null}; }); const names=[...base,...custom.map(c=>c.name).filter(n=>!base.includes(n))]; setCats(names); setCat(p=> names.includes(p)?p:(names[0]||'')); };
  useEffect(()=>{ loadCats(); },[shop.id,mode]);

  const val=Math.round(evalExpr(expr));
  const hasOp = expr.length>0 && /[-+*/]/.test(expr);
  const exprPretty = expr.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/-/g,' − ').replace(/\+/g,' + ');

  const press=(t)=>{ setExpr(e=>{
    if(t==='C') return '';
    if(t==='back') return e.slice(0,-1);
    if('+-*/'.includes(t)){ if(e==='') return ''; if('+-*/'.includes(e.slice(-1))) return e.slice(0,-1)+t; return e+t; }
    if(t==='00'){ if(e===''||'+-*/'.includes(e.slice(-1))) return e; return e+'00'; }
    return e+t;
  }); };
  const onPhoto=async(ev)=>{ const f=ev.target.files[0]; if(!f) return; setPhotoBusy(true); try{ const b=await resizePhoto(f,600,0.6); setPhoto(b);}catch(e){toast('ย่อรูปไม่สำเร็จ','err');} setPhotoBusy(false); ev.target.value=''; };
  const addCatLocal=async(name,color,icon)=>{ try{ await addCat(shop.id,kind,name,color,icon); await loadCats(); setCat(name); setShowCat(false); toast('เพิ่มหมวดแล้ว'); }catch(e){ toast('เพิ่มไม่สำเร็จ','err'); } };
  const save=async()=>{
    const amount=Math.round(evalExpr(expr));
    if(!amount||amount<=0){ toast('ใส่จำนวนเงินก่อน','err'); return; }
    if(!cat){ toast('เลือกหมวดก่อน','err'); return; }
    setSaving(true);
    try{ await addTxn({shopId:shop.id,kind,category:cat,amount,method:pay,note,by:{id:user.id,name:user.name},photo,date});
      toast(`บันทึก${mode==='inc'?'รายรับ':'รายจ่าย'} ${baht(amount)} แล้ว`); onSaved&&onSaved();
    }catch(e){ toast('บันทึกไม่สำเร็จ','err'); setSaving(false); }
  };
  const dStr = date===today()? 'วันนี้' : (()=>{ const a=date.split('-'); return `${parseInt(a[2])} ${THAI_MON[parseInt(a[1])-1]}`; })();
  const kbtn=(key,label,o)=>{ o=o||{}; return <button key={key} onClick={o.onClick||(()=>press(key))} className="press" style={{gridColumn:o.span?('span '+o.span):undefined,border:'none',background:o.bg||'#EDF0F2',color:o.fg||'var(--ink)',borderRadius:14,height:56,fontSize:o.fs||23,fontWeight:600,display:'grid',placeItems:'center'}}>{label}</button>; };

  return (
    <Portal><div style={{position:'fixed',inset:0,zIndex:90,background:'#fff',display:'flex',flexDirection:'column',maxWidth:480,margin:'0 auto'}}>
      <div style={{background:'var(--primary)',color:'#fff',paddingTop:'env(safe-area-inset-top)'}}>
        <div style={{display:'flex',alignItems:'center',padding:'8px 6px 0'}}>
          <button onClick={onClose} className="press" style={{border:'none',background:'none',color:'#fff',padding:8}}><I.back/></button>
          <div style={{flex:1,textAlign:'center',fontSize:13,opacity:.9}} className="kanit">{shop.name}</div>
          <div style={{width:40,textAlign:'right'}}>
            {mode==='exp' && (<>
              <input ref={photoRef} type="file" accept="image/*" onChange={onPhoto} style={{display:'none'}}/>
              <button onClick={()=>photoRef.current.click()} className="press" style={{border:'none',background:'none',color:'#fff',padding:8,position:'relative'}}>{photoBusy?'…':<I.receipt/>}{photo&&<span style={{position:'absolute',top:5,right:5,width:8,height:8,borderRadius:99,background:'#FACC15'}}/>}</button>
            </>)}
          </div>
        </div>
        <div style={{display:'flex',padding:'2px 14px 0'}}>
          {[['inc','รายรับ'],['exp','รายจ่าย']].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} className="press kanit" style={{flex:1,padding:'11px 0 13px',border:'none',background:'none',color:'#fff',fontSize:16,fontWeight:600,opacity:mode===k?1:0.5,borderBottom:'3px solid '+(mode===k?'#fff':'transparent')}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px 18px 6px'}}>
        <div style={{textAlign:'right'}}>
          {hasOp && <div className="num" style={{fontSize:15,color:'var(--muted)',minHeight:18}}>{exprPretty}</div>}

function LogSheet({shop,user,onClose,toast}){
  const [load,setLoad]=useState(true);
  const [logs,setLogs]=useState([]);
  const [filter,setFilter]=useState('all');
  const [limit,setLimit]=useState(40);
  const [busy,setBusy]=useState(null);
  const reload=async()=>{ setLoad(true); try{ setLogs(await logsForShop(shop.id)); }catch(e){ console.error(e); } setLoad(false); };
  useEffect(()=>{ reload(); },[shop.id]);

  const actors=[...new Set(logs.map(l=>l.actor&&l.actor.name).filter(Boolean))];
  const fil=logs.filter(l=> filter==='all' || (l.actor&&l.actor.name)===filter);
  const shown=fil.slice(0,limit);

  const revert=async(l)=>{
    if(!window.confirm('ย้อนกลับการกระทำนี้?\nข้อมูลจะกลับไปเป็นก่อนหน้า')) return;
    setBusy(l.id);
    try{ await revertLog(l, {id:user.id,name:user.name}); toast('ย้อนกลับแล้ว'); await reload(); }
    catch(e){ console.error(e); toast('ย้อนกลับไม่สำเร็จ','err'); }
    setBusy(null);
  };

  return (
    <Sheet title="ประวัติการใช้งาน" onClose={onClose} z={70}>
      {actors.length>1 && (
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:12}}>
          {['all',...actors].map(a=>(
            <button key={a} onClick={()=>setFilter(a)} className="press kanit" style={{flexShrink:0,border:'1px solid '+(filter===a?'var(--primary)':'var(--line)'),background:filter===a?'var(--primary)':'#fff',color:filter===a?'#fff':'var(--ink)',borderRadius:99,padding:'6px 13px',fontSize:13,fontWeight:600}}>{a==='all'?'ทั้งหมด':a}</button>
          ))}
        </div>
      )}
      {load? <div style={{padding:'34px 0'}}><Loading/></div> :
        shown.length===0? <div style={{padding:'34px 0',textAlign:'center',color:'var(--muted)',fontSize:14}}>ยังไม่มีประวัติการใช้งาน</div> :
        <div>
          {shown.map(l=>{ const m=LOG_META[l.type]||{ic:'gear',c:'#64748B'}; const Ic=I[m.ic]||I.gear; const canRevert=l.ops&&l.ops.length>0&&!l.reverted;
            return (
              <div key={l.id} style={{display:'flex',gap:11,alignItems:'flex-start',padding:'11px 0',borderBottom:'1px solid var(--line)',opacity:l.reverted?0.5:1}}>
                <span style={{width:34,height:34,borderRadius:9,flexShrink:0,background:'var(--soft)',color:m.c,display:'grid',placeItems:'center',marginTop:1}}><Ic/></span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13.8,fontWeight:500,lineHeight:1.35}}>{l.label||l.type}{l.reverted&&<span style={{fontSize:11,color:'#DC2626',marginLeft:6,fontWeight:600}}>· ย้อนกลับแล้ว</span>}</div>
                  <div style={{fontSize:11.5,color:'var(--muted)',marginTop:2}}>{(l.actor&&l.actor.name)||'—'} · {fmtLogTime(l.ts)}</div>
                </div>
                {canRevert && <button onClick={()=>revert(l)} disabled={busy===l.id} className="press kanit" style={{flexShrink:0,border:'1px solid var(--line)',background:'#fff',color:'#DC2626',borderRadius:9,padding:'6px 11px',fontSize:12.5,fontWeight:600,marginTop:1}}>{busy===l.id?'...':'ย้อนกลับ'}</button>}
              </div>
            );
          })}
          {fil.length>limit && <button onClick={()=>setLimit(limit+40)} className="press kanit" style={{display:'block',margin:'16px auto 4px',border:'1px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:10,padding:'9px 20px',fontSize:13.5,fontWeight:600}}>โหลดเพิ่ม ({fil.length-limit})</button>}
        </div>}
      <div style={{height:8}}/>
    </Sheet>
  );
}

function QrModal({shop,referrer,baseUrl,onClose,toast}){
  const [imgErr,setImgErr]=useState(false);
  const link = baseUrl ? (baseUrl + (baseUrl.includes('?')?'&':'?') + 'ref=' + referrer.id) : '';
  const qrSrc = link ? ('https://api.qrserver.com/v1/create-qr-code/?size=600x600&qzone=2&ecc=M&data=' + encodeURIComponent(link)) : '';
  const download=async()=>{
    if(!qrSrc) return;
    try{
      const r=await fetch(qrSrc); const b=await r.blob(); const u=URL.createObjectURL(b);
      const a=document.createElement('a'); a.href=u; a.download=`QR_${shop.id}_${(referrer.name||'qr').replace(/\s/g,'')}.png`; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u),3000);
    }catch(e){ window.open(qrSrc,'_blank'); }
  };
  const copyLink=()=>{ if(link) navigator.clipboard.writeText(link).then(()=>toast('คัดลอกลิงก์แล้ว')); };
  return (
    <Sheet title={`QR · ${referrer.name}`} onClose={onClose} z={80}>
      {!baseUrl ? (
        <div style={{padding:'14px 4px',textAlign:'center'}}>
          <div style={{fontSize:14,color:'#DC2626',fontWeight:600,marginBottom:8}}>ยังไม่ได้ตั้งลิงก์หน้าแอดไลน์</div>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>ปิดหน้านี้ แล้วแตะการ์ด "ค่าตอบแทน/ลิงก์" ด้านบน ใส่ลิงก์หน้าสแกนของร้าน {shop.name} ก่อน จึงจะสร้าง QR ได้</div>
        </div>
      ) : (<>
        <div style={{textAlign:'center'}}>
          <div className="kanit" style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>ร้าน {shop.name} · {referrer.name}</div>
          <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:18,padding:16,display:'inline-block'}}>
            {imgErr ? <div style={{width:240,height:240,display:'grid',placeItems:'center',color:'#DC2626',fontSize:13,textAlign:'center',padding:'0 20px'}}>โหลด QR ไม่ได้<br/>เช็คเน็ตแล้วลองใหม่</div>
              : <img src={qrSrc} alt="QR" onError={()=>setImgErr(true)} style={{width:240,height:240,display:'block'}}/>}
          </div>
          <div style={{fontSize:10.5,color:'var(--muted)',wordBreak:'break-all',margin:'12px 8px 0'}}>{link}</div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={copyLink} className="press kanit" style={{flex:1,padding:'13px',border:'1.5px solid var(--line)',background:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>คัดลอกลิงก์</button>
          <button onClick={download} className="press kanit" style={{flex:1,padding:'13px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>บันทึกรูป QR</button>
        </div>
        <div style={{fontSize:11.5,color:'var(--muted)',textAlign:'center',marginTop:12}}>กดค้างที่รูปเพื่อบันทึกก็ได้ · เอา QR นี้ไปแปะ/แชร์ให้ลูกค้าสแกน</div>
      </>)}
    </Sheet>
  );
}

            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="ชื่อคนแชร์" autoFocus style={{flex:1,padding:'11px 13px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,outline:'none'}}/>
            <button onClick={addNew} disabled={busy||!newName.trim()} className="press kanit" style={{padding:'0 16px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:11,fontWeight:600,fontSize:14,opacity:newName.trim()?1:0.5}}>เพิ่ม</button>
          </div>
        )}

        {refs.length===0 && !adding && <div style={{padding:'24px 0',textAlign:'center',color:'var(--muted)',fontSize:14}}>ยังไม่มีคนแชร์ — กด "เพิ่มคน"</div>}

        <div>
          {refs.map(r=>{ const c=countOf(r.id); return (
            <div key={r.id} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 0',borderBottom:'1px solid var(--line)'}}>
              <span style={{width:40,height:40,borderRadius:99,flexShrink:0,background:catColor(r.name),color:'#fff',display:'grid',placeItems:'center',fontWeight:700,fontSize:16}}>{(r.name||'?').trim()[0]}</span>
              <div style={{flex:1,minWidth:0}}>
                <div className="kanit" style={{fontSize:14.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</div>
                <div style={{fontSize:11.5,color:'var(--muted)'}}>วันนี้ <b style={{color:'var(--primary)'}}>{c.today}</b> · รวม {c.total} · {baht(c.total*rate)}</div>
              </div>
              <button onClick={()=>setQrFor(r)} className="press kanit" style={{flexShrink:0,border:'1px solid var(--primary)',background:'#fff',color:'var(--primary)',borderRadius:9,padding:'7px 12px',fontSize:12.5,fontWeight:600}}>QR</button>
              <div style={{position:'relative',flexShrink:0}}>
                <button onClick={()=>setMenuFor(menuFor===r.id?null:r.id)} className="press" style={{border:'none',background:'none',color:'#C0C4CC',padding:'4px 6px',fontSize:18,lineHeight:1}}>⋮</button>
                {menuFor===r.id && <div style={{position:'absolute',right:0,top:'100%',background:'#fff',border:'1px solid var(--line)',borderRadius:10,boxShadow:'0 6px 20px rgba(0,0,0,.12)',zIndex:5,overflow:'hidden',minWidth:108}}>
                  <button onClick={()=>rename(r)} className="kanit" style={{display:'block',width:'100%',textAlign:'left',border:'none',background:'#fff',padding:'10px 14px',fontSize:13.5,borderBottom:'1px solid var(--line)'}}>แก้ชื่อ</button>
                  <button onClick={()=>remove(r)} className="kanit" style={{display:'block',width:'100%',textAlign:'left',border:'none',background:'#fff',padding:'10px 14px',fontSize:13.5,color:'#DC2626'}}>ลบ</button>
                </div>}
              </div>
            </div>
          ); })}
        </div>

        <div style={{fontSize:11.5,color:'var(--muted)',marginTop:16,lineHeight:1.5}}>QR ของแต่ละคนต่างกัน · ลูกค้าสแกนแล้วแอดไลน์ร้าน {shop.name} · ระบบนับให้ว่าใครพามา (กันแอดซ้ำด้วย LINE ID อัตโนมัติ)</div>
      </>)}
      {qrFor && <QrModal shop={shop} referrer={qrFor} baseUrl={url} onClose={()=>setQrFor(null)} toast={toast}/>}
    </Sheet>
  );
}

/* ---------- SETTINGS ---------- */
function Settings({shop,user,logout,toast}){
  const isAdmin = user.role==='admin';
  const [cfg,setCfg]=useState(null);
  const [bank,setBank]=useState(''); const [floatv,setFloatv]=useState('');
  const [savingCfg,setSavingCfg]=useState(false);
  const [users,setUsers]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [showPin,setShowPin]=useState(false);
  const [showLine,setShowLine]=useState(false);
  const [showLog,setShowLog]=useState(false);
  const [showRef,setShowRef]=useState(false);

  useEffect(()=>{ (async()=>{
    const s=await getSettings(shop.id); setCfg(s); setBank(String(s.bankBalance||0)); setFloatv(String(s.openingFloat||0));
    if(isAdmin) setUsers(await allUsers());
  })(); },[shop.id]);

  const saveCfg=async()=>{
    setSavingCfg(true);
    try{ await saveSettings(shop.id,{bankBalance:Number(bank||0),openingFloat:Number(floatv||0)},{id:user.id,name:user.name}); toast('บันทึกการตั้งค่าแล้ว'); }
    catch(e){ toast('บันทึกไม่สำเร็จ','err'); }
    setSavingCfg(false);
  };
  const reloadUsers=async()=> setUsers(await allUsers());
  const copyLine=async(u)=>{ try{ await navigator.clipboard.writeText(u); toast('คัดลอกลิงก์แล้ว'); }catch(e){ toast('คัดลอกไม่สำเร็จ','err'); } };
  const eUrl=(cfg&&cfg.lineUrl) || shop.lineUrl || '';
  const eQr=(cfg&&cfg.lineQr) || shop.lineQr || null;

  return (
    <div style={{padding:'14px 16px 8px'}}>
      {/* account */}
      <div className="card" style={{padding:16, marginBottom:14, display:'flex', alignItems:'center', gap:13}}>
        <span style={{width:48,height:48,borderRadius:99, background:'var(--soft)', color:'var(--primary)', display:'grid', placeItems:'center', fontWeight:600, fontSize:18}} className="kanit">{(user.name||'?')[0]}</span>
        <div style={{flex:1, minWidth:0}}>
          <div className="kanit" style={{fontWeight:600, fontSize:16}}>{user.name}</div>
          <div style={{fontSize:12.5, color:'var(--muted)'}}>{ROLES[user.role].label}</div>
        </div>
        <button onClick={()=>setShowPin(true)} className="press kanit" style={{border:'1.5px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:11,padding:'9px 13px',fontSize:13,fontWeight:600,flexShrink:0}}>เปลี่ยน PIN</button>
      </div>

      {/* LINE ของร้าน */}
      <div className="card" style={{padding:16, marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:(eUrl||eQr)?12:0}}>
          <div className="kanit" style={{fontWeight:600,fontSize:15}}>LINE เพิ่มเพื่อน · {shop.name}</div>
          {isAdmin && <button onClick={()=>setShowLine(true)} className="press kanit" style={{border:'1.5px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:11,padding:'8px 12px',fontSize:13,fontWeight:600}}>{(eUrl||eQr)?'แก้ไข':'ตั้งค่า'}</button>}
        </div>
        {(eUrl||eQr) ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:13}}>
            {eQr && <img src={eQr} alt="LINE QR" style={{width:190,height:190,borderRadius:12,border:'1px solid var(--line)',background:'#fff'}}/>}
            {eUrl && (<div style={{width:'100%'}}>
              <div style={{fontSize:12.5,color:'var(--muted)',wordBreak:'break-all',textAlign:'center',marginBottom:10}}>{eUrl}</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>copyLine(eUrl)} className="press kanit" style={{flex:1,padding:'11px',border:'1.5px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:11,fontSize:13.5,fontWeight:600}}>คัดลอกลิงก์</button>
                <a href={eUrl} target="_blank" rel="noopener noreferrer" className="press kanit" style={{flex:1,padding:'11px',border:'none',background:'#06C755',color:'#fff',borderRadius:11,fontSize:13.5,fontWeight:600,textAlign:'center',textDecoration:'none'}}>เปิด LINE</a>
              </div>
            </div>)}
          </div>
        ) : (
          <div style={{fontSize:13,color:'var(--muted)',paddingTop:4}}>ยังไม่ได้ตั้งค่า LINE{isAdmin?' — กด “ตั้งค่า” เพื่อเพิ่มลิงก์และ QR':''}</div>
        )}
      </div>

      {isAdmin && cfg && (
        <div className="card" style={{padding:16, marginBottom:14}}>
          <div className="kanit" style={{fontWeight:600, fontSize:15, marginBottom:4}}>ตั้งค่าการเงิน · {shop.name}</div>
          <div style={{fontSize:11.5,color:'var(--muted)',marginBottom:12}}>ยอดเริ่มต้นสำหรับกระทบยอด (อัปเดตเองได้)</div>
          <label style={lbl}>เงินในบัญชีปัจจุบัน (บาท)</label>
          <input value={bank} onChange={e=>setBank(e.target.value.replace(/[^0-9]/g,''))} inputMode="numeric" className="num"
            style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:18,fontWeight:600,marginBottom:12}}/>
          <label style={lbl}>เงินทอนตั้งต้นในลิ้นชัก (บาท)</label>
          <input value={floatv} onChange={e=>setFloatv(e.target.value.replace(/[^0-9]/g,''))} inputMode="numeric" className="num"
            style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:18,fontWeight:600,marginBottom:14}}/>
          <button onClick={saveCfg} className="press kanit" style={{width:'100%',padding:'13px',border:'none',borderRadius:13,background:'var(--primary)',color:'#fff',fontWeight:600,fontSize:15}}>{savingCfg?'กำลังบันทึก...':'บันทึกการตั้งค่า'}</button>
        </div>
      )}

      {isAdmin && (
        <div className="card" style={{padding:'16px 0 8px', marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 16px 10px'}}>
            <div className="kanit" style={{fontWeight:600, fontSize:15}}>ผู้ใช้งานระบบ</div>
            <button onClick={()=>setShowAdd(true)} className="press" style={{border:'none',background:'var(--soft)',color:'var(--primary)',borderRadius:10,padding:'7px 11px',fontSize:13,display:'flex',alignItems:'center',gap:4}}><I.plus/> เพิ่ม</button>
          </div>
          {users==null? <Loading label="โหลดผู้ใช้..."/> : users.map(u=>(
            <button key={u.id} onClick={()=>setEditUser(u)} className="press" style={{width:'100%',border:'none',background:'none',textAlign:'left',display:'flex',alignItems:'center',gap:12,padding:'10px 16px'}}>
              <span style={{width:38,height:38,borderRadius:99,background:'var(--soft)',color:ROLES[u.role]?.color||'#888',display:'grid',placeItems:'center',fontWeight:600}} className="kanit">{(u.name||'?')[0]}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14.5,fontWeight:500}}>{u.name} {u.active===false&&<span style={{fontSize:11,color:'#DC2626'}}>(ปิดใช้งาน)</span>}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{ROLES[u.role]?.label} · {u.shopIds==='all'?'ทุกร้าน':(u.shopIds||[]).map(id=>SHOPS.find(s=>s.id===id)?.name).join(', ')}</div>
              </div>
              {u.id!==user.id && (
                <span onClick={async(e)=>{ e.stopPropagation(); await setUserActive(u.id, u.active===false, {id:user.id,name:user.name}); reloadUsers(); }} className="press"
                  style={{fontSize:12.5,color:u.active===false?'#16A34A':'#DC2626',fontWeight:600,padding:'4px 8px',borderRadius:8}}>
                  {u.active===false?'เปิด':'ปิด'}</span>
              )}
              <I.chevron style={{color:'#C0C4CC'}}/>
            </button>
          ))}
        </div>
      )}

      {isAdmin && (
        <button onClick={()=>setShowRef(true)} className="press kanit" style={{width:'100%',padding:'14px 16px',marginBottom:12,border:'1px solid var(--line)',borderRadius:14,background:'#fff',display:'flex',alignItems:'center',gap:11}}>
          <span style={{width:34,height:34,borderRadius:9,background:'var(--soft)',color:'var(--primary)',display:'grid',placeItems:'center',flexShrink:0}}><I.users/></span>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontWeight:600,fontSize:14.5}}>ระบบแนะนำเพื่อน (Referral)</div>
            <div style={{fontSize:11.5,color:'var(--muted)',fontWeight:400}}>QR ให้ลูกน้องแชร์ · นับคนแอดไลน์ · จ่ายค่าตอบแทน</div>
          </div>
          <I.chevron style={{color:'#C0C4CC'}}/>
        </button>
      )}

      {isAdmin && (
        <button onClick={()=>setShowLog(true)} className="press kanit" style={{width:'100%',padding:'14px 16px',marginBottom:14,border:'1px solid var(--line)',borderRadius:14,background:'#fff',display:'flex',alignItems:'center',gap:11}}>
          <span style={{width:34,height:34,borderRadius:9,background:'var(--soft)',color:'var(--primary)',display:'grid',placeItems:'center',flexShrink:0}}><I.chart/></span>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontWeight:600,fontSize:14.5}}>ประวัติการใช้งาน</div>
            <div style={{fontSize:11.5,color:'var(--muted)',fontWeight:400}}>ดูว่าใครแก้ข้อมูลอะไร · ย้อนกลับได้</div>
          </div>
          <I.chevron style={{color:'#C0C4CC'}}/>
        </button>
      )}

      <button onClick={logout} className="press kanit" style={{width:'100%',padding:'14px',border:'1.5px solid var(--line)',borderRadius:14,background:'#fff',color:'#DC2626',fontWeight:600,fontSize:15,display:'flex',justifyContent:'center',alignItems:'center',gap:8}}>
        <I.logout/> ออกจากระบบ</button>

      {showAdd && <UserSheet editUser={null} currentUserId={user.id} actor={{id:user.id,name:user.name}} onClose={()=>setShowAdd(false)} onSaved={()=>{ setShowAdd(false); reloadUsers(); }} toast={toast}/>}
      {editUser && <UserSheet editUser={editUser} currentUserId={user.id} actor={{id:user.id,name:user.name}} onClose={()=>setEditUser(null)} onSaved={()=>{ setEditUser(null); reloadUsers(); }} onDeleted={()=>{ setEditUser(null); reloadUsers(); }} toast={toast}/>}
      {showPin && <ChangePinSheet user={user} onClose={()=>setShowPin(false)} toast={toast}/>}
      {showLine && <LineSheet shop={shop} user={user} cfg={cfg||{}} onClose={()=>setShowLine(false)} onSaved={async()=>{ setShowLine(false); setCfg(await getSettings(shop.id)); }} toast={toast}/>}
      {showLog && <LogSheet shop={shop} user={user} onClose={()=>setShowLog(false)} toast={toast}/>}
      {showRef && <ReferralSheet shop={shop} user={user} onClose={()=>setShowRef(false)} toast={toast}/>}
    </div>
  );
}

function Sheet({title,onClose,z=50,children}){
  return (
    <Portal><div style={{position:'fixed',inset:0,zIndex:z,maxWidth:480,margin:'0 auto'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)'}}/>
      <div className="fade" style={{position:'absolute',bottom:0,left:0,right:0,background:'var(--bg)',borderRadius:'22px 22px 0 0',maxHeight:'90vh',overflowY:'auto',paddingBottom:24}}>
        <div style={{position:'sticky',top:0,background:'var(--bg)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid var(--line)',zIndex:2}}>
          <button onClick={onClose} className="press" style={{border:'none',background:'none',color:'var(--ink)'}}><I.back/></button>
          <div className="kanit" style={{fontWeight:600,fontSize:17}}>{title}</div>
        </div>
        <div style={{padding:16}}>{children}</div>
      </div>
    </div></Portal>
  );
}

function UserSheet({editUser, currentUserId, actor, onClose, onSaved, onDeleted, toast}){
  const isEdit=!!editUser;
  const isSelf=isEdit && editUser.id===currentUserId;
  const [name,setName]=useState(editUser?.name||'');
  const [role,setRole]=useState(editUser?.role||'staff');
  const [pin,setPin]=useState(editUser?.pin||'');
  const [shopIds,setShopIds]=useState(editUser && editUser.shopIds!=='all' ? (editUser.shopIds||[]) : []);
  const [busy,setBusy]=useState(false);
  const toggleShop=(id)=> setShopIds(p=> p.includes(id)? p.filter(x=>x!==id):[...p,id]);

  const save=async()=>{
    if(!name.trim()||pin.length!==6){ toast('กรอกชื่อ และ PIN 6 หลัก','err'); return; }
    if(role!=='admin' && shopIds.length===0){ toast('เลือกร้านอย่างน้อย 1 ร้าน','err'); return; }
    setBusy(true);
    try{
      const data={name:name.trim(),role,pin,shopIds: role==='admin'?'all':shopIds};
      if(isEdit){
        if(await pinTakenByOther(pin, editUser.id)){ toast('PIN นี้ถูกใช้แล้ว เลือกเลขอื่น','err'); setBusy(false); return; }
        await updateUser(editUser.id,data,actor);
      } else { await addUser(data,actor); }
      toast(isEdit?'บันทึกการแก้ไขแล้ว':'เพิ่มผู้ใช้แล้ว'); onSaved();
    }catch(e){ toast(e.message||'บันทึกไม่สำเร็จ','err'); setBusy(false); }
  };
  const del=async()=>{
    if(!window.confirm(`ลบผู้ใช้ "${editUser.name}" ออกจากระบบ?`)) return;
    setBusy(true);
    try{ await deleteUser(editUser.id,actor); toast('ลบผู้ใช้แล้ว'); onDeleted(); }
    catch(e){ toast('ลบไม่สำเร็จ','err'); setBusy(false); }
  };

  return (
    <Sheet title={isEdit?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้งาน'} onClose={onClose} z={60}>
      <label style={lbl}>ชื่อ</label>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="ชื่อผู้ใช้"
        style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:15,marginBottom:14}}/>

      <label style={lbl}>บทบาท{isSelf && <span style={{color:'var(--muted)'}}> (บัญชีคุณเอง)</span>}</label>
      <div style={{display:'flex',gap:8,marginBottom:14,opacity:isSelf?.55:1,pointerEvents:isSelf?'none':'auto'}}>
        {Object.entries(ROLES).map(([k,v])=>(
          <button key={k} onClick={()=>setRole(k)} className="press kanit" style={{flex:1,padding:'10px 4px',borderRadius:11,fontSize:13,fontWeight:500,border:`1.5px solid ${role===k?v.color:'var(--line)'}`,background:role===k?v.color:'#fff',color:role===k?'#fff':'var(--ink)'}}>{v.label}</button>
        ))}
      </div>

      <label style={lbl}>PIN 6 หลัก {isEdit && <span style={{color:'var(--muted)'}}>(แก้เพื่อรีเซ็ต)</span>}</label>
      <input value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,'').slice(0,6))} inputMode="numeric" placeholder="● ● ● ● ● ●" className="num"
        style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:20,fontWeight:600,letterSpacing:4,marginBottom:14}}/>

      {role!=='admin' && (<>
        <label style={lbl}>เข้าถึงร้าน (เลือกได้หลายร้าน)</label>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {SHOPS.map(s=>{ const on=shopIds.includes(s.id); return (
            <button key={s.id} onClick={()=>toggleShop(s.id)} className="press" style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',borderRadius:12,border:`1.5px solid ${on?s.theme.primary:'var(--line)'}`,background:on?s.theme.tint:'#fff',textAlign:'left'}}>
              <span style={{width:30,height:30,borderRadius:8,overflow:'hidden',background:s.theme.tint,display:'grid',placeItems:'center',fontSize:18}}>{s.logo? <img src={s.logo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : s.emoji}</span>
              <span style={{flex:1,fontSize:14.5,fontWeight:500,color:on?s.theme.primary:'var(--ink)'}}>{s.name}</span>
              {on && <span style={{color:s.theme.primary}}><I.check/></span>}
            </button>
          );})}
        </div>
      </>)}

      <button onClick={save} disabled={busy} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:busy?.6:1}}>{busy?'กำลังบันทึก...':(isEdit?'บันทึกการแก้ไข':'บันทึกผู้ใช้')}</button>

      {isEdit && !isSelf && (
        <button onClick={del} disabled={busy} className="press kanit" style={{width:'100%',padding:'13px',marginTop:10,border:'1.5px solid #FCA5A5',borderRadius:14,background:'#fff',color:'#DC2626',fontSize:15,fontWeight:600,display:'flex',justifyContent:'center',alignItems:'center',gap:8}}>
          <I.trash/> ลบผู้ใช้นี้</button>
      )}
      {isSelf && <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:10}}>ลบบัญชีตัวเองไม่ได้</div>}
    </Sheet>
  );
}

function ChangePinSheet({user,onClose,toast}){
  const [p1,setP1]=useState(''); const [p2,setP2]=useState(''); const [busy,setBusy]=useState(false);
  const inp={width:'100%',padding:'13px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:22,fontWeight:600,letterSpacing:5,marginBottom:14,textAlign:'center'};
  const save=async()=>{
    if(p1.length!==6){ toast('PIN ต้อง 6 หลัก','err'); return; }
    if(p1!==p2){ toast('PIN ใหม่ทั้งสองช่องไม่ตรงกัน','err'); return; }
    setBusy(true);
    try{
      if(await pinTakenByOther(p1,user.id)){ toast('PIN นี้ถูกใช้แล้ว เลือกเลขอื่น','err'); setBusy(false); return; }
      await updateUser(user.id,{pin:p1},{id:user.id,name:user.name});
      toast('เปลี่ยน PIN เรียบร้อย ใช้ PIN ใหม่ครั้งถัดไป'); onClose();
    }catch(e){ toast('เปลี่ยนไม่สำเร็จ','err'); setBusy(false); }
  };
  return (
    <Sheet title="เปลี่ยน PIN" onClose={onClose} z={60}>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>ตั้ง PIN 6 หลักใหม่สำหรับบัญชี <b>{user.name}</b></div>

/* ---------- Excel Import (map คอลัมน์เอง · lazy-load SheetJS) ---------- */
function loadXLSX(){
  return new Promise((res,rej)=>{
    if(window.XLSX) return res(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX); s.onerror=()=>rej(new Error('โหลดไลบรารีไม่สำเร็จ'));
    document.head.appendChild(s);
  });
}
function xDate(v){
  if(v==null||v==='') return null;
  if(v instanceof Date && !isNaN(v.getTime())) return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`;
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){ let d=+m[1],mo=+m[2],y=+m[3]; if(y<100)y+=2000; if(y>2400)y-=543; if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${y}-${pad(mo)}-${pad(d)}`; }
  m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(m){ let y=+m[1],mo=+m[2],d=+m[3]; if(y>2400)y-=543; if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${y}-${pad(mo)}-${pad(d)}`; }
  const d2=new Date(s); if(!isNaN(d2.getTime())) return `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}`;
  return null;
}
function xAmt(v){ if(v==null) return null; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?null:n; }

function Import({shop,user,toast,onClose,onDone}){
  const [step,setStep]=useState('upload');
  const [fileName,setFileName]=useState('');
  const [headers,setHeaders]=useState([]);
  const [rows,setRows]=useState([]);
  const [allRows,setAllRows]=useState([]);
  const [hRow,setHRow]=useState(1);
  const [map,setMap]=useState({date:-1,amount:-1,cat:-1});
  const [kind,setKind]=useState('income');
  const [method,setMethod]=useState('cash');
  const [defCat,setDefCat]=useState('รายได้เครื่อง');
  const [importing,setImporting]=useState(false);
  const [prog,setProg]=useState(0);
  const fileRef=useRef();

  const guessMap=(hs)=>{
    const find=(keys)=>hs.findIndex(h=>{ const t=String(h||'').toLowerCase(); return keys.some(k=>t.includes(k)); });
    return { date:find(['วันที่','date','วัน']), amount:find(['จำนวน','ยอด','เงิน','amount','บาท','รายได้','total','net','income']), cat:find(['เครื่อง','หมวด','machine','รายการ','ประเภท','item','no']) };
  };
  const applyHeader=(raw,hr)=>{
    const hs=(raw[hr-1]||[]).map((c,i)=> String(c||'').trim()||`คอลัมน์ ${i+1}`);
    setHeaders(hs); setHRow(hr); setRows(raw.slice(hr)); setMap(guessMap(hs));
  };
  const onFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFileName(f.name); setStep('loading');
    try{
      const XLSX=await loadXLSX();
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      if(!raw.length){ toast('ไฟล์ว่าง','err'); setStep('upload'); return; }
      setAllRows(raw); applyHeader(raw,1); setStep('map');
    }catch(err){ console.error(err); toast(err.message||'อ่านไฟล์ไม่สำเร็จ','err'); setStep('upload'); }
  };

  const parsed=(()=>{
    if(map.date<0||map.amount<0) return {valid:[],bad:0};
    const valid=[]; let bad=0;
    rows.forEach(r=>{
      const d=xDate(r[map.date]); const a=xAmt(r[map.amount]);
      if(d && a!=null && Math.round(Math.abs(a))>0) valid.push({date:d,amount:Math.round(Math.abs(a)),category: map.cat>=0?(String(r[map.cat]||'').trim()||defCat):defCat});
      else if(r.some(c=>String(c||'').trim()!=='')) bad++;
    });
    return {valid,bad};
  })();

  const doImport=async()=>{
    if(!parsed.valid.length){ toast('ไม่มีแถวที่นำเข้าได้','err'); return; }
    setImporting(true); setProg(0);
    try{
      const v=parsed.valid, chunk=400; const ids=[];
      for(let i=0;i<v.length;i+=chunk){
        const batch=db.batch();
        v.slice(i,i+chunk).forEach(r=>{ const ref=db.collection('transactions').doc(); const ym=ymOf(r.date); ids.push(ref.id);
          batch.set(ref,{shopId:shop.id,kind,category:r.category,amount:r.amount,method,note:'นำเข้า Excel',date:r.date,ym,skey:`${shop.id}_${ym}`,by:{id:user.id,name:user.name},source:'import',ts:FieldValue.serverTimestamp()}); });
        await batch.commit(); setProg(Math.min(v.length,i+chunk));
      }
      await writeLog(shop.id, {id:user.id,name:user.name}, 'import', `นำเข้า Excel ${v.length} รายการ`, ids.map(id=>({id, before:null, after:null})));
      toast(`นำเข้า ${v.length} รายการแล้ว`); onDone();
    }catch(e){ console.error(e); toast('นำเข้าไม่สำเร็จ: '+(e.message||''),'err'); setImporting(false); }
  };

  const sel={width:'100%',padding:'11px 12px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,background:'#fff',marginBottom:12,color:'var(--ink)'};
  const opts=[<option key="-1" value={-1}>— ไม่ใช้ —</option>,...headers.map((h,i)=><option key={i} value={i}>{h}</option>)];

  return (
    <Sheet title="นำเข้ารายรับจาก Excel" onClose={onClose} z={70}>
      {step==='upload' && (
        <div style={{textAlign:'center',padding:'10px 0 20px'}}>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:18,lineHeight:1.6}}>เลือกไฟล์ .xlsx / .csv แล้วจับคู่คอลัมน์เอง · รองรับทุกรูปแบบ</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{display:'none'}}/>
          <button onClick={()=>fileRef.current.click()} className="press kanit" style={{padding:'14px 24px',border:'2px dashed var(--accent)',borderRadius:14,background:'var(--tint)',color:'var(--primary)',fontWeight:600,fontSize:15,display:'inline-flex',alignItems:'center',gap:8}}><I.table/> เลือกไฟล์ Excel</button>
        </div>
      )}
      {step==='loading' && <div style={{padding:'30px 0'}}><Loading label="กำลังอ่านไฟล์..."/></div>}
      {step==='map' && (<>
        <div style={{fontSize:12.5,color:'var(--muted)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}><I.table/> {fileName}</div>

        <label style={lbl}>แถวที่เป็นหัวตาราง</label>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={()=>applyHeader(allRows,Math.max(1,hRow-1))} className="press" style={{width:38,height:38,borderRadius:10,border:'1px solid var(--line)',background:'#fff',fontSize:18}}>−</button>
          <div className="num" style={{minWidth:30,textAlign:'center',fontWeight:700,fontSize:16}}>{hRow}</div>
          <button onClick={()=>applyHeader(allRows,Math.min(allRows.length,hRow+1))} className="press" style={{width:38,height:38,borderRadius:10,border:'1px solid var(--line)',background:'#fff',fontSize:18}}>+</button>
          <span style={{fontSize:11.5,color:'var(--muted)'}}>ถ้าหัวตารางไม่ใช่แถวแรก ปรับตรงนี้</span>
        </div>

        <label style={lbl}>คอลัมน์ “วันที่” *</label>
        <select value={map.date} onChange={e=>setMap({...map,date:+e.target.value})} style={sel}>{opts}</select>
        <label style={lbl}>คอลัมน์ “จำนวนเงิน” *</label>
        <select value={map.amount} onChange={e=>setMap({...map,amount:+e.target.value})} style={sel}>{opts}</select>
        <label style={lbl}>คอลัมน์ “หมวด/เครื่อง” (ถ้ามี)</label>
        <select value={map.cat} onChange={e=>setMap({...map,cat:+e.target.value})} style={sel}>{opts}</select>
        {map.cat<0 && (<><label style={lbl}>หมวดเริ่มต้น (เมื่อไม่เลือกคอลัมน์)</label>
          <input value={defCat} onChange={e=>setDefCat(e.target.value)} style={{width:'100%',padding:'11px 12px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,marginBottom:12}}/></>)}

        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <div style={{flex:1}}>
            <label style={lbl}>ประเภท</label>
            <div style={{display:'flex',gap:6}}>
              {[['income','รายรับ','#16A34A'],['expense','รายจ่าย','#DC2626']].map(([k,l,c])=>(
                <button key={k} onClick={()=>setKind(k)} className="press kanit" style={{flex:1,padding:'9px 2px',borderRadius:10,fontSize:13,fontWeight:600,border:`1.5px solid ${kind===k?c:'var(--line)'}`,background:kind===k?c:'#fff',color:kind===k?'#fff':'var(--ink)'}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1}}>
            <label style={lbl}>ช่องทาง</label>
            <div style={{display:'flex',gap:6}}>
              {[['cash','เงินสด'],['bank','โอน']].map(([k,l])=>(
                <button key={k} onClick={()=>setMethod(k)} className="press kanit" style={{flex:1,padding:'9px 2px',borderRadius:10,fontSize:13,fontWeight:600,border:`1.5px solid ${method===k?'var(--primary)':'var(--line)'}`,background:method===k?'var(--primary)':'#fff',color:method===k?'#fff':'var(--ink)'}}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{background:'var(--soft)',borderRadius:12,padding:'10px 12px',marginBottom:14,fontSize:12.5}}>
          {(map.date<0||map.amount<0) ? <span style={{color:'var(--neg)'}}>เลือกคอลัมน์วันที่และจำนวนเงินก่อน</span> :
            <>พร้อมนำเข้า <b style={{color:'var(--pos)'}}>{parsed.valid.length}</b> แถว{parsed.bad>0 && <span style={{color:'var(--muted)'}}> · ข้าม {parsed.bad} แถว (วันที่/เงินไม่ถูกต้อง)</span>}</>}
        </div>
        {parsed.valid.length>0 && (
          <div style={{border:'1px solid var(--line)',borderRadius:12,overflow:'hidden',marginBottom:14}}>
            <div style={{display:'flex',fontSize:11,fontWeight:700,color:'var(--muted)',background:'var(--bg)',padding:'7px 10px'}}><span style={{flex:1}}>วันที่</span><span style={{flex:1}}>หมวด</span><span style={{width:70,textAlign:'right'}}>เงิน</span></div>
            {parsed.valid.slice(0,5).map((r,i)=>(
              <div key={i} style={{display:'flex',fontSize:12.5,padding:'7px 10px',borderTop:'1px solid var(--line)'}}><span style={{flex:1}}>{r.date}</span><span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.category}</span><span className="num" style={{width:70,textAlign:'right',fontWeight:600}}>{baht(r.amount)}</span></div>
            ))}
            {parsed.valid.length>5 && <div style={{fontSize:11,color:'var(--muted)',padding:'6px 10px',borderTop:'1px solid var(--line)'}}>…และอีก {parsed.valid.length-5} แถว</div>}
          </div>
        )}

        <button onClick={doImport} disabled={importing||!parsed.valid.length} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:(importing||!parsed.valid.length)?.5:1}}>
          {importing? `กำลังนำเข้า ${prog}/${parsed.valid.length}...` : `นำเข้า ${parsed.valid.length} รายการ`}</button>
        <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:8}}>⚠️ นำเข้าไฟล์เดิมซ้ำจะได้ข้อมูลซ้ำ</div>
      </>)}
    </Sheet>
  );
}

/* ---------- PHASE 2 · ทุน / หุ้นส่วน ---------- */
async function capitalEntries(shopId){
  const s=await db.collection('transactions').where('skey','==',`${shopId}_CAP`).get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function addCapital({shopId,shareholder,type,amount,note,by,actor}){
  const ref=await db.collection('transactions').add({
    shopId, kind:type, category:shareholder, amount:Number(amount), method:'-', note:note||'',
    date:today(), ym:ymOf(today()), skey:`${shopId}_CAP`, by:by||'', source:'capital', ts:FieldValue.serverTimestamp()
  });
  await writeLog(shopId, actor||(by?{id:'',name:by}:null), type==='dividend'?'capital.dividend':'capital.add',
    `${type==='withdraw'?'ถอนทุน':type==='dividend'?'ปันผล':'เพิ่มทุน'} ${shareholder} ${baht(Number(amount))}`,
    [{id:ref.id, before:null, after:{shareholder,type,amount:Number(amount),note:note||'',date:today()}}]);
  return ref.id;
}

function Capital({shop,user,toast}){
  const isAdmin=user.role==='admin';
  const [load,setLoad]=useState(true);
  const [rows,setRows]=useState([]);
  const [sheet,setSheet]=useState(null);
  const reload=async()=>{ setLoad(true); try{ setRows(await capitalEntries(shop.id)); }catch(e){ console.error(e); } setLoad(false); };
  useEffect(()=>{ reload(); },[shop.id]);

  const map={};
  rows.forEach(r=>{ const n=r.category||'-'; if(!map[n]) map[n]={net:0,dividend:0}; const a=Number(r.amount)||0;
    if(r.kind==='invest') map[n].net+=a; else if(r.kind==='withdraw') map[n].net-=a; else if(r.kind==='dividend') map[n].dividend+=a; });
  let holders=Object.entries(map).map(([name,v])=>({name,net:v.net,dividend:v.dividend})).filter(h=>h.net!==0||h.dividend!==0);
  const totalCapAll=holders.reduce((s,h)=>s+h.net,0);
  const totalDiv=holders.reduce((s,h)=>s+h.dividend,0);
  holders.forEach(h=>{ h.pct = totalCapAll>0 ? (h.net/totalCapAll)*100 : 0; });
  holders.sort((a,b)=>b.net-a.net);
  const names=[...new Set(rows.map(r=>r.category).filter(Boolean))];
  const history=[...rows].sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
  const card={background:'#fff',border:'1px solid var(--line)',borderRadius:16,padding:16,marginBottom:14};

  if(load) return <Loading/>;
  return (
    <div style={{padding:'14px 16px 8px'}}>
      <div style={{background:'var(--primary)',borderRadius:18,padding:18,marginBottom:14,color:'#fff'}}>
        <div style={{fontSize:13,opacity:.85}}>เงินทุนรวม · {shop.name}</div>
        <div className="num" style={{fontSize:28,fontWeight:800,marginTop:2}}>{baht(totalCapAll)}</div>
        <div style={{fontSize:12.5,opacity:.85,marginTop:4}}>หุ้นส่วน {holders.length} คน · ปันผลจ่ายสะสม {baht(totalDiv)}</div>
      </div>

      {isAdmin && (
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <button onClick={()=>setSheet('add')} className="press kanit" style={{flex:1,padding:'12px',border:'none',borderRadius:13,background:'var(--soft)',color:'var(--primary)',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><I.plus/> เพิ่ม/ถอนทุน</button>
          <button onClick={()=>setSheet('div')} disabled={totalCapAll<=0} className="press kanit" style={{flex:1,padding:'12px',border:'none',borderRadius:13,background:totalCapAll<=0?'var(--soft)':'var(--primary)',color:totalCapAll<=0?'var(--muted)':'#fff',fontWeight:600,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><I.wallet/> จ่ายปันผล</button>
        </div>
      )}

      <div style={card}>
        <div className="kanit" style={{fontWeight:600,fontSize:15,marginBottom:10}}>สัดส่วนหุ้นส่วน</div>
        {holders.length===0 ? <div style={{fontSize:13,color:'var(--muted)',padding:'10px 0',textAlign:'center'}}>ยังไม่มีข้อมูลทุน{isAdmin?' — กด “เพิ่ม/ถอนทุน” เพื่อเริ่ม':''}</div> :
          holders.map(h=>(
            <div key={h.name} style={{marginBottom:13}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
                <span style={{fontSize:14,fontWeight:500}}>{h.name}</span>
                <span><span className="num" style={{fontWeight:700,fontSize:14.5,color:h.net<0?'var(--neg)':'var(--ink)'}}>{baht(h.net)}</span> <span style={{fontSize:12,color:'var(--muted)'}}>· {h.pct.toFixed(1)}%</span></span>
              </div>
              <div style={{height:9,background:'var(--soft)',borderRadius:6,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.max(0,Math.min(100,h.pct))}%`,background:'var(--primary)',borderRadius:6}}/>
              </div>
              {h.dividend>0 && <div style={{fontSize:11.5,color:'var(--muted)',marginTop:3}}>ปันผลรับสะสม {baht(h.dividend)}</div>}
            </div>
          ))
        }
      </div>

      {history.length>0 && (
        <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:16,padding:'14px 0 6px',marginBottom:14}}>
          <div className="kanit" style={{fontWeight:600,fontSize:15,padding:'0 16px 8px'}}>ประวัติ</div>
          {history.map(r=>{
            const t=r.kind, lab=t==='invest'?'เพิ่มทุน':t==='withdraw'?'ถอนทุน':'ปันผล';
            const col=t==='invest'?'var(--pos)':t==='withdraw'?'var(--neg)':'var(--accent)';
            const sign=t==='withdraw'?'-':t==='invest'?'+':'';
            return (
              <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px'}}>
                <span className="kanit" style={{fontSize:11,fontWeight:600,color:col,background:'var(--soft)',borderRadius:7,padding:'3px 8px',flexShrink:0}}>{lab}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.category}</div>
                  <div style={{fontSize:11.5,color:'var(--muted)'}}>{r.date}{r.note?' · '+r.note:''}</div>
                </div>
                <span className="num" style={{fontWeight:600,fontSize:14,color:col,flexShrink:0}}>{sign}{baht(r.amount)}</span>
                {isAdmin && <button onClick={async()=>{ if(window.confirm('ลบรายการนี้?')){ await delTxn(r.id, {id:user.id,name:user.name}); reload(); } }} className="press" style={{border:'none',background:'none',color:'#C0C4CC',padding:4,flexShrink:0}}><I.trash/></button>}
              </div>
            );
          })}
        </div>
      )}

      {sheet==='add' && <CapitalSheet shop={shop} user={user} names={names} onClose={()=>setSheet(null)} onSaved={()=>{ setSheet(null); reload(); }} toast={toast}/>}
      {sheet==='div' && <DividendSheet shop={shop} user={user} holders={holders} onClose={()=>setSheet(null)} onSaved={()=>{ setSheet(null); reload(); }} toast={toast}/>}
    </div>
  );
}

function DividendSheet({shop,user,holders,onClose,onSaved,toast}){
  const [pool,setPool]=useState(''); const [busy,setBusy]=useState(false);
  const inpN={width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:20,fontWeight:600,marginBottom:14};
  const pos=holders.filter(h=>h.net>0); const totalPos=pos.reduce((s,h)=>s+h.net,0);
  const p=Number(pool)||0;
  const split=pos.map(h=>({name:h.name,pct: totalPos>0?(h.net/totalPos)*100:0, share: totalPos>0?Math.round(p*(h.net/totalPos)):0}));
  const save=async()=>{
    if(p<=0){ toast('กรอกยอดปันผลรวม','err'); return; }
    setBusy(true);
    try{ for(const s of split){ if(s.share>0) await addCapital({shopId:shop.id,shareholder:s.name,type:'dividend',amount:s.share,note:'ปันผลรวม '+p.toLocaleString('en-US'),by:user.name,actor:{id:user.id,name:user.name}}); }
      toast('บันทึกปันผลแล้ว'); onSaved();
    }catch(e){ toast('บันทึกไม่สำเร็จ','err'); setBusy(false); }
  };
  return (
    <Sheet title="จ่ายปันผล" onClose={onClose} z={60}>
      <div style={{fontSize:12.5,color:'var(--muted)',marginBottom:14}}>กรอกยอดปันผลรวม ระบบจะแบ่งตามสัดส่วนหุ้นให้อัตโนมัติ</div>
      <label style={lbl}>ยอดปันผลรวม (บาท)</label>
      <input value={pool} onChange={e=>setPool(e.target.value.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="0" className="num" style={inpN}/>
      {p>0 && (
        <div style={{background:'var(--tint)',border:'1px solid var(--line)',borderRadius:14,padding:14,marginBottom:14}}>
          <div className="kanit" style={{fontWeight:600,fontSize:14,marginBottom:8}}>แบ่งให้แต่ละคน</div>
          {split.map(s=>(
            <div key={s.name} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13.5}}>
              <span>{s.name} <span style={{color:'var(--muted)',fontSize:12}}>· {s.pct.toFixed(1)}%</span></span>
              <span className="num" style={{fontWeight:700}}>{baht(s.share)}</span>
            </div>
          ))}
        </div>
      )}
      <button onClick={save} disabled={busy||p<=0} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:(busy||p<=0)?.5:1}}>{busy?'กำลังบันทึก...':'บันทึกปันผล'}</button>
    </Sheet>
  );
}

/* ---------- PHASE 2 · วิเคราะห์ยอดขาย ---------- */
function MiniBars({data,color}){
  const max=Math.max(1,...data.map(d=>d.value));
  const kS=(n)=> n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':String(Math.round(n));
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:5,height:120,marginTop:6}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',gap:5,height:'100%'}}>
          <div className="num" style={{fontSize:9,color:'var(--muted)',fontWeight:700,height:12}}>{d.value>0?kS(d.value):''}</div>
          <div style={{width:'100%',maxWidth:28,height:`${(d.value/max)*86}%`,minHeight:d.value>0?4:1,background:d.value>0?color:'var(--line)',borderRadius:'5px 5px 0 0'}}/>
          <div style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}
function CatBars({list,color}){
  const max=Math.max(1,...list.map(x=>x[1]));
  return (
    <div style={{marginTop:8}}>
      {list.map(([cat,val])=>(
        <div key={cat} style={{marginBottom:11}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}>
            <span style={{color:'var(--ink)'}}>{cat}</span>
            <span className="num" style={{fontWeight:600}}>{baht(val)}</span>
          </div>
          <div style={{height:8,background:'var(--soft)',borderRadius:6,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(val/max)*100}%`,background:color,borderRadius:6}}/>
          </div>
        </div>
      ))}
    </div>
  );
}
function Analyze({shop,user,toast}){

  const [txns,setTxns]=useState([]);
  const [showReport,setShowReport]=useState(false);
  useEffect(()=>{ (async()=>{ setLoad(true); try{ setTxns(await monthTxns(shop.id,ym)); }catch(e){ console.error(e); } setLoad(false); })(); },[shop.id,ym]);

  const shift=(d)=>{ const [y,m]=ym.split('-').map(Number); const dt=new Date(y,m-1+d,1); setYm(`${dt.getFullYear()}-${pad(dt.getMonth()+1)}`); };
  const [yy,mm]=ym.split('-').map(Number);
  const monthLabel=`${TM[mm-1]} ${yy+543}`;

  const inc=txns.filter(t=>t.kind==='income'), exp=txns.filter(t=>t.kind==='expense');
  const income=sumBy(txns,x=>x.kind==='income'), expense=sumBy(txns,x=>x.kind==='expense'), profit=income-expense;

  const dowSum=[0,0,0,0,0,0,0];
  inc.forEach(t=>{ const d=new Date(t.date+'T00:00:00'); if(!isNaN(d.getTime())) dowSum[d.getDay()]+=Number(t.amount)||0; });
  const dowOrder=[1,2,3,4,5,6,0], dowLab=['จ','อ','พ','พฤ','ศ','ส','อา'], dowFull=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสฯ','ศุกร์','เสาร์'];
  const dowData=dowOrder.map((idx,i)=>({label:dowLab[i],value:dowSum[idx]}));

  const blocks=[{l:'00–06',a:0,b:6},{l:'06–09',a:6,b:9},{l:'09–12',a:9,b:12},{l:'12–15',a:12,b:15},{l:'15–18',a:15,b:18},{l:'18–21',a:18,b:21},{l:'21–24',a:21,b:24}];
  const timeSum=blocks.map(()=>0);
  inc.forEach(t=>{ const dt=t.ts&&t.ts.toDate?t.ts.toDate():(t.ts&&t.ts.seconds?new Date(t.ts.seconds*1000):null); if(dt){ const h=dt.getHours(); const bi=blocks.findIndex(b=>h>=b.a&&h<b.b); if(bi>=0) timeSum[bi]+=Number(t.amount)||0; } });
  const timeData=blocks.map((b,i)=>({label:b.l.slice(0,2),value:timeSum[i]}));

  const agg=(arr)=>{ const m={}; arr.forEach(t=>{ const k=t.category||'อื่นๆ'; m[k]=(m[k]||0)+(Number(t.amount)||0); }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const incCats=agg(inc), expCats=agg(exp);

        <div className="kanit" style={{fontWeight:700,fontSize:16}}>{monthLabel}</div>

              วันยอดสูงสุด <b>{dowFull[peakDowIdx]}</b>{hasTime && <> · ช่วงคึกสุด <b>{blocks[peakTimeIdx].l} น.</b></>}
              <div style={{color:'var(--muted)',marginTop:2}}>แนะนำเน้นจัดคนและเตรียมวัตถุดิบ/น้ำยาช่วงนี้</div>
            </div>
          </div>
        )}

        {expCats.length>0 && (
          <div style={card}>
            <div className="kanit" style={ttl}>รายจ่ายแยกหมวด</div>
            <CatBars list={expCats} color="var(--neg)"/>
          </div>
        )}
        {incCats.length>0 && (
          <div style={card}>
            <div className="kanit" style={ttl}>รายรับแยกหมวด</div>
            <CatBars list={incCats} color="var(--pos)"/>
          </div>
        )}
      </>)}
    </div>
  );
}

/* ---------- PHASE 2 placeholder ---------- */
function Phase2({title,icon:Ic,items}){
  return (
    <div style={{padding:'40px 24px'}}>
      <div style={{textAlign:'center'}}>

/* ---------- Boot: เชื่อมต่อ + เข้าระบบนิรนามก่อนเข้าแอป (เพื่อให้ผ่าน Security Rules) ---------- */
function Boot(){
  const [phase,setPhase]=useState('init'); // init | ready | autherr
  const [msg,setMsg]=useState('');
  useEffect(()=>{
    if(!FB_OK){ setPhase('ready'); return; }
    let done=false;
    const unsub=firebase.auth().onAuthStateChanged(u=>{ if(u && !done){ done=true; setPhase('ready'); } });
    firebase.auth().signInAnonymously().catch(e=>{
      if(done) return; done=true;
      setMsg(e.code==='auth/operation-not-allowed'
        ? 'ยังไม่ได้เปิด Anonymous — ไปที่ Firebase Console → Authentication → Sign-in method → เปิด “Anonymous” แล้วลองใหม่'
        : ('เชื่อมต่อ Firebase ไม่สำเร็จ: '+(e.message||e.code)));
      setPhase('autherr');
    });
    return ()=>unsub();
  },[]);
  if(phase==='init') return <div className="shell" style={{display:'grid',placeItems:'center'}}><Loading label="กำลังเชื่อมต่ออย่างปลอดภัย..."/></div>;
  if(phase==='autherr') return (
    <div className="shell" style={{display:'grid',placeItems:'center',padding:24}}>
      <div style={{textAlign:'center',maxWidth:330}}>
        <div style={{fontSize:42,marginBottom:12}}>🔐</div>
        <div className="kanit" style={{fontWeight:700,fontSize:18,marginBottom:8}}>เชื่อมต่อไม่สำเร็จ</div>
        <div style={{fontSize:13.5,color:'var(--muted)',lineHeight:1.6}}>{msg}</div>
      </div>
    </div>
  );
  return <App/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Boot/>);
</script>
