function EntrySheet({shop,user,initMode,initDate,editTxn,onClose,onSaved,toast}){
  const isEdit=!!editTxn;
  const [mode,setMode]=useState(editTxn?(editTxn.kind==='income'?'inc':'exp'):(initMode||'exp'));
  const kind=mode==='inc'?'income':'expense';
  const [expr,setExpr]=useState(editTxn?String(editTxn.amount):'');
  const [cats,setCats]=useState([]);
  const [cat,setCat]=useState(editTxn?editTxn.category:'');
  const [pay,setPay]=useState(editTxn?(editTxn.method||'cash'):'cash');
  const [date,setDate]=useState(editTxn?editTxn.date:(initDate||today()));
  const [note,setNote]=useState(editTxn?(editTxn.note||''):'');
  const [showNote,setShowNote]=useState(!!(editTxn&&editTxn.note));
  const [photo,setPhoto]=useState(null);
  const [photoBusy,setPhotoBusy]=useState(false);
  const [saving,setSaving]=useState(false);
  const [showCat,setShowCat]=useState(false);
  const photoRef=useRef();

  const loadCats=async()=>{ const custom=await customCats(shop.id,kind); const base=DEFAULT_CATS[shop.type][kind]; custom.forEach(c=>{ CATMETA[shop.id+'|'+c.name]={color:c.color||catColor(c.name), icon:c.icon||null}; }); const names=[...base,...custom.map(c=>c.name).filter(n=>!base.includes(n))]; setCats(names); setCat(p=> names.includes(p)?p:(names[0]||'')); };
  useEffect(()=>{ loadCats(); },[shop.id,mode]);

  const val=Math.round(evalExpr(expr));
  const hasOp = expr.length>0 && /[-+*/]/.test(expr);
  const exprPretty = expr.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/-/g,' − ').replace(/\+/g,' + ');

  const press=(t)=>{ setExpr(e=>{
    if(t==='C') return '';
    if(t==='back') return e.slice(0,-1);
    if('+-*/'.includes(t)){ if(e==='') return ''; if('+-*/'.includes(e.slice(-1))) return e.slice(0,-1)+t; return e+t; }
    if(t==='00'){ if(e===''||'+-*/'.includes(e.slice(-1))) return e; return e+'00'; }
    return e+t;
  }); };
  const onPhoto=async(ev)=>{ const f=ev.target.files[0]; if(!f) return; setPhotoBusy(true); try{ const b=await resizePhoto(f,600,0.6); setPhoto(b);}catch(e){toast('ย่อรูปไม่สำเร็จ','err');} setPhotoBusy(false); ev.target.value=''; };
  const addCatLocal=async(name,color,icon)=>{ try{ await addCat(shop.id,kind,name,color,icon); await loadCats(); setCat(name); setShowCat(false); toast('เพิ่มหมวดแล้ว'); }catch(e){ toast('เพิ่มไม่สำเร็จ','err'); } };
  const save=async()=>{
    const amount=Math.round(evalExpr(expr));
    if(!amount||amount<=0){ toast('ใส่จำนวนเงินก่อน','err'); return; }
    if(!cat){ toast('เลือกหมวดก่อน','err'); return; }
    setSaving(true);
    try{
      if(isEdit){
        await updateTxn(editTxn.id,{shopId:shop.id,kind,category:cat,amount,method:pay,note,date,by:{id:user.id,name:user.name}});
        toast('แก้ไขรายการแล้ว'); onSaved&&onSaved();
      } else {
        await addTxn({shopId:shop.id,kind,category:cat,amount,method:pay,note,by:{id:user.id,name:user.name},photo,date});
        toast(`บันทึก${mode==='inc'?'รายรับ':'รายจ่าย'} ${baht(amount)} แล้ว`); onSaved&&onSaved();
      }
    }catch(e){ toast('บันทึกไม่สำเร็จ','err'); setSaving(false); }
  };
  const dStr = date===today()? 'วันนี้' : (()=>{ const a=date.split('-'); return `${parseInt(a[2])} ${THAI_MON[parseInt(a[1])-1]}`; })();
  const kbtn=(key,label,o)=>{ o=o||{}; return <button key={key} onClick={o.onClick||(()=>press(key))} className="press" style={{gridColumn:o.span?('span '+o.span):undefined,border:'none',background:o.bg||'#EDF0F2',color:o.fg||'var(--ink)',borderRadius:14,height:56,fontSize:o.fs||23,fontWeight:600,display:'grid',placeItems:'center'}}>{label}</button>; };

  return (
    <Portal><div style={{position:'fixed',inset:0,zIndex:90,background:'#fff',display:'flex',flexDirection:'column',maxWidth:480,margin:'0 auto'}}>
      <div style={{background:'var(--primary)',color:'#fff',paddingTop:'env(safe-area-inset-top)'}}>
        <div style={{display:'flex',alignItems:'center',padding:'8px 6px 0'}}>
          <button onClick={onClose} className="press" style={{border:'none',background:'none',color:'#fff',padding:8}}><I.back/></button>
          <div style={{flex:1,textAlign:'center',fontSize:13,opacity:.9}} className="kanit">{shop.name}</div>
          <div style={{width:40,textAlign:'right'}}>
            {mode==='exp' && !isEdit && (<>
              <input ref={photoRef} type="file" accept="image/*" onChange={onPhoto} style={{display:'none'}}/>
              <button onClick={()=>photoRef.current.click()} className="press" style={{border:'none',background:'none',color:'#fff',padding:8,position:'relative'}}>{photoBusy?'…':<I.receipt/>}{photo&&<span style={{position:'absolute',top:5,right:5,width:8,height:8,borderRadius:99,background:'#FACC15'}}/>}</button>
            </>)}
          </div>
        </div>
        <div style={{display:'flex',padding:'2px 14px 0'}}>
          {[['inc','รายรับ'],['exp','รายจ่าย']].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} className="press kanit" style={{flex:1,padding:'11px 0 13px',border:'none',background:'none',color:'#fff',fontSize:16,fontWeight:600,opacity:mode===k?1:0.5,borderBottom:'3px solid '+(mode===k?'#fff':'transparent')}}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px 18px 6px'}}>
        <div style={{textAlign:'right'}}>
          {hasOp && <div className="num" style={{fontSize:15,color:'var(--muted)',minHeight:18}}>{exprPretty}</div>}
          <div className="num" style={{fontSize:46,fontWeight:700,lineHeight:1.12,color:mode==='inc'?'#16A34A':'#DC2626'}}>{val? val.toLocaleString('en-US'):'0'}</div>
        </div>
        <div style={{height:1,background:'var(--line)',margin:'10px 0 12px'}}/>

        <button onClick={()=>setShowCat(true)} className="press" style={{width:'100%',display:'flex',alignItems:'center',gap:13,padding:'8px 0',border:'none',background:'none',textAlign:'left'}}>
          {cat? <CatBadge shopId={shop.id} name={cat}/> : <span style={{width:42,height:42,borderRadius:99,flexShrink:0,background:'var(--soft)',color:'var(--muted)',display:'grid',placeItems:'center',fontWeight:700,fontSize:17}}>?</span>}
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:11.5,color:'var(--muted)'}}>หมวดหมู่</div><div className="kanit" style={{fontSize:15.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{cat||'เลือกหมวด'}</div></div>
          <I.chevron style={{color:'#C0C4CC'}}/>
        </button>

        <div style={{display:'flex',gap:10,marginTop:10}}>
          <label className="press" style={{flex:1,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'12px',border:'1.5px solid var(--line)',borderRadius:12,background:'#fff',fontSize:13.5,fontWeight:500}}>
            <span style={{fontSize:15}}>📅</span> {dStr}
            <input type="date" value={date} max={today()} onChange={e=>setDate(e.target.value||today())} style={{position:'absolute',inset:0,opacity:0,width:'100%'}}/>
          </label>
          {[['cash','เงินสด',I.cash],['bank','โอน',I.bank]].map(([k,l,Ic])=>(
            <button key={k} onClick={()=>setPay(k)} className="press" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'12px',border:'1.5px solid '+(pay===k?'var(--primary)':'var(--line)'),borderRadius:12,background:pay===k?'var(--soft)':'#fff',color:pay===k?'var(--primary)':'var(--ink)',fontSize:13.5,fontWeight:500}}><Ic/>{l}</button>
          ))}
        </div>

        <button onClick={()=>setShowNote(v=>!v)} className="press kanit" style={{marginTop:10,width:'100%',display:'flex',alignItems:'center',gap:8,padding:'11px 0',border:'none',background:'none',color:note?'var(--ink)':'var(--muted)',fontSize:14,textAlign:'left'}}><span style={{fontSize:15}}>📝</span> <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{note||'เพิ่มหมายเหตุ'}</span></button>
        {showNote && <input value={note} onChange={e=>setNote(e.target.value)} placeholder="หมายเหตุ" autoFocus style={{width:'100%',padding:'11px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:14}}/>}
        {mode==='exp' && photo && <div style={{display:'flex',gap:10,alignItems:'center',marginTop:10}}><img src={photo} alt="" style={{width:46,height:46,borderRadius:10,objectFit:'cover',border:'1px solid var(--line)'}}/><span style={{fontSize:12.5,color:'var(--muted)',flex:1}}>แนบรูปใบเสร็จแล้ว</span><button onClick={()=>setPhoto(null)} className="press kanit" style={{border:'1px solid var(--line)',background:'#fff',color:'#DC2626',borderRadius:9,padding:'6px 11px',fontSize:12.5,fontWeight:600}}>ลบ</button></div>}
      </div>

      <div style={{padding:'8px 10px calc(10px + env(safe-area-inset-bottom))',background:'var(--soft)',borderTop:'1px solid var(--line)'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {kbtn('7','7')}{kbtn('8','8')}{kbtn('9','9')}{kbtn('/','÷',{bg:'#DDE3E7',fg:'var(--primary)'})}
          {kbtn('4','4')}{kbtn('5','5')}{kbtn('6','6')}{kbtn('*','×',{bg:'#DDE3E7',fg:'var(--primary)'})}
          {kbtn('1','1')}{kbtn('2','2')}{kbtn('3','3')}{kbtn('-','−',{bg:'#DDE3E7',fg:'var(--primary)'})}
          {kbtn('0','0')}{kbtn('00','00')}{kbtn('back','⌫',{bg:'#DDE3E7'})}{kbtn('+','+',{bg:'#DDE3E7',fg:'var(--primary)'})}
          {kbtn('C','ล้าง',{bg:'#FEE4E2',fg:'#DC2626',fs:16})}
          <button onClick={save} disabled={saving} className="press kanit" style={{gridColumn:'span 3',border:'none',background:'var(--primary)',color:'#fff',borderRadius:14,height:56,fontSize:17,fontWeight:700,opacity:saving?0.6:1}}>{saving?'กำลังบันทึก…':`บันทึก${val?' · '+baht(val):''}`}</button>
        </div>
      </div>

      {showCat && <CategoryPicker shopId={shop.id} cats={cats} current={cat} onPick={(c)=>{ setCat(c); setShowCat(false); }} onAdd={addCatLocal} onClose={()=>setShowCat(false)}/>}
    </div></Portal>
  );
}

function LineSheet({shop,user,cfg,onClose,onSaved,toast}){
  const [url,setUrl]=useState(cfg.lineUrl || shop.lineUrl || '');
  const [qr,setQr]=useState(cfg.lineQr || shop.lineQr || null);
  const [qrBusy,setQrBusy]=useState(false); const [busy,setBusy]=useState(false);
  const qrRef=useRef();
  const onQr=async(e)=>{ const f=e.target.files[0]; if(!f) return; setQrBusy(true);
    try{ const b=await resizePhoto(f,460,1,'image/png'); setQr(b); }catch(err){ toast('ประมวลผลรูปไม่สำเร็จ','err'); }
    setQrBusy(false); e.target.value=''; };
  const save=async()=>{ setBusy(true);
    try{ await saveSettings(shop.id,{lineUrl:url.trim(), lineQr:qr||''},{id:user.id,name:user.name}); toast('บันทึก LINE แล้ว'); onSaved(); }
    catch(e){ toast('บันทึกไม่สำเร็จ','err'); setBusy(false); }
  };
  return (
    <Sheet title={'LINE · '+shop.name} onClose={onClose} z={60}>
      <label style={lbl}>ลิงก์เพิ่มเพื่อน LINE</label>
      <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://lin.ee/..." style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:14,marginBottom:16}}/>
      <label style={lbl}>QR Code</label>
      <input ref={qrRef} type="file" accept="image/*" onChange={onQr} style={{display:'none'}}/>
      {qr ? (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:16}}>
          <img src={qr} alt="QR" style={{width:170,height:170,borderRadius:12,border:'1px solid var(--line)'}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>qrRef.current.click()} className="press kanit" style={{border:'1px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:600}}>เปลี่ยนรูป</button>
            <button onClick={()=>setQr(null)} className="press kanit" style={{border:'1px solid var(--line)',background:'#fff',color:'#DC2626',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:600}}>ลบรูป</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>qrRef.current.click()} disabled={qrBusy} className="press" style={{width:'100%',padding:'12px',border:'1.5px dashed var(--line)',borderRadius:12,background:'#fff',color:'var(--muted)',fontSize:14,marginBottom:16}}>{qrBusy?'กำลังประมวลผล...':'อัปโหลดรูป QR'}</button>
      )}
      <button onClick={save} disabled={busy} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:busy?.6:1}}>{busy?'กำลังบันทึก...':'บันทึก'}</button>
    </Sheet>
  );
}

const LOG_META={
  'txn.add':{ic:'up',c:'#16A34A'}, 'txn.edit':{ic:'up',c:'#D97706'}, 'txn.delete':{ic:'trash',c:'#DC2626'},
  'capital.add':{ic:'wallet',c:'#16A34A'}, 'capital.dividend':{ic:'wallet',c:'#0891B2'}, 'capital.delete':{ic:'trash',c:'#DC2626'},
  'import':{ic:'table',c:'#7C3AED'}, 'settings.save':{ic:'gear',c:'#64748B'},
  'user.add':{ic:'users',c:'#16A34A'}, 'user.edit':{ic:'users',c:'#64748B'}, 'user.delete':{ic:'users',c:'#DC2626'}, 'user.active':{ic:'users',c:'#64748B'},
  'cashcount.save':{ic:'cash',c:'#64748B'}
};
function LogSheet({shop,user,onClose,toast}){
  const [load,setLoad]=useState(true);
  const [logs,setLogs]=useState([]);
  const [filter,setFilter]=useState('all');
  const [limit,setLimit]=useState(40);
  const [busy,setBusy]=useState(null);
  const reload=async()=>{ setLoad(true); try{ setLogs(await logsForShop(shop.id)); }catch(e){ console.error(e); } setLoad(false); };
  useEffect(()=>{ reload(); },[shop.id]);

  const actors=[...new Set(logs.map(l=>l.actor&&l.actor.name).filter(Boolean))];
  const fil=logs.filter(l=> filter==='all' || (l.actor&&l.actor.name)===filter);
  const shown=fil.slice(0,limit);

  const revert=async(l)=>{
    if(!window.confirm('ย้อนกลับการกระทำนี้?\nข้อมูลจะกลับไปเป็นก่อนหน้า')) return;
    setBusy(l.id);
    try{ await revertLog(l, {id:user.id,name:user.name}); toast('ย้อนกลับแล้ว'); await reload(); }
    catch(e){ console.error(e); toast('ย้อนกลับไม่สำเร็จ','err'); }
    setBusy(null);
  };

  return (
    <Sheet title="ประวัติการใช้งาน" onClose={onClose} z={70}>
      {actors.length>1 && (
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:12}}>
          {['all',...actors].map(a=>(
            <button key={a} onClick={()=>setFilter(a)} className="press kanit" style={{flexShrink:0,border:'1px solid '+(filter===a?'var(--primary)':'var(--line)'),background:filter===a?'var(--primary)':'#fff',color:filter===a?'#fff':'var(--ink)',borderRadius:99,padding:'6px 13px',fontSize:13,fontWeight:600}}>{a==='all'?'ทั้งหมด':a}</button>
          ))}
        </div>
      )}
      {load? <div style={{padding:'34px 0'}}><Loading/></div> :
        shown.length===0? <div style={{padding:'34px 0',textAlign:'center',color:'var(--muted)',fontSize:14}}>ยังไม่มีประวัติการใช้งาน</div> :
        <div>
          {shown.map(l=>{ const m=LOG_META[l.type]||{ic:'gear',c:'#64748B'}; const Ic=I[m.ic]||I.gear; const canRevert=l.ops&&l.ops.length>0&&!l.reverted;
            return (
              <div key={l.id} style={{display:'flex',gap:11,alignItems:'flex-start',padding:'11px 0',borderBottom:'1px solid var(--line)',opacity:l.reverted?0.5:1}}>
                <span style={{width:34,height:34,borderRadius:9,flexShrink:0,background:'var(--soft)',color:m.c,display:'grid',placeItems:'center',marginTop:1}}><Ic/></span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13.8,fontWeight:500,lineHeight:1.35}}>{l.label||l.type}{l.reverted&&<span style={{fontSize:11,color:'#DC2626',marginLeft:6,fontWeight:600}}>· ย้อนกลับแล้ว</span>}</div>
                  <div style={{fontSize:11.5,color:'var(--muted)',marginTop:2}}>{(l.actor&&l.actor.name)||'—'} · {fmtLogTime(l.ts)}</div>
                </div>
                {canRevert && <button onClick={()=>revert(l)} disabled={busy===l.id} className="press kanit" style={{flexShrink:0,border:'1px solid var(--line)',background:'#fff',color:'#DC2626',borderRadius:9,padding:'6px 11px',fontSize:12.5,fontWeight:600,marginTop:1}}>{busy===l.id?'...':'ย้อนกลับ'}</button>}
              </div>
            );
          })}
          {fil.length>limit && <button onClick={()=>setLimit(limit+40)} className="press kanit" style={{display:'block',margin:'16px auto 4px',border:'1px solid var(--line)',background:'#fff',color:'var(--primary)',borderRadius:10,padding:'9px 20px',fontSize:13.5,fontWeight:600}}>โหลดเพิ่ม ({fil.length-limit})</button>}
        </div>}
      <div style={{height:8}}/>
    </Sheet>
  );
}

const POSTER_BY_SHOP = {
  teddy1: { url:'poster-teddy.jpg', cx:0.761, cy:0.822, w:0.30, namePos:'bl' },
  teddy2: { url:'poster-teddy.jpg', cx:0.761, cy:0.822, w:0.30, namePos:'bl' },
  otteri: null,
  owlcha: { url:'poster-owl.jpg', cx:0.783, cy:0.389, w:0.332, namePos:'tl' }
};
function loadImgEl(src, cors){ return new Promise((res,rej)=>{ const i=new Image(); if(cors) i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=()=>rej(new Error('img')); i.src=src; }); }
function roundRectPath(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function QrModal({shop,referrer,baseUrl,onClose,toast}){
  const [imgErr,setImgErr]=useState(false);
  const [view,setView]=useState('qr');
  const [posterUrl,setPosterUrl]=useState('');
  const [busy,setBusy]=useState(false);
  const link = baseUrl ? (baseUrl + (baseUrl.includes('?')?'&':'?') + 'ref=' + referrer.id) : '';
  const qrSrc = link ? ('https://api.qrserver.com/v1/create-qr-code/?size=600x600&qzone=2&ecc=M&data=' + encodeURIComponent(link)) : '';
  const poster = POSTER_BY_SHOP[shop.id];

  const qrBlobUrl = async()=>{ const r=await fetch(qrSrc); const b=await r.blob(); return URL.createObjectURL(b); };
  const download=async()=>{
    if(!qrSrc) return;
    try{ const u=await qrBlobUrl();
      const a=document.createElement('a'); a.href=u; a.download=`QR_${shop.id}_${(referrer.name||'qr').replace(/\s/g,'')}.png`; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(u),3000);
    }catch(e){ window.open(qrSrc,'_blank'); }
  };
  const copyLink=()=>{ if(link) navigator.clipboard.writeText(link).then(()=>toast('คัดลอกลิงก์แล้ว')); };

  const genPoster=async()=>{
    if(!poster||busy) return;
    setBusy(true);
    try{
      let qrObj=''; try{ qrObj=await qrBlobUrl(); }catch(_){}
      const [bg, qr] = await Promise.all([
        loadImgEl(poster.url, false),
        qrObj? loadImgEl(qrObj,false) : loadImgEl(qrSrc,true)
      ]);
      const cw=bg.naturalWidth||bg.width, ch=bg.naturalHeight||bg.height;
      const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
      const ctx=cv.getContext('2d');
      ctx.drawImage(bg,0,0,cw,ch);
      const qs=cw*poster.w, qx=cw*poster.cx - qs/2, qy=ch*poster.cy - qs/2;
      const pad=qs*0.07;
      roundRectPath(ctx, qx-pad, qy-pad, qs+pad*2, qs+pad*2, qs*0.10); ctx.fillStyle='#fff'; ctx.fill();
      ctx.drawImage(qr, qx, qy, qs, qs);
      const np = poster.namePos || 'bl';
      const label='ผู้แนะนำ: '+(referrer.name||'');
      const fs=Math.round(ch*(np==='tl'?0.022:0.026));
      ctx.font='700 '+fs+'px Kanit, "Noto Sans Thai", sans-serif';
      ctx.textBaseline='middle';
      const tw=ctx.measureText(label).width;
      const tx=Math.round(cw*(np==='tl'?0.04:0.045));
      const ty=Math.round(np==='tl' ? (ch*0.042 + fs*0.6) : ch*0.955);
      const padX=fs*0.55, padY=fs*0.42;
      roundRectPath(ctx, tx-padX, ty-fs/2-padY, tw+padX*2, fs+padY*2, (fs+padY*2)/2);
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
      ctx.fillStyle='#2b2118'; ctx.fillText(label, tx, ty);
      if(qrObj) setTimeout(()=>URL.revokeObjectURL(qrObj),2000);
      const blob=await new Promise((res,rej)=>cv.toBlob(b=>b?res(b):rej(new Error('blob')),'image/jpeg',0.92));
      const url=URL.createObjectURL(blob);
      setPosterUrl(prev=>{ if(prev) URL.revokeObjectURL(prev); return url; });
      setView('poster');
    }catch(e){ console.error('poster',e); toast('สร้างภาพไม่สำเร็จ ลองใหม่อีกครั้ง'); }
    setBusy(false);
  };
  const downloadPoster=()=>{
    if(!posterUrl) return;
    const a=document.createElement('a'); a.href=posterUrl; a.download=`poster_${(shop.name||shop.id).replace(/\s/g,'')}_${(referrer.name||'').replace(/\s/g,'')}.jpg`; document.body.appendChild(a); a.click(); a.remove();
  };

  return (
    <Sheet title={`QR · ${referrer.name}`} onClose={onClose} z={80}>
      {!baseUrl ? (
        <div style={{padding:'14px 4px',textAlign:'center'}}>
          <div style={{fontSize:14,color:'#DC2626',fontWeight:600,marginBottom:8}}>ยังไม่ได้ตั้งลิงก์หน้าแอดไลน์</div>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>ปิดหน้านี้ แล้วแตะการ์ด "ค่าตอบแทน/ลิงก์" ด้านบน ใส่ลิงก์หน้าสแกนของร้าน {shop.name} ก่อน จึงจะสร้าง QR ได้</div>
        </div>
      ) : view==='poster' ? (<>
        <div style={{textAlign:'center'}}>
          <div className="kanit" style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>โปสเตอร์ · {referrer.name}</div>
          <div style={{borderRadius:14,overflow:'hidden',border:'1px solid var(--line)',display:'inline-block',maxWidth:'100%'}}>
            <img src={posterUrl} alt="poster" style={{width:'100%',maxWidth:300,display:'block'}}/>
          </div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={()=>setView('qr')} className="press kanit" style={{flex:1,padding:'13px',border:'1.5px solid var(--line)',background:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>← กลับไป QR</button>
          <button onClick={downloadPoster} className="press kanit" style={{flex:1,padding:'13px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>บันทึกโปสเตอร์</button>
        </div>
        <div style={{fontSize:11.5,color:'var(--muted)',textAlign:'center',marginTop:12}}>กดค้างที่รูปเพื่อเซฟก็ได้ · เอาแผ่นนี้ไปติด/ส่งให้ลูกค้าสแกน</div>
      </>) : (<>
        <div style={{textAlign:'center'}}>
          <div className="kanit" style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>ร้าน {shop.name} · {referrer.name}</div>
          <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:18,padding:16,display:'inline-block'}}>
            {imgErr ? <div style={{width:240,height:240,display:'grid',placeItems:'center',color:'#DC2626',fontSize:13,textAlign:'center',padding:'0 20px'}}>โหลด QR ไม่ได้<br/>เช็คเน็ตแล้วลองใหม่</div>
              : <img src={qrSrc} alt="QR" onError={()=>setImgErr(true)} style={{width:240,height:240,display:'block'}}/>}
          </div>
          <div style={{fontSize:10.5,color:'var(--muted)',wordBreak:'break-all',margin:'12px 8px 0'}}>{link}</div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:16}}>
          <button onClick={copyLink} className="press kanit" style={{flex:1,padding:'13px',border:'1.5px solid var(--line)',background:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>คัดลอกลิงก์</button>
          <button onClick={download} className="press kanit" style={{flex:1,padding:'13px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:12,fontWeight:600,fontSize:14}}>บันทึก QR</button>
        </div>
        {poster && <button onClick={genPoster} disabled={busy} className="press kanit" style={{width:'100%',marginTop:10,padding:'13px',border:'none',background:busy?'#9ca3af':'#0F172A',color:'#fff',borderRadius:12,fontWeight:700,fontSize:14}}>{busy?'กำลังสร้างภาพ…':'🖼️ สร้างภาพโปสเตอร์'}</button>}
        <div style={{fontSize:11.5,color:'var(--muted)',textAlign:'center',marginTop:12}}>{poster?'กดสร้างภาพโปสเตอร์ เพื่อได้แผ่นพร้อม QR + ชื่อพนักงาน':'กดค้างที่รูปเพื่อบันทึกก็ได้ · เอา QR นี้ไปแปะ/แชร์ให้ลูกค้าสแกน'}</div>
      </>)}
    </Sheet>
  );
}

function Referral({shop,user,toast}){
  const isAdmin=user.role==='admin';
  const [load,setLoad]=useState(true);
  const [refs,setRefs]=useState([]);
  const [rals,setRals]=useState([]);
  const [pays,setPays]=useState([]);
  const [rate,setRate]=useState(3);
  const [url,setUrl]=useState('');
  const [editCfg,setEditCfg]=useState(false);
  const [cfgRate,setCfgRate]=useState('3');
  const [cfgUrl,setCfgUrl]=useState('');
  const [qrFor,setQrFor]=useState(null);
  const [adding,setAdding]=useState(false);
  const [newName,setNewName]=useState('');
  const [busy,setBusy]=useState(false);
  const [menuFor,setMenuFor]=useState(null);
  const [payFor,setPayFor]=useState(null);
  const [detailFor,setDetailFor]=useState(null);

  const reload=async()=>{ setLoad(true);
    try{ const [rs,ra,st,py]=await Promise.all([listReferrers(), referralsForShop(shop.id), getSettings(shop.id), payoutsForShop(shop.id)]);
      setRefs(rs); setRals(ra); setRate(Number(st.refRate)||3); setUrl(st.refUrl||''); setPays(py);
    }catch(e){ console.error(e); } setLoad(false);
  };
  useEffect(()=>{ reload(); },[shop.id]);

  const td=today();
  const paidMap={}; pays.forEach(p=>{ paidMap[p.refId]={count:p.paidCount||0, amount:p.paidAmount||0}; });
  const statOf=(id)=>{ const a=rals.filter(r=>r.refId===id); const total=a.length; const paidc=(paidMap[id]&&paidMap[id].count)||0; const owedCount=Math.max(0,total-paidc); return {today:a.filter(r=>r.date===td).length, total, owedCount, earned:Math.round(total*rate), owed:Math.round(owedCount*rate)}; };
  const totAll=rals.length, totToday=rals.filter(r=>r.date===td).length;
  const totalPaid=pays.reduce((s,p)=>s+(p.paidAmount||0),0);
  const totalOwed=refs.reduce((s,r)=>s+statOf(r.id).owed,0);

  const openCfg=()=>{ setCfgRate(String(rate)); setCfgUrl(url); setEditCfg(true); };
  const saveCfg=async()=>{ try{ await saveSettings(shop.id,{refRate:Number(cfgRate)||0, refUrl:cfgUrl.trim()},{id:user.id,name:user.name}); setEditCfg(false); await reload(); toast('บันทึกแล้ว'); }catch(e){ toast('บันทึกไม่สำเร็จ','err'); } };
  const addNew=async()=>{ if(!newName.trim())return; setBusy(true); try{ await addReferrer(newName.trim()); setNewName(''); setAdding(false); await reload(); toast('เพิ่มคนแล้ว'); }catch(e){ toast('เพิ่มไม่สำเร็จ','err'); } setBusy(false); };
  const rename=async(r)=>{ setMenuFor(null); const n=window.prompt('แก้ชื่อ', r.name); if(n&&n.trim()&&n.trim()!==r.name){ await updateReferrer(r.id,{name:n.trim()}); await reload(); } };
  const copyMeLink=(r)=>{ setMenuFor(null); const base=new URL('me.html', location.href).href; const link=`${base}?shop=${shop.id}&ref=${r.id}`; navigator.clipboard.writeText(link).then(()=>toast('คัดลอกลิงก์เช็คยอดแล้ว · ส่งให้ '+r.name)).catch(()=>window.prompt('ลิงก์เช็คยอดของ '+r.name, link)); };
  const remove=async(r)=>{ setMenuFor(null); if(window.confirm(`ลบ ${r.name}? (ยอดที่นับไว้ยังอยู่)`)){ await removeReferrer(r.id); await reload(); } };

  const doPay=async(method)=>{
    if(!payFor||busy) return; setBusy(true);
    try{
      const st=statOf(payFor.id);
      if(st.owedCount<=0){ toast('ไม่มียอดค้างจ่าย'); setPayFor(null); setBusy(false); return; }
      await payReferrer({shopId:shop.id, refId:payFor.id, refName:payFor.name, owedCount:st.owedCount, owed:st.owed, rate, newPaidCount:st.total, method, by:{id:user.id,name:user.name}});
      const paid=st.owed; setPayFor(null); await reload(); toast(`จ่าย ${baht(paid)} แล้ว · ลงรายจ่ายให้อัตโนมัติ`);
    }catch(e){ console.error(e); toast('จ่ายไม่สำเร็จ','err'); } setBusy(false);
  };

  if(detailFor) return <ReferrerDetail shop={shop} user={user} referrer={detailFor} rals={rals.filter(r=>r.refId===detailFor.id)} onBack={()=>setDetailFor(null)} onChanged={reload}/>;

  return (
    <div style={{padding:'14px 16px 20px'}} onClick={()=>menuFor&&setMenuFor(null)}>
      {load? <div style={{padding:'40px 0'}}><Loading/></div> : (<>
        {!editCfg ? (
          <button onClick={openCfg} className="press" style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'12px 14px',border:'1px solid var(--line)',borderRadius:13,background:'var(--soft)',marginBottom:14,textAlign:'left'}}>
            <span style={{width:34,height:34,borderRadius:9,background:'#fff',color:'var(--primary)',display:'grid',placeItems:'center',flexShrink:0}}><I.gear/></span>
            <div style={{flex:1,minWidth:0}}>
              <div className="kanit" style={{fontWeight:600,fontSize:14}}>ค่าตอบแทน {baht(rate)} / คน{!url&&<span style={{color:'#DC2626'}}> · ยังไม่ตั้งลิงก์</span>}</div>
              <div style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{url||'แตะเพื่อตั้งลิงก์หน้าแอดไลน์'}</div>
            </div>
            <I.chevron style={{color:'#C0C4CC'}}/>
          </button>
        ) : (
          <div style={{border:'1px solid var(--line)',borderRadius:13,padding:14,marginBottom:14,background:'#fff'}}>
            <div style={lbl}>ค่าตอบแทนต่อ 1 คนที่แอด (บาท)</div>
            <input value={cfgRate} onChange={e=>setCfgRate(e.target.value.replace(/[^0-9.]/g,''))} inputMode="decimal" style={{width:'100%',padding:'11px 13px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:15,marginBottom:12,outline:'none'}}/>
            <div style={lbl}>ลิงก์หน้าแอดไลน์ของร้าน {shop.name}</div>
            <input value={cfgUrl} onChange={e=>setCfgUrl(e.target.value)} placeholder="https://.../add.html?shop=..." style={{width:'100%',padding:'11px 13px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:13,marginBottom:6,outline:'none'}}/>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>ใส่ลิงก์ที่ได้จากหน้าสแกน (add.html) ของร้านนี้</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setEditCfg(false)} className="press kanit" style={{flex:1,padding:'11px',border:'1.5px solid var(--line)',background:'#fff',borderRadius:11,fontWeight:600,fontSize:14}}>ยกเลิก</button>
              <button onClick={saveCfg} className="press kanit" style={{flex:1,padding:'11px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:11,fontWeight:600,fontSize:14}}>บันทึก</button>
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:10,marginBottom:8}}>
          <div style={{flex:1,background:'var(--soft)',borderRadius:13,padding:'12px 4px',textAlign:'center'}}><div className="num" style={{fontSize:18,fontWeight:700,color:'#DC2626'}}>{baht(totalPaid)}</div><div style={{fontSize:11,color:'var(--muted)'}}>จ่ายไปแล้ว</div></div>
          <div style={{flex:1,background:'var(--soft)',borderRadius:13,padding:'12px 4px',textAlign:'center'}}><div className="num" style={{fontSize:21,fontWeight:700,color:'var(--primary)'}}>{totAll}</div><div style={{fontSize:11,color:'var(--muted)'}}>แอดทั้งหมด</div></div>
          <div style={{flex:1,background:'var(--soft)',borderRadius:13,padding:'12px 4px',textAlign:'center'}}><div className="num" style={{fontSize:18,fontWeight:700,color:'#16A34A'}}>{baht(totalOwed)}</div><div style={{fontSize:11,color:'var(--muted)'}}>ค้างจ่าย</div></div>
        </div>
        <div style={{fontSize:11.5,color:'var(--muted)',textAlign:'center',marginBottom:16}}>วันนี้มีคนแอดใหม่ {totToday} คน</div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div className="kanit" style={{fontWeight:600,fontSize:14.5}}>คนแชร์ ({refs.length})</div>
          <button onClick={()=>{ setAdding(true); setNewName(''); }} className="press kanit" style={{border:'none',background:'var(--soft)',color:'var(--primary)',borderRadius:9,padding:'7px 13px',fontSize:13,fontWeight:600}}>+ เพิ่มคน</button>
        </div>

        {adding && (
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="ชื่อคนแชร์" autoFocus style={{flex:1,padding:'11px 13px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,outline:'none'}}/>
            <button onClick={addNew} disabled={busy||!newName.trim()} className="press kanit" style={{padding:'0 16px',border:'none',background:'var(--primary)',color:'#fff',borderRadius:11,fontWeight:600,fontSize:14,opacity:newName.trim()?1:0.5}}>เพิ่ม</button>
          </div>
        )}

        {refs.length===0 && !adding && <div style={{padding:'24px 0',textAlign:'center',color:'var(--muted)',fontSize:14}}>ยังไม่มีคนแชร์ — กด "เพิ่มคน"</div>}

        <div>
          {refs.map(r=>{ const c=statOf(r.id); const pm=paidMap[r.id]; return (
            <div key={r.id} style={{padding:'11px 0',borderBottom:'1px solid var(--line)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <button onClick={()=>setDetailFor(r)} className="press" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:11,border:'none',background:'none',textAlign:'left',padding:0}}>

function ReferrerDetail({shop,user,referrer,rals,onBack,onChanged}){
  const [page,setPage]=useState(0);
  const [busy,setBusy]=useState(false);
  const isAdmin = user && user.role==='admin';
  const sorted=[...rals].sort((a,b)=>{ const da=ralDate(a), db2=ralDate(b); return (db2?db2.getTime():0)-(da?da.getTime():0); });
  const per=20; const pages=Math.max(1,Math.ceil(sorted.length/per));
  const pg=Math.min(page,pages-1);
  const slice=sorted.slice(pg*per,(pg+1)*per);
  const fmt=(d)=>{ if(!d) return {d:'—',t:''}; const p=n=>String(n).padStart(2,'0'); return {d:`${p(d.getDate())}/${p(d.getMonth()+1)}/${String(d.getFullYear()+543).slice(2)}`, t:`${p(d.getHours())}:${p(d.getMinutes())}`}; };
  const del=async(r)=>{
    if(busy||!r.id) return;
    if(!window.confirm(`ลบรายการนี้? (${r.custName||'ลูกค้า LINE'})\nยอดของ ${referrer.name} จะลดลง 1`)) return;
    setBusy(true);
    try{ await removeReferral(r.id); if(onChanged) await onChanged(); }
    catch(e){ console.error(e); } setBusy(false);
  };
  return (
    <div style={{padding:'14px 16px 20px'}}>
      <button onClick={onBack} className="press kanit" style={{border:'none',background:'none',color:'var(--primary)',display:'flex',alignItems:'center',gap:4,fontSize:14,fontWeight:600,padding:'4px 0',marginBottom:10}}><I.back/> กลับ</button>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <span style={{width:46,height:46,borderRadius:99,flexShrink:0,background:catColor(referrer.name),color:'#fff',display:'grid',placeItems:'center',fontWeight:700,fontSize:18}}>{(referrer.name||'?').trim()[0]}</span>
        <div>
          <div className="kanit" style={{fontSize:17,fontWeight:700}}>{referrer.name}</div>
          <div style={{fontSize:12.5,color:'var(--muted)'}}>พามาแอดทั้งหมด {sorted.length} คน</div>
        </div>
      </div>

      {sorted.length===0 ? <div style={{padding:'30px 0',textAlign:'center',color:'var(--muted)',fontSize:14}}>ยังไม่มีลูกค้าแอดผ่านคนนี้</div> : (<>
        <div style={{border:'1px solid var(--line)',borderRadius:13,overflow:'hidden'}}>
          {slice.map((r,i)=>{ const f=fmt(ralDate(r)); return (
            <div key={r.id||i} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 13px',borderBottom:i<slice.length-1?'1px solid var(--line)':'none'}}>
              <span style={{width:28,textAlign:'center',fontSize:12,color:'#C0C4CC',fontWeight:600,flexShrink:0}}>{pg*per+i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div className="kanit" style={{fontSize:14,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.custName||'ลูกค้า LINE'}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{f.d}{f.t?' · '+f.t+' น.':''}</div>
              </div>
              {isAdmin && <button onClick={()=>del(r)} disabled={busy} className="press" style={{flexShrink:0,border:'none',background:'none',color:'#D1A0A0',padding:'6px 4px'}} title="ลบรายการนี้"><I.trash/></button>}
            </div>
          ); })}
        </div>
        {pages>1 && (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginTop:14}}>
            <button onClick={()=>setPage(Math.max(0,pg-1))} disabled={pg<=0} className="press" style={{border:'1px solid var(--line)',background:'#fff',borderRadius:9,padding:'7px 16px',fontSize:16,opacity:pg<=0?0.4:1}}>‹</button>
            <div className="kanit" style={{fontSize:13.5,color:'var(--muted)'}}>หน้า {pg+1} / {pages}</div>
            <button onClick={()=>setPage(Math.min(pages-1,pg+1))} disabled={pg>=pages-1} className="press" style={{border:'1px solid var(--line)',background:'#fff',borderRadius:9,padding:'7px 16px',fontSize:16,opacity:pg>=pages-1?0.4:1}}>›</button>
          </div>
        )}
        {isAdmin && <div style={{fontSize:11,color:'var(--muted)',marginTop:12,textAlign:'center'}}>แตะ 🗑 เพื่อลบรายการที่นับผิด (เช่น ลูกค้าเดิมที่เป็นเพื่อนร้านอยู่แล้ว)</div>}
      </>)}
    </div>
  );
}

function UserSheet({editUser, currentUserId, actor, onClose, onSaved, onDeleted, toast}){
  const isEdit=!!editUser;
  const isSelf=isEdit && editUser.id===currentUserId;
  const [name,setName]=useState(editUser?.name||'');
  const [role,setRole]=useState(editUser?.role||'staff');
  const [pin,setPin]=useState(editUser?.pin||'');
  const [shopIds,setShopIds]=useState(editUser && editUser.shopIds!=='all' ? (editUser.shopIds||[]) : []);
  const [busy,setBusy]=useState(false);
  const [perms,setPerms]=useState((isEdit&&editUser.perms)||{record:true,stamp:true});
  const togglePerm=(k)=> setPerms(p=>({...p,[k]:!p[k]}));
  const toggleShop=(id)=> setShopIds(p=> p.includes(id)? p.filter(x=>x!==id):[...p,id]);

  const save=async()=>{
    if(!name.trim()||pin.length!==6){ toast('กรอกชื่อ และ PIN 6 หลัก','err'); return; }
    if(role!=='admin' && shopIds.length===0){ toast('เลือกร้านอย่างน้อย 1 ร้าน','err'); return; }
    setBusy(true);
    try{
      if(role==='front' && !FRONT_PERMS.some(([k])=>perms[k])){ toast('เลือกฟังก์ชันให้พนักงานอย่างน้อย 1 อย่าง','err'); setBusy(false); return; }
      const data={name:name.trim(),role,pin,shopIds: role==='admin'?'all':shopIds, perms: role==='front'?perms:{}};
      if(isEdit){
        await updateUser(editUser.id,data,actor);
      } else { await addUser(data,actor); }
      toast(isEdit?'บันทึกการแก้ไขแล้ว':'เพิ่มผู้ใช้แล้ว'); onSaved();
    }catch(e){ toast(e.message||'บันทึกไม่สำเร็จ','err'); setBusy(false); }
  };
  const del=async()=>{
    if(!window.confirm(`ลบผู้ใช้ "${editUser.name}" ออกจากระบบ?`)) return;
    setBusy(true);
    try{ await deleteUser(editUser.id,actor); toast('ลบผู้ใช้แล้ว'); onDeleted(); }
    catch(e){ toast('ลบไม่สำเร็จ','err'); setBusy(false); }
  };

  return (
    <Sheet title={isEdit?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้งาน'} onClose={onClose} z={60}>
      <label style={lbl}>ชื่อ</label>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="ชื่อผู้ใช้"
        style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:15,marginBottom:14}}/>

      <label style={lbl}>บทบาท{isSelf && <span style={{color:'var(--muted)'}}> (บัญชีคุณเอง)</span>}</label>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14,opacity:isSelf?.55:1,pointerEvents:isSelf?'none':'auto'}}>
        {Object.entries(ROLES).map(([k,v])=>(
          <button key={k} onClick={()=>setRole(k)} className="press kanit" style={{flex:'1 1 45%',padding:'10px 4px',borderRadius:11,fontSize:13,fontWeight:500,border:`1.5px solid ${role===k?v.color:'var(--line)'}`,background:role===k?v.color:'#fff',color:role===k?'#fff':'var(--ink)'}}>{v.label}</button>
        ))}
      </div>

      <label style={lbl}>PIN 6 หลัก {isEdit && <span style={{color:'var(--muted)'}}>(แก้เพื่อรีเซ็ต)</span>}</label>
      <input value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,'').slice(0,6))} inputMode="numeric" placeholder="● ● ● ● ● ●" className="num"
        style={{width:'100%',padding:'12px 14px',border:'1.5px solid var(--line)',borderRadius:12,outline:'none',fontSize:20,fontWeight:600,letterSpacing:4,marginBottom:14}}/>

      {role!=='admin' && (<>
        <label style={lbl}>เข้าถึงร้าน (เลือกได้หลายร้าน)</label>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {SHOPS.map(s=>{ const on=shopIds.includes(s.id); return (
            <button key={s.id} onClick={()=>toggleShop(s.id)} className="press" style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',borderRadius:12,border:`1.5px solid ${on?s.theme.primary:'var(--line)'}`,background:on?s.theme.tint:'#fff',textAlign:'left'}}>
              <span style={{width:30,height:30,borderRadius:8,overflow:'hidden',background:s.theme.tint,display:'grid',placeItems:'center',fontSize:18}}>{s.logo? <img src={s.logo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : s.emoji}</span>
              <span style={{flex:1,fontSize:14.5,fontWeight:500,color:on?s.theme.primary:'var(--ink)'}}>{s.name}</span>
              {on && <span style={{color:s.theme.primary}}><I.check/></span>}
            </button>
          );})}
        </div>
      </>)}

      {role==='front' && (<>
        <label style={lbl}>ฟังก์ชันที่ใช้ได้ (ตั้งรายคน)</label>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {FRONT_PERMS.map(([k,label])=>{ const on=!!perms[k]; return (
            <button key={k} onClick={()=>togglePerm(k)} className="press" style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',borderRadius:12,border:`1.5px solid ${on?'#7C3AED':'var(--line)'}`,background:on?'#F3EDFF':'#fff',textAlign:'left'}}>
              <div style={{width:21,height:21,borderRadius:6,flexShrink:0,border:`1.5px solid ${on?'#7C3AED':'var(--line)'}`,background:on?'#7C3AED':'#fff',color:'#fff',fontSize:13,textAlign:'center',lineHeight:'20px'}}>{on?'✓':''}</div>
              <div style={{fontSize:14}}>{label}</div>
            </button>
          );})}
          <div style={{fontSize:11.5,color:'var(--muted)'}}>แท็บตั้งค่าเปิดให้เสมอ (มีแค่ออกจากระบบ ส่วนจัดการผู้ใช้เห็นเฉพาะแอดมิน)</div>
        </div>
      </>)}

      <button onClick={save} disabled={busy} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:busy?.6:1}}>{busy?'กำลังบันทึก...':(isEdit?'บันทึกการแก้ไข':'บันทึกผู้ใช้')}</button>

      {isEdit && !isSelf && (
        <button onClick={del} disabled={busy} className="press kanit" style={{width:'100%',padding:'13px',marginTop:10,border:'1.5px solid #FCA5A5',borderRadius:14,background:'#fff',color:'#DC2626',fontSize:15,fontWeight:600,display:'flex',justifyContent:'center',alignItems:'center',gap:8}}>
          <I.trash/> ลบผู้ใช้นี้</button>
      )}
      {isSelf && <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:10}}>ลบบัญชีตัวเองไม่ได้</div>}
    </Sheet>
  );
}

/* ---------- Excel Import (map คอลัมน์เอง · lazy-load SheetJS) ---------- */
function loadXLSX(){
  return new Promise((res,rej)=>{
    if(window.XLSX) return res(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX); s.onerror=()=>rej(new Error('โหลดไลบรารีไม่สำเร็จ'));
    document.head.appendChild(s);
  });
}
function xDate(v){
  if(v==null||v==='') return null;
  if(v instanceof Date && !isNaN(v.getTime())) return `${v.getFullYear()}-${pad(v.getMonth()+1)}-${pad(v.getDate())}`;
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){ let d=+m[1],mo=+m[2],y=+m[3]; if(y<100)y+=2000; if(y>2400)y-=543; if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${y}-${pad(mo)}-${pad(d)}`; }
  m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(m){ let y=+m[1],mo=+m[2],d=+m[3]; if(y>2400)y-=543; if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${y}-${pad(mo)}-${pad(d)}`; }
  const d2=new Date(s); if(!isNaN(d2.getTime())) return `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}`;
  return null;
}
function xAmt(v){ if(v==null) return null; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?null:n; }

function Import({shop,user,toast,onClose,onDone}){
  const [step,setStep]=useState('upload');
  const [fileName,setFileName]=useState('');
  const [headers,setHeaders]=useState([]);
  const [rows,setRows]=useState([]);
  const [allRows,setAllRows]=useState([]);
  const [hRow,setHRow]=useState(1);
  const [map,setMap]=useState({date:-1,amount:-1,cat:-1});
  const [kind,setKind]=useState('income');
  const [method,setMethod]=useState('cash');
  const [defCat,setDefCat]=useState('รายได้เครื่อง');
  const [importing,setImporting]=useState(false);
  const [prog,setProg]=useState(0);
  const fileRef=useRef();

  const guessMap=(hs)=>{
    const find=(keys)=>hs.findIndex(h=>{ const t=String(h||'').toLowerCase(); return keys.some(k=>t.includes(k)); });
    return { date:find(['วันที่','date','วัน']), amount:find(['จำนวน','ยอด','เงิน','amount','บาท','รายได้','total','net','income']), cat:find(['เครื่อง','หมวด','machine','รายการ','ประเภท','item','no']) };
  };
  const applyHeader=(raw,hr)=>{
    const hs=(raw[hr-1]||[]).map((c,i)=> String(c||'').trim()||`คอลัมน์ ${i+1}`);
    setHeaders(hs); setHRow(hr); setRows(raw.slice(hr)); setMap(guessMap(hs));
  };
  const onFile=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setFileName(f.name); setStep('loading');
    try{
      const XLSX=await loadXLSX();
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      if(!raw.length){ toast('ไฟล์ว่าง','err'); setStep('upload'); return; }
      setAllRows(raw); applyHeader(raw,1); setStep('map');
    }catch(err){ console.error(err); toast(err.message||'อ่านไฟล์ไม่สำเร็จ','err'); setStep('upload'); }
  };

  const parsed=(()=>{
    if(map.date<0||map.amount<0) return {valid:[],bad:0};
    const valid=[]; let bad=0;
    rows.forEach(r=>{
      const d=xDate(r[map.date]); const a=xAmt(r[map.amount]);
      if(d && a!=null && Math.round(Math.abs(a))>0) valid.push({date:d,amount:Math.round(Math.abs(a)),category: map.cat>=0?(String(r[map.cat]||'').trim()||defCat):defCat});
      else if(r.some(c=>String(c||'').trim()!=='')) bad++;
    });
    return {valid,bad};
  })();

  const doImport=async()=>{
    if(!parsed.valid.length){ toast('ไม่มีแถวที่นำเข้าได้','err'); return; }
    setImporting(true); setProg(0);
    try{
      const v=parsed.valid, chunk=400; const ids=[];
      for(let i=0;i<v.length;i+=chunk){
        const batch=db.batch();
        v.slice(i,i+chunk).forEach(r=>{ const ref=db.collection('transactions').doc(); const ym=ymOf(r.date); ids.push(ref.id);
          batch.set(ref,{shopId:shop.id,kind,category:r.category,amount:r.amount,method,note:'นำเข้า Excel',date:r.date,ym,skey:`${shop.id}_${ym}`,by:{id:user.id,name:user.name},source:'import',ts:FieldValue.serverTimestamp()}); });
        await batch.commit(); setProg(Math.min(v.length,i+chunk));
      }
      await writeLog(shop.id, {id:user.id,name:user.name}, 'import', `นำเข้า Excel ${v.length} รายการ`, ids.map(id=>({id, before:null, after:null})));
      toast(`นำเข้า ${v.length} รายการแล้ว`); onDone();
    }catch(e){ console.error(e); toast('นำเข้าไม่สำเร็จ: '+(e.message||''),'err'); setImporting(false); }
  };

  const sel={width:'100%',padding:'11px 12px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,background:'#fff',marginBottom:12,color:'var(--ink)'};
  const opts=[<option key="-1" value={-1}>— ไม่ใช้ —</option>,...headers.map((h,i)=><option key={i} value={i}>{h}</option>)];

  return (
    <Sheet title="นำเข้ารายรับจาก Excel" onClose={onClose} z={70}>
      {step==='upload' && (
        <div style={{textAlign:'center',padding:'10px 0 20px'}}>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:18,lineHeight:1.6}}>เลือกไฟล์ .xlsx / .csv แล้วจับคู่คอลัมน์เอง · รองรับทุกรูปแบบ</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{display:'none'}}/>
          <button onClick={()=>fileRef.current.click()} className="press kanit" style={{padding:'14px 24px',border:'2px dashed var(--accent)',borderRadius:14,background:'var(--tint)',color:'var(--primary)',fontWeight:600,fontSize:15,display:'inline-flex',alignItems:'center',gap:8}}><I.table/> เลือกไฟล์ Excel</button>
        </div>
      )}
      {step==='loading' && <div style={{padding:'30px 0'}}><Loading label="กำลังอ่านไฟล์..."/></div>}
      {step==='map' && (<>
        <div style={{fontSize:12.5,color:'var(--muted)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}><I.table/> {fileName}</div>

        <label style={lbl}>แถวที่เป็นหัวตาราง</label>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={()=>applyHeader(allRows,Math.max(1,hRow-1))} className="press" style={{width:38,height:38,borderRadius:10,border:'1px solid var(--line)',background:'#fff',fontSize:18}}>−</button>
          <div className="num" style={{minWidth:30,textAlign:'center',fontWeight:700,fontSize:16}}>{hRow}</div>
          <button onClick={()=>applyHeader(allRows,Math.min(allRows.length,hRow+1))} className="press" style={{width:38,height:38,borderRadius:10,border:'1px solid var(--line)',background:'#fff',fontSize:18}}>+</button>
          <span style={{fontSize:11.5,color:'var(--muted)'}}>ถ้าหัวตารางไม่ใช่แถวแรก ปรับตรงนี้</span>
        </div>

        <label style={lbl}>คอลัมน์ “วันที่” *</label>
        <select value={map.date} onChange={e=>setMap({...map,date:+e.target.value})} style={sel}>{opts}</select>
        <label style={lbl}>คอลัมน์ “จำนวนเงิน” *</label>
        <select value={map.amount} onChange={e=>setMap({...map,amount:+e.target.value})} style={sel}>{opts}</select>
        <label style={lbl}>คอลัมน์ “หมวด/เครื่อง” (ถ้ามี)</label>
        <select value={map.cat} onChange={e=>setMap({...map,cat:+e.target.value})} style={sel}>{opts}</select>
        {map.cat<0 && (<><label style={lbl}>หมวดเริ่มต้น (เมื่อไม่เลือกคอลัมน์)</label>
          <input value={defCat} onChange={e=>setDefCat(e.target.value)} style={{width:'100%',padding:'11px 12px',border:'1.5px solid var(--line)',borderRadius:11,fontSize:14,marginBottom:12}}/></>)}

        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <div style={{flex:1}}>
            <label style={lbl}>ประเภท</label>
            <div style={{display:'flex',gap:6}}>
              {[['income','รายรับ','#16A34A'],['expense','รายจ่าย','#DC2626']].map(([k,l,c])=>(
                <button key={k} onClick={()=>setKind(k)} className="press kanit" style={{flex:1,padding:'9px 2px',borderRadius:10,fontSize:13,fontWeight:600,border:`1.5px solid ${kind===k?c:'var(--line)'}`,background:kind===k?c:'#fff',color:kind===k?'#fff':'var(--ink)'}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1}}>
            <label style={lbl}>ช่องทาง</label>
            <div style={{display:'flex',gap:6}}>
              {[['cash','เงินสด'],['bank','โอน']].map(([k,l])=>(
                <button key={k} onClick={()=>setMethod(k)} className="press kanit" style={{flex:1,padding:'9px 2px',borderRadius:10,fontSize:13,fontWeight:600,border:`1.5px solid ${method===k?'var(--primary)':'var(--line)'}`,background:method===k?'var(--primary)':'#fff',color:method===k?'#fff':'var(--ink)'}}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{background:'var(--soft)',borderRadius:12,padding:'10px 12px',marginBottom:14,fontSize:12.5}}>
          {(map.date<0||map.amount<0) ? <span style={{color:'var(--neg)'}}>เลือกคอลัมน์วันที่และจำนวนเงินก่อน</span> :
            <>พร้อมนำเข้า <b style={{color:'var(--pos)'}}>{parsed.valid.length}</b> แถว{parsed.bad>0 && <span style={{color:'var(--muted)'}}> · ข้าม {parsed.bad} แถว (วันที่/เงินไม่ถูกต้อง)</span>}</>}
        </div>
        {parsed.valid.length>0 && (
          <div style={{border:'1px solid var(--line)',borderRadius:12,overflow:'hidden',marginBottom:14}}>
            <div style={{display:'flex',fontSize:11,fontWeight:700,color:'var(--muted)',background:'var(--bg)',padding:'7px 10px'}}><span style={{flex:1}}>วันที่</span><span style={{flex:1}}>หมวด</span><span style={{width:70,textAlign:'right'}}>เงิน</span></div>
            {parsed.valid.slice(0,5).map((r,i)=>(
              <div key={i} style={{display:'flex',fontSize:12.5,padding:'7px 10px',borderTop:'1px solid var(--line)'}}><span style={{flex:1}}>{r.date}</span><span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.category}</span><span className="num" style={{width:70,textAlign:'right',fontWeight:600}}>{baht(r.amount)}</span></div>
            ))}
            {parsed.valid.length>5 && <div style={{fontSize:11,color:'var(--muted)',padding:'6px 10px',borderTop:'1px solid var(--line)'}}>…และอีก {parsed.valid.length-5} แถว</div>}
          </div>
        )}

        <button onClick={doImport} disabled={importing||!parsed.valid.length} className="press kanit" style={{width:'100%',padding:'15px',border:'none',borderRadius:14,background:'var(--primary)',color:'#fff',fontSize:16,fontWeight:600,opacity:(importing||!parsed.valid.length)?.5:1}}>
          {importing? `กำลังนำเข้า ${prog}/${parsed.valid.length}...` : `นำเข้า ${parsed.valid.length} รายการ`}</button>
        <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:8}}>⚠️ นำเข้าไฟล์เดิมซ้ำจะได้ข้อมูลซ้ำ</div>
      </>)}
    </Sheet>
  );
}

/* ---------- PHASE 2 · ทุน / หุ้นส่วน ---------- */
async function capitalEntries(shopId){
  const s=await db.collection('transactions').where('skey','==',`${shopId}_CAP`).get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function txnsBySource(src){
  const s=await db.collection('transactions').where('source','==',src).get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function addCapital({shopId,shareholder,type,amount,note,by,actor}){
  const ref=await db.collection('transactions').add({
    shopId, kind:type, category:shareholder, amount:Number(amount), method:'-', note:note||'',
    date:today(), ym:ymOf(today()), skey:`${shopId}_CAP`, by:by||'', source:'capital', ts:FieldValue.serverTimestamp()
  });
  await writeLog(shopId, actor||(by?{id:'',name:by}:null), type==='dividend'?'capital.dividend':'capital.add',
    `${type==='withdraw'?'ถอนทุน':type==='dividend'?'ปันผล':'เพิ่มทุน'} ${shareholder} ${baht(Number(amount))}`,
    [{id:ref.id, before:null, after:{shareholder,type,amount:Number(amount),note:note||'',date:today()}}]);
  return ref.id;
}

function ShopSummary({shop}){
  const [load,setLoad]=useState(true);
  const [d,setD]=useState(null);
  useEffect(()=>{ let live=true; (async()=>{
    setLoad(true);
    try{
      const [man,imp,cap]=await Promise.all([txnsBySource('manual'),txnsBySource('import'),capitalEntries(shop.id),loadCatMeta(shop.id)]);
      if(!live) return;
      const io=[...man,...imp].filter(t=>t.shopId===shop.id);
      setD({io,cap});
    }catch(e){ console.error(e); if(live) setD({io:[],cap:[]}); }
    if(live) setLoad(false);
  })(); return ()=>{ live=false; }; },[shop.id]);

  const wrap={borderRadius:20,padding:'18px 18px 16px',marginBottom:16,background:'linear-gradient(160deg,#15324f 0%,#0d2238 100%)',color:'#fff',boxShadow:'0 8px 24px rgba(13,34,56,.28)'};
  if(load) return <div style={wrap}><div style={{textAlign:'center',padding:'18px 0',opacity:.85,fontSize:13}}>กำลังรวมยอด…</div></div>;
  const {io,cap}=d;
  const S=(arr,k)=>arr.reduce((s,t)=>s+(t.kind===k?(Number(t.amount)||0):0),0);
  const income=S(io,'income'), expense=S(io,'expense'), profit=income-expense;
  const invest=S(cap,'invest')-S(cap,'withdraw');
  const divid=S(cap,'dividend');
  const isCash=t=>t.method==='cash';
  const M=(arr,k,fn)=>arr.reduce((s,t)=>s+((t.kind===k&&fn(t))?(Number(t.amount)||0):0),0);
  const cashNet=M(io,'income',isCash)-M(io,'expense',isCash);
  const bankNet=M(io,'income',t=>!isCash(t))-M(io,'expense',t=>!isCash(t));
  const balance=invest+income-expense-divid;
  const investFloat=balance-cashNet-bankNet;
  const byCat=(k)=>{ const m={}; io.forEach(t=>{ if(t.kind!==k) return; const c=t.category||'อื่นๆ'; m[c]=(m[c]||0)+(Number(t.amount)||0); }); return Object.entries(m).map(([name,amt])=>({name,amt})).sort((a,b)=>b.amt-a.amt); };
  const incCats=byCat('income'), expCats=byCat('expense');

  const catCard=(title,items,tot,color)=>(
    <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:16,padding:16,marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <span className="kanit" style={{fontWeight:600,fontSize:15}}>{title}</span>
        <span className="num" style={{fontWeight:700,fontSize:14,color}}>{baht(tot)}</span>
      </div>
      {items.length===0 ? <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'6px 0'}}>ยังไม่มีข้อมูล</div> :
        items.map(it=>{ const pct=tot>0?(it.amt/tot*100):0; return (
          <div key={it.name} style={{display:'flex',alignItems:'center',gap:11,marginBottom:12}}>
            <CatBadge shopId={shop.id} name={it.name} size={34}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{it.name}</span>
                <span style={{flexShrink:0,marginLeft:8}}><span className="num" style={{fontWeight:600,fontSize:13.5}}>{baht(it.amt).replace('฿','')}</span> <span style={{fontSize:11,color:'var(--muted)'}}>· {pct.toFixed(0)}%</span></span>
              </div>
              <div style={{height:7,background:'var(--soft)',borderRadius:5,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.max(2,Math.round(pct))}%`,background:color,borderRadius:5}}/>
              </div>
            </div>
          </div>
        );})}
    </div>
  );

  return (
    <div>
      <div style={wrap}>
        <div style={{fontSize:12.5,opacity:.8}}>ภาพรวม · {shop.name} (ทั้งหมด)</div>
        <div className="num" style={{fontSize:33,fontWeight:800,letterSpacing:'-.5px',lineHeight:1.15,color:profit>=0?'#F5C451':'#FF8A8A'}}>{profit>=0?'':'-'}{baht(Math.abs(profit))}</div>
        <div style={{fontSize:11.5,opacity:.7,marginTop:1}}>กำไรสะสม = รายรับ − รายจ่าย (รวมทุกช่วงเวลา)</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:14}}>
          {[['รายรับรวม',income,'#5BD08A'],['รายจ่ายรวม',expense,'#FF9A9A'],['ลงทุนสุทธิ',invest,'#86BBFF']].map(([l,v,c])=>(
            <div key={l} style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:'10px 10px'}}>
              <div style={{fontSize:10,opacity:.7,marginBottom:3}}>{l}</div>
              <div className="num" style={{fontSize:15,fontWeight:700,color:c}}>{baht(v).replace('฿','')}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:13,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.14)'}}>
          <div style={{fontSize:12.5,opacity:.82}}>💼 เงินคงเหลือทั้งหมด (ประมาณการ)</div>
          <div className="num" style={{fontSize:27,fontWeight:800,lineHeight:1.2,color:balance>=0?'#7FE3A9':'#FF8A8A'}}>{balance>=0?'':'-'}{baht(Math.abs(balance))}</div>
          <div style={{fontSize:10.5,opacity:.65,marginTop:1}}>= ลงทุนสุทธิ + รายรับ − รายจ่าย{divid>0?' − ปันผล':''}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:10}}>
            {[['💵 เงินสดสุทธิ',cashNet],['🏦 โอน/บัญชีสุทธิ',bankNet],['🧾 ทุนคงเหลือ (ไม่ระบุช่องทาง)',investFloat]].map(([l,v])=>(
              <div key={l} style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:'9px 10px'}}>
                <div style={{fontSize:9.5,opacity:.7,marginBottom:3,lineHeight:1.3}}>{l}</div>
                <div className="num" style={{fontSize:14,fontWeight:700,color:v>=0?'#CFE8FF':'#FFB4B4'}}>{v<0?'-':''}{baht(Math.abs(v)).replace('฿','')}</div>

          </div>
          <div style={{fontSize:10,opacity:.55,marginTop:8,lineHeight:1.5}}>เงินสด/บัญชี นับจากรายรับ-รายจ่ายที่ระบุช่องทาง · เงินลงทุนที่เติมเข้าร้านไม่ได้ระบุช่องทาง จึงแยกแสดงไว้</div>
        </div>
      </div>

      {catCard('รายรับแยกหมวด (ทั้งหมด)', incCats, income, '#16A34A')}
      {catCard('รายจ่ายแยกหมวด (ทั้งหมด)', expCats, expense, '#DC2626')}
    </div>
  );
}

        {holders.length===0 ? <div style={{fontSize:13,color:'var(--muted)',padding:'10px 0',textAlign:'center'}}>ยังไม่มีข้อมูลทุน{isAdmin?' — กด “เพิ่ม/ถอนทุน” เพื่อเริ่ม':''}</div> :

        <button onClick={()=>setType('withdraw')} className="press kanit" style={seg(type==='withdraw','#DC2626')}>ถอนทุน</button>

    </Sheet>
