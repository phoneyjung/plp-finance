function cleanUndefined(obj){
  if (Array.isArray(obj)) return obj.map(cleanUndefined);
  if (obj && typeof obj === 'object'){
    const o = {};
    Object.keys(obj).forEach(k => { if (obj[k] !== undefined) o[k] = cleanUndefined(obj[k]); });
    return o;
  }
  return obj;
}
function hhmm(iso){
  if (!iso) return '--:--';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function todayKey(d){
  const x = d || new Date();
  return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
}
/* เสียงเตือนออเดอร์ใหม่ (Web Audio ไม่ต้องมีไฟล์) */
let audioCtx = null;
function unlockAudio(){
  try{
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }catch(e){}
}
function beep(){
  try{
    if (!audioCtx) return;
    [0, 0.35].forEach(t0 => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.6, audioCtx.currentTime + t0);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t0 + 0.3);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(audioCtx.currentTime + t0); o.stop(audioCtx.currentTime + t0 + 0.32);
    });
  }catch(e){}
}

async function importSeed(existing){
  const now = new Date().toISOString();
  const byName = {};
  (existing || []).forEach(m => { byName[m.name] = m; });
  let created = 0, updated = 0;
  let batch = db.batch(); let n = 0;
  const commit = async () => { await batch.commit(); batch = db.batch(); n = 0; };
  const upsert = async (item, cat, prep) => {
    const ex = byName[item.name];
    if (ex){
      const patch = {};
      if (!ex.photo && item.photo) patch.photo = item.photo;
      if (!ex.nameTh && item.nameTh) patch.nameTh = item.nameTh;
      if (!ex.category) patch.category = cat;
      if (Object.keys(patch).length){
        patch.updatedAt = now;
        batch.update(db.collection('owlMenu').doc(ex.id), patch);
        updated++;
        if (++n >= 400) await commit();
      }
    } else {
      batch.set(db.collection('owlMenu').doc(), cleanUndefined({
        name: item.name, nameTh: item.nameTh, desc: item.nameTh, category: cat,
        price: item.price, prepMin: prep, photo: item.photo || '', active: true,
        createdAt: now, updatedAt: now
      }));
      created++;
      if (++n >= 400) await commit();
    }
  };
  for (const m of SEED_MENUS) await upsert(m, m.cat, 10);
  for (const t of SEED_TOPPINGS) await upsert(t, 'ท็อปปิ้ง', 0);
  if (n) await batch.commit();
  return { created, updated };
}

/* ================= รูปเมนู: ย่อ 600px / JPEG 0.6 (สูตร base64-in-Firestore) ================= */
function resizeImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = 600;
        const ratio = Math.min(1, max / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * ratio);
        c.height = Math.round(img.height * ratio);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================= การ์ดออเดอร์ ================= */
function OrderCard({ o, now, onDone, onUndo }){
  const start = o.startAt ? new Date(o.startAt) : null;
  const pickup = o.pickupAt ? new Date(o.pickupAt) : null;
  const isDone = o.status === 'done';
  const late = !isDone && pickup && now > pickup;
  const ready = !isDone && !late && start && now >= start;
  const border = isDone ? 'var(--line)' : late ? 'var(--hot)' : ready ? 'var(--warn)' : 'var(--line)';
  const badge = isDone
    ? { t:'✅ เสร็จแล้ว', c:'var(--ok)' }
    : late  ? { t:'⏰ เลยเวลารับ!', c:'var(--hot)' }
    : ready ? { t:'🔥 ถึงเวลาทำ!', c:'var(--warn)' }
    : { t:'รอถึงเวลา', c:'var(--muted)' };
  return (
    <div style={{background:'var(--card)', borderRadius:16, padding:14, marginBottom:12,
                 border:'2px solid ' + border, opacity:isDone ? .65 : 1,
                 boxShadow: ready || late ? '0 4px 16px rgba(0,0,0,.10)' : 'none'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div style={{fontWeight:700, fontSize:18}}>🕐 รับ {hhmm(o.pickupAt)} · คุณ{o.customer && o.customer.name}</div>
        <div style={{fontSize:13, fontWeight:600, color:badge.c}}>{badge.t}</div>
      </div>
      <div style={{fontSize:13, color:'var(--muted)', marginBottom:8}}>
        เริ่มทำได้ตั้งแต่ <b style={{color:'var(--ink)'}}>{hhmm(o.startAt)}</b> · สั่งเมื่อ {hhmm(o.createdAt)}
        {o.customer && o.customer.phone ? <> · <a href={'tel:' + o.customer.phone} style={{color:'var(--blue)'}}>📞 {o.customer.phone}</a></> : null}
      </div>
      {(o.items || []).map((it, i) => (
        <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'6px 10px',
                             background:'var(--bg)', borderRadius:10, marginBottom:6, fontSize:15}}>
          <div>🧋 {it.name} <span style={{color:'var(--muted)'}}>({SWEET_LABEL[it.sweetness] || it.sweetness})</span></div>
          <div style={{fontWeight:600}}>×{it.qty}</div>
        </div>
      ))}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8}}>
        <div style={{fontWeight:700}}>รวม {o.total} บาท</div>
        {isDone
          ? <button className="btn press" onClick={() => onUndo(o.id)} style={{background:'var(--line)', color:'var(--ink)', fontSize:14}}>↩ ย้อนกลับ</button>
          : <button className="btn press" onClick={() => onDone(o.id)} style={{background:'var(--ok)', color:'#fff', fontSize:15}}>✅ ทำเสร็จแล้ว</button>}
      </div>
    </div>
  );
}

/* ================= แท็บออเดอร์ ================= */
function OrdersTab(){
  const [orders, setOrders] = useState([]);
  const [now, setNow] = useState(new Date());
  const [soundOn, setSoundOn] = useState(false);
  const known = useRef(null);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 20000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const unsub = db.collection('owlOrders')
      .where('dateKey', '==', todayKey())
      .onSnapshot(snap => {
        const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        list.sort((a, b) => (a.pickupAt || '').localeCompare(b.pickupAt || ''));
        if (known.current !== null){
          const fresh = list.some(o => !known.current.has(o.id));
          if (fresh) beep();
        }
        known.current = new Set(list.map(o => o.id));
        setOrders(list);
      }, e => console.error('orders', e));
    return () => unsub();
  }, []);

  const setStatus = (id, status) =>
    db.collection('owlOrders').doc(id).update({ status }).catch(e => alert('บันทึกไม่สำเร็จ: ' + e.message));

  const active = orders.filter(o => o.status !== 'done');
  const done = orders.filter(o => o.status === 'done');

  return (
    <div>
      {!soundOn &&
        <button className="btn press" onClick={() => { unlockAudio(); beep(); setSoundOn(true); }}
          style={{width:'100%', background:'var(--accent)', color:'#fff', marginBottom:12}}>
          🔔 กดเปิดเสียงเตือนออเดอร์ใหม่ (กดครั้งเดียวพอ)
        </button>}
      {active.length === 0 &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'40px 0'}}>ยังไม่มีออเดอร์วันนี้ 🦉</div>}
      {active.map(o => <OrderCard key={o.id} o={o} now={now}
        onDone={id => setStatus(id, 'done')} onUndo={id => setStatus(id, 'new')} />)}
      {done.length > 0 && <>
        <div style={{color:'var(--muted)', fontSize:14, margin:'16px 0 8px'}}>เสร็จแล้ววันนี้ ({done.length})</div>
        {done.map(o => <OrderCard key={o.id} o={o} now={now}
          onDone={id => setStatus(id, 'done')} onUndo={id => setStatus(id, 'new')} />)}
      </>}
    </div>
  );
}

/* ================= ฟอร์มเพิ่ม/แก้เมนู ================= */
function MenuForm({ init, onSaved, onCancel }){
  const [name, setName] = useState(init ? init.name : '');
  const [category, setCategory] = useState(init ? (init.category || CATEGORIES[0]) : CATEGORIES[0]);
  const [desc, setDesc] = useState(init ? init.desc : '');
  const [price, setPrice] = useState(init ? String(init.price) : '');
  const [prepMin, setPrepMin] = useState(init ? String(init.prepMin) : '10');
  const [photo, setPhoto] = useState(init ? init.photo : '');
  const [busy, setBusy] = useState(false);

  const pick = async e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try{ setPhoto(await resizeImage(f)); }
    catch(err){ alert('อ่านรูปไม่สำเร็จ'); }
  };

  const save = async () => {
    if (!name.trim()) return alert('ใส่ชื่อเมนู');
    if (!price || isNaN(Number(price))) return alert('ใส่ราคาเป็นตัวเลข');
    if (!prepMin || isNaN(Number(prepMin))) return alert('ใส่เวลาทำก่อนทาน (นาที)');
    setBusy(true);
    const data = cleanUndefined({
      name: name.trim(),
      category,
      desc: desc.trim(),
      price: Number(price),
      prepMin: Number(prepMin),
      photo: photo || '',
      active: init ? init.active : true,
      updatedAt: new Date().toISOString(),
      ...(init ? {} : { createdAt: new Date().toISOString() })
    });
    try{
      if (init) await db.collection('owlMenu').doc(init.id).update(data);
      else await db.collection('owlMenu').add(data);
      onSaved();
    }catch(e){ alert('บันทึกไม่สำเร็จ: ' + e.message); }
    setBusy(false);
  };

  return (
    <div style={{background:'var(--card)', borderRadius:16, padding:16, marginBottom:14, border:'1.5px solid var(--accent)'}}>
      <div style={{fontWeight:700, marginBottom:10}}>{init ? '✏️ แก้ไขเมนู' : '➕ เพิ่มเมนูใหม่'}</div>
      <div style={{display:'flex', gap:12, alignItems:'flex-start', marginBottom:10}}>
        <label className="press" style={{width:96, height:96, borderRadius:14, background:'var(--bg)',
               border:'1.5px dashed var(--accent)', display:'flex', alignItems:'center', justifyContent:'center',
               overflow:'hidden', cursor:'pointer', flexShrink:0}}>
          {photo ? <img src={photo} style={{width:'100%', height:'100%', objectFit:'cover'}} /> : <span style={{fontSize:26}}>📷</span>}
          <input type="file" accept="image/*" onChange={pick} style={{display:'none'}} />
        </label>
        <div style={{flex:1}}>
          <select value={category} onChange={e => setCategory(e.target.value)} style={{marginBottom:8}}>
            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input placeholder="ชื่อเมนู เช่น Shine Muscat" value={name} onChange={e => setName(e.target.value)} style={{marginBottom:8}} />
          <input placeholder="ส่วนผสม เช่น ชาองุ่น + ไข่มุก" value={desc} onChange={e => setDesc(e.target.value)} />
        </div>
      </div>
      <div style={{display:'flex', gap:10, marginBottom:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:4}}>ราคา (บาท)</div>
          <input inputMode="numeric" value={price} onChange={e => setPrice(e.target.value)} placeholder="44" />
        </div>
        <div style={{flex:1.4}}>
          <div style={{fontSize:13, color:'var(--muted)', marginBottom:4}}>ควรทำก่อนทานไม่เกิน (นาที)</div>
          <input inputMode="numeric" value={prepMin} onChange={e => setPrepMin(e.target.value)} placeholder="10" />
        </div>
      </div>
      <div style={{display:'flex', gap:10}}>
        <button className="btn press" disabled={busy} onClick={save}
          style={{flex:1, background:'var(--brand)', color:'#fff'}}>{busy ? 'กำลังบันทึก…' : '💾 บันทึก'}</button>
        <button className="btn press" onClick={onCancel} style={{background:'var(--line)', color:'var(--ink)'}}>ยกเลิก</button>
      </div>
    </div>
  );
}

/* ================= แท็บเมนู ================= */
function MenuTab(){
  const [menus, setMenus] = useState([]);
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [seeding, setSeeding] = useState(false);
  const runSeed = async () => {
    if (!confirm('นำเข้า/อัปเดตเมนูจากบอร์ด 62 รายการ?')) return;
    setSeeding(true);
    try{
      const r = await importSeed(menus);
      alert('เสร็จแล้ว: สร้างใหม่ ' + r.created + ' · อัปเดต ' + r.updated + ' รายการ');
    }catch(e){ alert('ไม่สำเร็จ: ' + e.message); }
    setSeeding(false);
  };

  useEffect(() => {
    const unsub = db.collection('owlMenu').onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      list.sort((a, b) => ((a.sortOrder != null ? a.sortOrder : 1e9) - (b.sortOrder != null ? b.sortOrder : 1e9)) || (a.price || 0) - (b.price || 0) || (a.name || '').localeCompare(b.name || ''));
      setMenus(list);
    }, e => console.error('menu', e));
    return () => unsub();
  }, []);

  const toggle = m => db.collection('owlMenu').doc(m.id).update({ active: !m.active });
  const remove = m => { if (confirm('ลบเมนู "' + m.name + '" ?')) db.collection('owlMenu').doc(m.id).delete(); };
  const move = async (m, dir) => {
    const catName = m.category || 'อื่นๆ';
    const same = menus.filter(x => (x.category || 'อื่นๆ') === catName);
    const idx = same.findIndex(x => x.id === m.id);
    const j = idx + dir;
    if (j < 0 || j >= same.length) return;
    const batch = db.batch();
    same.forEach((x, i) => {
      let ord = i * 10;
      if (i === idx) ord = j * 10;
      else if (i === j) ord = idx * 10;
      batch.update(db.collection('owlMenu').doc(x.id), { sortOrder: ord });
    });
    try{ await batch.commit(); }catch(e){ alert('เลื่อนไม่สำเร็จ: ' + e.message); }
  };

  return (
    <div>
      {!adding && !editing &&
        <button className="btn press" onClick={() => setAdding(true)}
          style={{width:'100%', background:'var(--brand)', color:'#fff', marginBottom:14, fontSize:16}}>➕ เพิ่มเมนูใหม่</button>}
      {!adding && !editing && !seeding &&
        <button className="btn press" onClick={runSeed}
          style={{width:'100%', background:'var(--accent)', color:'#fff', marginBottom:14, fontSize:15}}>
          📥 นำเข้า/อัปเดตเมนูจากบอร์ด + รูป (กดซ้ำได้ ไม่สร้างซ้ำ)</button>}
      {seeding && <div style={{textAlign:'center', color:'var(--muted)', marginBottom:14}}>กำลังนำเข้าเมนู…</div>}
      {adding && <MenuForm onSaved={() => setAdding(false)} onCancel={() => setAdding(false)} />}
      {editing && <MenuForm init={editing} onSaved={() => setEditing(null)} onCancel={() => setEditing(null)} />}
      {CATEGORIES.filter(c => menus.some(m => (m.category || 'อื่นๆ') === c)).map(c => (
        <div key={c}>
          <div style={{fontWeight:700, color:'var(--brand)', margin:'14px 0 8px', fontSize:15}}>— {c} —</div>
          {menus.filter(m => (m.category || 'อื่นๆ') === c).map(m => (
        <div key={m.id} style={{background:'var(--card)', borderRadius:16, padding:12, marginBottom:10,
                                display:'flex', gap:12, alignItems:'center', opacity:m.active ? 1 : .5,
                                border:'1.5px solid var(--line)'}}>
          <div style={{width:64, height:64, borderRadius:12, overflow:'hidden', background:'var(--bg)', flexShrink:0}}>
            {m.photo ? <img src={m.photo} style={{width:'100%', height:'100%', objectFit:'cover'}} /> :
              <div style={{textAlign:'center', lineHeight:'64px', fontSize:22}}>🧋</div>}
          </div>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontWeight:700}}>{m.name}{m.nameTh ? ' · ' + m.nameTh : ''} · {m.price}.-</div>
            <div style={{fontSize:13, color:'var(--muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
              {m.desc || '—'} · ทำก่อนทาน ≤{m.prepMin} นาที
            </div>
            <div style={{display:'flex', gap:14, marginTop:4, fontSize:14, alignItems:'center'}}>
              <a className="press" onClick={() => move(m, -1)} style={{cursor:'pointer', border:'1px solid var(--line)', borderRadius:8, padding:'0 8px', lineHeight:'22px'}}>▲</a>
              <a className="press" onClick={() => move(m, 1)} style={{cursor:'pointer', border:'1px solid var(--line)', borderRadius:8, padding:'0 8px', lineHeight:'22px'}}>▼</a>
              <a onClick={() => setEditing(m)} style={{color:'var(--blue)', cursor:'pointer'}}>แก้ไข</a>
              <a onClick={() => toggle(m)} style={{color:m.active ? 'var(--warn)' : 'var(--ok)', cursor:'pointer'}}>
                {m.active ? 'พักขาย' : 'เปิดขาย'}</a>
              <a onClick={() => remove(m)} style={{color:'var(--hot)', cursor:'pointer'}}>ลบ</a>
            </div>
          </div>
        </div>
      ))}
        </div>
      ))}
      {menus.length === 0 && !adding &&
        <div style={{textAlign:'center', color:'var(--muted)', padding:'30px 0'}}>ยังไม่มีเมนู กด "เพิ่มเมนูใหม่" ได้เลย</div>}
    </div>
  );
}

/* ================= App ================= */
function App(){
  const [pass, setPass] = useState(() => localStorage.getItem('owlKitchenPin') === '1');
  const [tab, setTab] = useState('orders');
  if (!pass) return <PinGate onPass={() => setPass(true)} />;
  return (
    <div style={{maxWidth:560, margin:'0 auto', padding:'14px 14px 90px'}}>
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14}}>
        <div style={{fontSize:30}}>🦉</div>
        <div>
          <div style={{fontWeight:700, fontSize:18, lineHeight:1.1}}>Owl Cha หน้าร้าน</div>
          <div style={{fontSize:12, color:'var(--muted)'}}>ออเดอร์สั่งล่วงหน้า · รับหน้าร้าน</div>
        </div>
      </div>
      {tab === 'orders' ? <OrdersTab /> : <MenuTab />}
      <div style={{position:'fixed', bottom:0, left:0, right:0, background:'var(--card)',
                   borderTop:'1.5px solid var(--line)', display:'flex'}}>
        {[['orders','📋 ออเดอร์'], ['menu','🧋 เมนู']].map(([k, t]) => (
          <button key={k} className="press" onClick={() => setTab(k)}
            style={{flex:1, padding:'14px 0', border:'none', background:'none', fontSize:16,
                    fontWeight:tab === k ? 700 : 500, color:tab === k ? 'var(--brand)' : 'var(--muted)',
                    borderTop:tab === k ? '3px solid var(--brand)' : '3px solid transparent'}}>{t}</button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
