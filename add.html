<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>แอดไลน์ร้าน</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans Thai",sans-serif;background:#F2F4F7;color:#1A1F26;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:420px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.10)}
  .hd{padding:38px 24px 30px;text-align:center;color:#fff}
  .hd .ic{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;margin:0 auto 14px}
  .hd h1{font-size:21px;font-weight:700}
  .hd p{font-size:13.5px;opacity:.92;margin-top:5px}
  .bd{padding:26px 24px 30px;text-align:center}
  .bd .big{font-size:18px;font-weight:700;margin-bottom:8px}
  .bd .sub{font-size:14px;color:#667085;line-height:1.55}
  .spin{width:46px;height:46px;border:4px solid #E4E7EC;border-top-color:#9AA1AB;border-radius:50%;animation:sp 0.8s linear infinite;margin:10px auto 18px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;background:#06C755;margin-top:20px;text-decoration:none;cursor:pointer}
  .btn.ghost{background:#fff;color:#475467;border:1.5px solid #E4E7EC}
  .ok{width:60px;height:60px;border-radius:50%;background:#16A34A;display:grid;place-items:center;margin:0 auto 16px}
  .warn{width:60px;height:60px;border-radius:50%;background:#FEF3F2;display:grid;place-items:center;margin:0 auto 16px}
  .muted{font-size:11.5px;color:#98A2B3;margin-top:18px;line-height:1.5}
  .hd .logo{width:84px;height:84px;border-radius:50%;background:#fff;display:grid;place-items:center;margin:0 auto 14px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.18)}
  .hd .logo img{width:100%;height:100%;object-fit:cover;display:block}
  .reward{background:#F8F7F4;border:1px solid #ECEAE5;border-radius:15px;padding:13px 16px;margin:18px 0 2px;text-align:center}
  .reward .rlbl{font-size:11.5px;color:#98A2B3;letter-spacing:.3px}
  .reward .rval{font-size:17px;font-weight:800;margin-top:3px}
  .benefits{text-align:left;margin:16px auto 4px;max-width:300px}
  .bi{font-size:13px;color:#475467;padding:5px 0;display:flex;gap:9px;align-items:flex-start;line-height:1.4}
  .bc{font-weight:800;flex-shrink:0}
  .trust{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#98A2B3;margin-top:14px;background:#F7F9FB;padding:6px 12px;border-radius:99px}
</style>
</head>
<body>
<div class="card">
  <div class="hd" id="hd" style="background:#0B7AAB">
    <div class="logo" id="hdlogo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0B7AAB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    <h1 id="hdname">แอดไลน์ร้าน</h1>
    <p id="hdsub">กำลังเชื่อมต่อ…</p>
  </div>
  <div class="bd" id="bd">
    <div class="spin"></div>
    <div class="sub">กรุณารอสักครู่…</div>
  </div>
</div>

function readParams(){
  let qs = new URLSearchParams(location.search);
  let sh = qs.get('shop'), rf = qs.get('ref');
  // LIFF มักห่อ query เดิมไว้ใน liff.state
  if(!sh || !rf){
    const st = qs.get('liff.state');
    if(st){ const q2 = new URLSearchParams(st.charAt(0)==='?'?st:('?'+st)); sh = sh || q2.get('shop'); rf = rf || q2.get('ref'); }
  }
  // เผื่อกรณีอยู่ใน hash
  if((!sh || !rf) && location.hash && location.hash.indexOf('=')>-1){
    const q3 = new URLSearchParams(location.hash.replace(/^#/,'')); sh = sh || q3.get('shop'); rf = rf || q3.get('ref');
  }
  return { sh:(sh||'').trim(), rf:(rf||'').trim() };
}

    +'<div class="benefits">'
      +'<div class="bi"><span class="bc" style="color:'+C+'">✓</span>โปรโมชั่น & ส่วนลดเฉพาะสมาชิก</div>'
      +'<div class="bi"><span class="bc" style="color:'+C+'">✓</span>สะสมแต้ม แลกของรางวัล</div>'
      +'<div class="bi"><span class="bc" style="color:'+C+'">✓</span>รู้ข่าวเมนู/โปรใหม่ก่อนใคร</div>'
    +'</div>'
    +(oa()?'<a class="btn" href="'+oa()+'">➕ เพิ่มเพื่อน LINE ร้าน</a>':'')
    +'<div class="muted">เพิ่มเพื่อนแล้วระบบจะบันทึกสิทธิ์ให้อัตโนมัติ</div>';
}

(async function(){
  theme(); setHead('กำลังเชื่อมต่อ…');

  if(!shop || !SHOP_NAME[shop]){ screenError('ลิงก์ไม่ถูกต้อง','ไม่พบข้อมูลร้าน กรุณาสแกน QR ใหม่อีกครั้ง',false,_dbg); return; }
  if(!ref){ screenError('ลิงก์ไม่ถูกต้อง','ไม่พบรหัสผู้แนะนำ กรุณาสแกน QR ใหม่อีกครั้ง',false,_dbg); return; }

  const liffId = LIFF_BY_SHOP[shop];
  if(!liffId || liffId.indexOf('PASTE')===0){
    screenError('ยังไม่ได้ตั้งค่า','ร้านนี้ยังไม่ได้ใส่ LIFF ID (เจ้าของร้านต้องตั้งค่าก่อน)',true); return;
  }

  const withTimeout=(p,ms,label)=>Promise.race([ Promise.resolve(p), new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout: '+label)),ms)) ]);

  // 1) Firebase
  let db;
  try{
    screenLoading('เชื่อมต่อฐานข้อมูล…');
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    await withTimeout(firebase.auth().signInAnonymously(), 12000, 'firebase-auth');
  }catch(e){ console.error('fb',e); screenError('เชื่อมต่อฐานข้อมูลไม่สำเร็จ','('+(e&&e.message||e)+') ลองสแกนใหม่ หรือเช็คเน็ต',true,_dbg); return; }

  // 2) LIFF init
  try{
    screenLoading('เปิดผ่าน LINE…');
    await withTimeout(liff.init({ liffId }), 12000, 'liff-init');
  }catch(e){ console.error('liff init',e); screenError('เปิดผ่าน LINE ไม่สำเร็จ','('+(e&&e.message||e)+') · เปิดในแอป LINE และเช็กว่า channel = Published',true,_dbg); return; }

  if(!liff.isLoggedIn()){
    screenLoading('เข้าสู่ระบบ LINE…');
    liff.login({ redirectUri: location.href });
    return;
  }

  let profile;
  try{
    screenLoading('อ่านโปรไฟล์…');
    profile = await withTimeout(liff.getProfile(), 12000, 'getProfile');
  }catch(e){ console.error('profile',e); screenError('อ่านข้อมูลไม่สำเร็จ','('+(e&&e.message||e)+') เปิดในแอป LINE แล้วลองใหม่',true,_dbg); return; }

  const userId = profile.userId;
  const dispName = profile.displayName || '';
  const id = shop + '_' + userId;
  const docRef = db.collection('transactions').doc(id);
  let pendingActive = false;

  async function getFriend(){
    try{ const f = await withTimeout(liff.getFriendship(), 7000, 'friendship'); return !!(f && f.friendFlag); }
    catch(e){ console.warn('friendship',e); return false; }
  }
  async function countNow(){
    try{
      await withTimeout(docRef.set({ counted:true, date:now(), ym:nowYm(), ts: firebase.firestore.FieldValue.serverTimestamp() }, {merge:true}), 12000, 'count');
      screenCounted(dispName);
    }catch(e){ console.error('count',e); screenError('บันทึกไม่สำเร็จ','('+(e&&e.message||e)+') ลองใหม่อีกครั้ง',true,_dbg); }
  }
  async function recheckSilent(){
    if(!pendingActive) return;
    const isF = await getFriend();
    if(isF){ pendingActive=false; await countNow(); }
  }
  document.addEventListener('visibilitychange', function(){ if(!document.hidden) recheckSilent(); });
  window.addEventListener('focus', recheckSilent);

  screenLoading('กำลังตรวจสอบ…');
  const isFriend = await getFriend();
  let snap;
  try{ snap = await withTimeout(docRef.get(), 12000, 'firestore-get'); }catch(e){ console.warn('get',e); snap = {exists:false}; }
  const rec = snap.exists ? snap.data() : null;

  if(isFriend){
    if(rec && rec.counted===true){ screenDone(true, dispName, false); return; }   // นับไปแล้ว
    if(rec){ await countNow(); return; }                                          // เคยสแกนตอนยังไม่เป็นเพื่อน + ตอนนี้แอดแล้ว → นับ
    screenAlreadyFriend(dispName); return;                                        // เป็นเพื่อนเดิม ไม่เคยสแกน → ไม่นับ
  }
  // ยังไม่เป็นเพื่อน
  if(rec && rec.counted===true){ screenDone(true, dispName, true); return; }
  try{
    await withTimeout(docRef.set({
      _refc:true, skey: shop+'_REFC', refId: ref, shopId: shop, custUserId: userId,
      custName: dispName, counted:false,
      clientTs: new Date().toISOString(), pendingTs: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true}), 12000, 'pending');
  }catch(e){ console.warn('pending',e); }
  pendingActive = true;
  screenAddPending(dispName);
})();
</script>
