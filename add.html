<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>แอดไลน์ร้าน</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans Thai",sans-serif;background:#F2F4F7;color:#1A1F26;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:420px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.10)}
  .hd{padding:38px 24px 30px;text-align:center;color:#fff}
  .hd .ic{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;margin:0 auto 14px}
  .hd h1{font-size:21px;font-weight:700}
  .hd p{font-size:13.5px;opacity:.92;margin-top:5px}
  .bd{padding:26px 24px 30px;text-align:center}
  .bd .big{font-size:18px;font-weight:700;margin-bottom:8px}
  .bd .sub{font-size:14px;color:#667085;line-height:1.55}
  .spin{width:46px;height:46px;border:4px solid #E4E7EC;border-top-color:#9AA1AB;border-radius:50%;animation:sp 0.8s linear infinite;margin:10px auto 18px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;background:#06C755;margin-top:20px;text-decoration:none;cursor:pointer}
  .btn.ghost{background:#fff;color:#475467;border:1.5px solid #E4E7EC}
  .ok{width:60px;height:60px;border-radius:50%;background:#16A34A;display:grid;place-items:center;margin:0 auto 16px}
  .warn{width:60px;height:60px;border-radius:50%;background:#FEF3F2;display:grid;place-items:center;margin:0 auto 16px}
  .muted{font-size:11.5px;color:#98A2B3;margin-top:18px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="hd" id="hd" style="background:#0B7AAB">
    <div class="ic" id="hdic">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </div>
    <h1 id="hdname">แอดไลน์ร้าน</h1>
    <p id="hdsub">กำลังเชื่อมต่อ…</p>
  </div>
  <div class="bd" id="bd">
    <div class="spin"></div>
    <div class="sub">กรุณารอสักครู่…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
/* =========================================================
   ⬇️ ตั้งค่าตรงนี้  (เติม LIFF ID ของแต่ละร้านหลังสร้างใน LINE Developers)
   ========================================================= */
const LIFF_BY_SHOP = {
  otteri: 'PASTE_OTTERI_LIFF_ID',
  teddy1: '2010531442-VXlmy8xK',   // Teddy 1 + 2 ใช้ LINE เดียวกัน → ใส่ LIFF ID เดียวกันทั้งคู่
  teddy2: '2010531442-VXlmy8xK',
  owl:    'PASTE_OWL_LIFF_ID'      // ถ้าจะใช้กับ Owl ด้วย (ไม่ใช้ก็เว้นไว้)
};
const OA_BY_SHOP = {
  otteri: 'https://lin.ee/QKQJeNh',
  teddy1: 'https://lin.ee/xq7Ifh7',
  teddy2: 'https://lin.ee/xq7Ifh7',
  owl:    'https://lin.ee/yT6VSaT'
};
const SHOP_NAME = { otteri:'Otteri Wash & Dry', teddy1:'Teddy Wash & Dry', teddy2:'Teddy Wash & Dry', owl:'Owl Cha' };
const SHOP_COLOR= { otteri:'#0B7AAB', teddy1:'#235A88', teddy2:'#007A6D', owl:'#6E5A47' };

const firebaseConfig = {
  apiKey: "AIzaSyAVaizHIgRcgrufwwI1ohbOinOy0DtTiM0",
  authDomain: "plp-finance.firebaseapp.com",
  projectId: "plp-finance",
  storageBucket: "plp-finance.firebasestorage.app",
  messagingSenderId: "772651276984",
  appId: "1:772651276984:web:46a5953931ba72c146724d"
};
/* ========================================================= */

const qs = new URLSearchParams(location.search);
const shop = (qs.get('shop')||'').trim();
const ref  = (qs.get('ref')||'').trim();

const hd=document.getElementById('hd'), hdname=document.getElementById('hdname'), hdsub=document.getElementById('hdsub'), bd=document.getElementById('bd');
const pad=n=>String(n).padStart(2,'0');
const now=()=>{ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const nowYm=()=>now().slice(0,7);
const nm=()=> SHOP_NAME[shop]||'ร้านค้า';
const oa=()=> OA_BY_SHOP[shop]||'';

function theme(){ const c=SHOP_COLOR[shop]||'#0B7AAB'; hd.style.background=c; }
function setHead(sub){ hdname.textContent=nm(); hdsub.textContent=sub||''; }

function screenLoading(t){ bd.innerHTML='<div class="spin"></div><div class="sub">'+t+'</div>'; }
function screenError(title, sub, withOA){
  bd.innerHTML='<div class="warn"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.2" stroke-linecap="round"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg></div>'
    +'<div class="big">'+title+'</div><div class="sub">'+sub+'</div>'
    +(withOA&&oa()?'<a class="btn" href="'+oa()+'">เปิด LINE ร้าน</a>':'');
}
function screenAddFriend(){
  setHead('อีกขั้นเดียว!');
  bd.innerHTML='<div class="big">กดปุ่มเพื่อเพิ่มเพื่อน</div>'
    +'<div class="sub">แตะปุ่มด้านล่างเพื่อแอดไลน์ร้าน '+nm()+' แล้วระบบจะบันทึกให้อัตโนมัติ</div>'
    +'<a class="btn" href="'+oa()+'">➕ เพิ่มเพื่อน LINE ร้าน</a>';
}
function screenDone(dup, dispName){
  setHead('เรียบร้อย');
  bd.innerHTML='<div class="ok"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'
    +'<div class="big">'+(dup?'คุณแอดไลน์ร้านนี้ไว้แล้ว':'ขอบคุณที่แอดไลน์ร้าน!')+'</div>'
    +'<div class="sub">'+(dispName?('คุณ '+dispName+' · '):'')+nm()+(dup?'<br>ไม่ต้องแอดซ้ำนะคะ 😊':'<br>บันทึกเรียบร้อยแล้ว 🎉')+'</div>'
    +(oa()?'<a class="btn" href="'+oa()+'">เปิดแชทร้าน</a>':'')
    +'<div class="muted">ปิดหน้านี้ได้เลย</div>';
}

(async function(){
  theme(); setHead('กำลังเชื่อมต่อ…');

  if(!shop || !SHOP_NAME[shop]){ screenError('ลิงก์ไม่ถูกต้อง','ไม่พบข้อมูลร้าน กรุณาสแกน QR ใหม่อีกครั้ง',false); return; }
  if(!ref){ screenError('ลิงก์ไม่ถูกต้อง','ไม่พบรหัสผู้แนะนำ กรุณาสแกน QR ใหม่อีกครั้ง',false); return; }

  const liffId = LIFF_BY_SHOP[shop];
  if(!liffId || liffId.indexOf('PASTE')===0){
    screenError('ยังไม่ได้ตั้งค่า','ร้านนี้ยังไม่ได้ใส่ LIFF ID (เจ้าของร้านต้องตั้งค่าก่อน)',true); return;
  }

  // Firebase
  let db;
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    await firebase.auth().signInAnonymously();
  }catch(e){ console.error('fb',e); screenError('เชื่อมต่อไม่สำเร็จ','ลองสแกนใหม่อีกครั้ง หรือเปิดผ่าน LINE',true); return; }

  // LIFF
  try{
    await liff.init({ liffId });
  }catch(e){ console.error('liff init',e); screenError('เปิดผ่าน LINE ไม่สำเร็จ','กรุณาเปิดลิงก์นี้ในแอป LINE',true); return; }

  if(!liff.isLoggedIn()){
    screenLoading('กำลังเข้าสู่ระบบ LINE…');
    liff.login({ redirectUri: location.href });
    return;
  }

  screenLoading('กำลังบันทึก…');

  let profile;
  try{ profile = await liff.getProfile(); }
  catch(e){ console.error('profile',e); screenError('อ่านข้อมูลไม่สำเร็จ','กรุณาเปิดในแอป LINE แล้วลองใหม่',true); return; }

  const userId = profile.userId;

  // ตรวจว่าเป็นเพื่อนกับ OA หรือยัง (ถ้าเช็คได้)
  let isFriend = true;
  try{ const f = await liff.getFriendship(); isFriend = !!f.friendFlag; }
  catch(e){ isFriend = true; } // เช็คไม่ได้ → ถือว่าผ่าน

  if(!isFriend){ screenAddFriend(); return; }

  // บันทึก referral (กันซ้ำด้วย doc id = shop_userId)
  try{
    const id = shop + '_' + userId;
    const docRef = db.collection('transactions').doc(id);
    const snap = await docRef.get();
    if(snap.exists){ screenDone(true, profile.displayName); return; }
    await docRef.set({
      _refc:true, skey: shop+'_REFC',
      refId: ref, shopId: shop, custUserId: userId,
      date: now(), ym: nowYm(),
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
    screenDone(false, profile.displayName);
  }catch(e){ console.error('write',e); screenError('บันทึกไม่สำเร็จ','แต่คุณแอดไลน์ร้านเรียบร้อยแล้ว ขอบคุณค่ะ',true); }
})();
</script>
</body>
</html>
